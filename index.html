function QuotationsModal({ quotations, onClose, onSaveQuotation, onDeleteQuotation, onGenerateInvoice, settings }) {
  const [activeTab, setActiveTab] = useState("list");
  const [previewQuotation, setPreviewQuotation] = useState(null);
  const [viewMode, setViewMode] = useState("quotation");
  const [editingId, setEditingId] = useState(null);
  const [customerName, setCustomerName] = useState("");
  const [customerPhone, setCustomerPhone] = useState("");
  const [customerEmail, setCustomerEmail] = useState("");
  const [customerCompany, setCustomerCompany] = useState("");
  const [customerAddress, setCustomerAddress] = useState("");
  const [quotationItems, setQuotationItems] = useState([]);
  const [notes, setNotes] = useState("");
  const [terms, setTerms] = useState("");
  const [taxRate, setTaxRate] = useState(0);
  const [discountRate, setDiscountRate] = useState(0);
  const [validUntil, setValidUntil] = useState("");
  const [itemName, setItemName] = useState("");
  const [itemDescription, setItemDescription] = useState("");
  const [itemQty, setItemQty] = useState("");
  const [itemUnit, setItemUnit] = useState("pcs");
  const [itemPrice, setItemPrice] = useState("");
  const [generatingInvoiceFor, setGeneratingInvoiceFor] = useState(null);
  const [query, setQuery] = useState("");
  const [companyName, setCompanyName] = useState("Pesa POS");
  const [companyEmail, setCompanyEmail] = useState("");
  const [companyPhone, setCompanyPhone] = useState("");
  const [companyAddress, setCompanyAddress] = useState("");

  useEffect(() => {
    if (!validUntil) {
      const futureDate = new Date();
      futureDate.setDate(futureDate.getDate() + 30);
      setValidUntil(futureDate.toISOString().split('T')[0]);
    }
  }, []);

  const addItem = () => {
    if (!itemName.trim() || !itemQty || !itemPrice) {
      alert("Please fill all required item fields");
      return;
    }
    const newItem = {
      id: `item_${Date.now()}`,
      name: itemName.trim(),
      description: itemDescription.trim(),
      quantity: Number(itemQty),
      unit: itemUnit,
      price: Number(itemPrice),
      total: Number(itemQty) * Number(itemPrice)
    };
    setQuotationItems([...quotationItems, newItem]);
    setItemName("");
    setItemDescription("");
    setItemQty("");
    setItemUnit("pcs");
    setItemPrice("");
  };

  const removeItem = (id) => {
    setQuotationItems(quotationItems.filter(item => item.id !== id));
  };

  const calculateSubtotal = () => {
    return quotationItems.reduce((sum, item) => sum + item.total, 0);
  };

  const calculateDiscount = () => {
    return (calculateSubtotal() * discountRate) / 100;
  };

  const calculateTax = () => {
    return ((calculateSubtotal() - calculateDiscount()) * taxRate) / 100;
  };

  const calculateTotal = () => {
    return calculateSubtotal() - calculateDiscount() + calculateTax();
  };

  const handleSave = () => {
    if (!customerName.trim()) {
      alert("Please enter customer name");
      return;
    }
    if (quotationItems.length === 0) {
      alert("Please add at least one item");
      return;
    }

    const quotation = {
      id: editingId || `QT_${Date.now()}`,
      customerName: customerName.trim(),
      customerPhone: customerPhone.trim(),
      customerEmail: customerEmail.trim(),
      customerCompany: customerCompany.trim(),
      customerAddress: customerAddress.trim(),
      companyName: companyName.trim(),
      companyEmail: companyEmail.trim(),
      companyPhone: companyPhone.trim(),
      companyAddress: companyAddress.trim(),
      items: quotationItems,
      subtotal: calculateSubtotal(),
      discountRate: discountRate,
      discount: calculateDiscount(),
      taxRate: taxRate,
      tax: calculateTax(),
      total: calculateTotal(),
      notes: notes.trim(),
      terms: terms.trim(),
      validUntil: validUntil,
      createdDate: editingId ? quotations.find(q => q.id === editingId)?.createdDate : new Date().toISOString(),

              <span style={{color: '#475569'}}>Issue Date</span>
              <span style={{fontWeight: '600'}}>{new Date(quotation.createdDate).toLocaleDateString()}</span>
            </div>
            <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '8px', fontSize: '14px'}}>
              <span style={{color: '#475569'}}>Valid Until</span>
              <span style={{fontWeight: '600', color: '#dc2626'}}>{new Date(quotation.validUntil).toLocaleDateString()}</span>
            </div>
            {!isBoq && (
              <div style={{display: 'flex', justifyContent: 'space-between', borderTop: '2px solid #1d4ed8', paddingTop: '10px', marginTop: '10px'}}>
                <span style={{color: '#1d4ed8', fontWeight: '700', fontSize: '15px'}}>TOTAL AMOUNT</span>
                <span style={{fontWeight: '800', color: '#1d4ed8', fontSize: '18px'}}>{currency} {quotation.total.toLocaleString()}</span>
              </div>
            )}
          </div>
        </div>

        {/* Items Table */}
        <div style={{padding: '0 40px 24px'}}>
          <table style={{width: '100%', borderCollapse: 'collapse'}}>
            <thead>
              <tr style={{background: 'var(--gradient-badge)', color: 'white'}}>
                <th style={{padding: '13px 14px', textAlign: 'center', fontSize: '12px', width: '50px', fontWeight: '700'}}>#</th>
                <th style={{padding: '13px 14px', textAlign: 'left', fontSize: '12px', fontWeight: '700'}}>DESCRIPTION</th>
                <th style={{padding: '13px 14px', textAlign: 'center', fontSize: '12px', fontWeight: '700'}}>QTY</th>
                <th style={{padding: '13px 14px', textAlign: 'center', fontSize: '12px', fontWeight: '700'}}>UNIT</th>
                {!isBoq && <th style={{padding: '13px 14px', textAlign: 'right', fontSize: '12px', fontWeight: '700'}}>UNIT PRICE</th>}
                {!isBoq && <th style={{padding: '13px 14px', textAlign: 'right', fontSize: '12px', fontWeight: '700'}}>AMOUNT</th>}
              </tr>
            </thead>
            <tbody>
              {quotation.items.map((item, idx) => (
                <tr key={item.id} style={{background: idx % 2 === 0 ? '#f8fafc' : 'white'}}>
                  <td style={{border: '1px solid #e2e8f0', padding: '11px 14px', textAlign: 'center', color: '#64748b', fontSize: '14px'}}>{idx + 1}</td>
                  <td style={{border: '1px solid #e2e8f0', padding: '11px 14px'}}>
                    <div style={{fontWeight: '600', color: '#1e293b', fontSize: '14px'}}>{item.name}</div>
                    {item.description && <div style={{fontSize: '12px', color: '#64748b', marginTop: '3px'}}>{item.description}</div>}
                  </td>
                  <td style={{border: '1px solid #e2e8f0', padding: '11px 14px', textAlign: 'center', fontWeight: '600', fontSize: '14px'}}>{item.quantity.toLocaleString()}</td>
                  <td style={{border: '1px solid #e2e8f0', padding: '11px 14px', textAlign: 'center', color: '#475569', fontSize: '14px'}}>{item.unit || 'pcs'}</td>
                  {!isBoq && <td style={{border: '1px solid #e2e8f0', padding: '11px 14px', textAlign: 'right', fontSize: '14px'}}>{currency} {item.price.toLocaleString()}</td>}
                  {!isBoq && <td style={{border: '1px solid #e2e8f0', padding: '11px 14px', textAlign: 'right', fontWeight: '700', color: '#1d4ed8', fontSize: '14px'}}>{currency} {item.total.toLocaleString()}</td>}
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Totals */}
        {!isBoq && (
          <div style={{display: 'flex', justifyContent: 'flex-end', padding: '0 40px 28px'}}>
            <div style={{width: '340px', borderRadius: '10px', overflow: 'hidden', boxShadow: '0 2px 8px rgba(0,0,0,0.1)'}}>
              <div style={{background: '#f8fafc', padding: '14px 20px', display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid #e2e8f0', fontSize: '14px'}}>
                <span style={{color: '#475569'}}>Subtotal:</span>
                <span style={{fontWeight: '600'}}>{currency} {quotation.subtotal.toLocaleString()}</span>
              </div>
              {quotation.discountRate > 0 && (
                <div style={{background: '#fefce8', padding: '14px 20px', display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid #e2e8f0', fontSize: '14px'}}>
                  <span style={{color: '#92400e'}}>Discount ({quotation.discountRate}%):</span>
                  <span style={{fontWeight: '600', color: '#92400e'}}>-{currency} {quotation.discount.toLocaleString()}</span>
                </div>
              )}
              {quotation.taxRate > 0 && (
                <div style={{background: '#f8fafc', padding: '14px 20px', display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid #e2e8f0', fontSize: '14px'}}>
                  <span style={{color: '#475569'}}>VAT / Tax ({quotation.taxRate}%):</span>
                  <span style={{fontWeight: '600'}}>{currency} {quotation.tax.toLocaleString()}</span>
                </div>
              )}
              <div style={{background: 'var(--gradient-dark-surface)', padding: '18px 20px', display: 'flex', justifyContent: 'space-between', color: 'white'}}>
                <span style={{fontWeight: '800', fontSize: '16px'}}>GRAND TOTAL:</span>
                <span style={{fontWeight: '800', fontSize: '19px'}}>{currency} {quotation.total.toLocaleString()}</span>
              </div>
            </div>
          </div>
        )}

        {/* Notes */}
        {quotation.notes && (
          <div style={{margin: '0 40px 20px', background: '#eff6ff', borderLeft: '4px solid #3b82f6', padding: '16px 20px', borderRadius: '0 8px 8px 0'}}>
            <div style={{fontSize: '11px', fontWeight: '700', textTransform: 'uppercase', color: '#1d4ed8', marginBottom: '8px', letterSpacing: '1px'}}>NOTES:</div>
            <p style={{color: '#374151', fontSize: '14px', whiteSpace: 'pre-wrap'}}>{quotation.notes}</p>
          </div>
        )}

        {/* Terms */}
        {quotation.terms && (
          <div style={{margin: '0 40px 20px', background: '#f8fafc', borderLeft: '4px solid #94a3b8', padding: '16px 20px', borderRadius: '0 8px 8px 0'}}>
            <div style={{fontSize: '11px', fontWeight: '700', textTransform: 'uppercase', color: '#475569', marginBottom: '8px', letterSpacing: '1px'}}>TERMS & CONDITIONS:</div>
            <p style={{color: '#374151', fontSize: '14px', whiteSpace: 'pre-wrap'}}>{quotation.terms}</p>
          </div>
        )}

        {/* Signature Lines */}
        <div style={{margin: '32px 40px 0', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '60px'}}>
          <div style={{borderTop: '2px solid #1e293b', paddingTop: '10px'}}>
            <div style={{fontSize: '12px', color: '#64748b'}}>Authorized Signature &amp; Stamp</div>
            <div style={{fontSize: '14px', fontWeight: '600', marginTop: '4px'}}>{quotation.companyName || 'Pesa POS'}</div>
          </div>
          <div style={{borderTop: '2px solid #1e293b', paddingTop: '10px'}}>
            <div style={{fontSize: '12px', color: '#64748b'}}>Customer Acceptance Signature</div>
            <div style={{fontSize: '14px', fontWeight: '600', marginTop: '4px'}}>{quotation.customerName}</div>
          </div>
        </div>

        {/* Footer */}
        <div style={{background: '#1e293b', color: 'white', padding: '18px 40px', textAlign: 'center', marginTop: '32px'}}>
          <p style={{fontSize: '13px', opacity: '0.85'}}>This quotation is valid until {new Date(quotation.validUntil).toLocaleDateString()} &bull; Generated by Pesa POS</p>
          <p style={{fontSize: '11px', opacity: '0.6', marginTop: '4px'}}>Thank you for your business!</p>
        </div>
      </div>
    );
  };

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      {previewQuotation ? (
        /* ── PREVIEW MODE ── */
        <div className="w-full max-w-5xl max-h-[95vh] rounded-xl shadow-2xl overflow-hidden flex flex-col" style={{background: '#f1f5f9'}}>
          {/* Preview Header Bar */}
          <div style={{background: 'var(--gradient-dark-surface)'}} className="flex items-center justify-between p-5 flex-shrink-0">
            <div>
              <h2 className="text-xl font-bold text-white">{viewMode === 'boq' ? 'Bill of Quantities Preview' : 'Professional Quotation Preview'}</h2>
              <p className="text-blue-200 text-sm mt-1">{previewQuotation.customerName} &bull; {settings?.currency || 'TSH'} {previewQuotation.total.toLocaleString()}</p>
            </div>
            <div className="flex items-center gap-3">
              <div className="flex bg-white rounded-lg overflow-hidden" style={{border: '1px solid rgba(255,255,255,0.3)'}}>
                <button
                  onClick={() => setViewMode('quotation')}
                  style={{background: viewMode === 'quotation' ? 'white' : 'transparent', color: viewMode === 'quotation' ? '#1d4ed8' : 'white'}}
                  className="px-4 py-2 text-sm font-semibold transition-all"
                >Quotation</button>
                <button
                  onClick={() => setViewMode('boq')}
                  style={{background: viewMode === 'boq' ? 'white' : 'transparent', color: viewMode === 'boq' ? '#1d4ed8' : 'white'}}
                  className="px-4 py-2 text-sm font-semibold transition-all"
                >Bill of Quantities</button>
              </div>
              <button
                onClick={() => printQuotation(previewQuotation, viewMode === 'boq')}
                className="px-4 py-2 bg-white text-blue-800 rounded-lg text-sm font-bold hover:bg-blue-50 transition-colors shadow"
              >Print / Export PDF</button>
              <button
                onClick={() => setPreviewQuotation(null)}
                className="px-4 py-2 rounded-lg text-sm font-semibold transition-colors"
                style={{background: 'rgba(255,255,255,0.2)', color: 'white'}}
              >Close</button>
            </div>
          </div>
          <div className="flex-1 overflow-y-auto p-8">
            <ProfessionalDocument quotation={previewQuotation} isBoq={viewMode === 'boq'} />
          </div>
        </div>
      ) : (
        /* ── MAIN MODE ── */
        <div className="glass-card rounded-xl shadow-2xl w-full max-w-6xl max-h-[95vh] overflow-hidden flex flex-col">
          {/* Modal Header */}
          <div style={{background: 'var(--gradient-dark-surface)'}} className="p-6 flex items-center justify-between flex-shrink-0">
            <div>
              <h2 className="text-2xl font-bold text-white">Professional Quotations</h2>
              <p className="text-blue-200 mt-1 text-sm">Create, manage, and print professional quotations &amp; Bills of Quantities</p>
            </div>
            <button onClick={onClose} style={{background: 'rgba(255,255,255,0.2)'}} className="px-4 py-2 text-white rounded-lg hover:opacity-80 transition-opacity font-semibold text-sm">
              Close
            </button>
          </div>

          {/* Tabs */}
          <div className="flex border-b border-slate-200 bg-white flex-shrink-0">
            <button
              onClick={() => { setActiveTab("list"); resetForm(); }}
              className={`px-6 py-4 font-semibold text-sm border-b-2 transition-all ${
                activeTab === "list" ? "border-blue-600 text-blue-600" : "border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50"
              }`}
            >All Quotations ({quotations.length})</button>
            <button
              onClick={() => setActiveTab("create")}
              className={`px-6 py-4 font-semibold text-sm border-b-2 transition-all ${
                activeTab === "create" ? "border-blue-600 text-blue-600" : "border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50"
              }`}
            >{editingId ? 'Edit Quotation' : 'New Quotation'}</button>
          </div>

          {/* ── LIST TAB ── */}
          {activeTab === "list" && (
            <div className="flex flex-col flex-1 min-h-0">
              <div className="p-5 border-b border-slate-100 bg-slate-50 flex-shrink-0">
                <div className="flex items-center gap-3">
                  <input
                    className="form-input flex-1"
                    placeholder="Search by customer name, company, phone, or quotation ID…"
                    value={query}
                    onChange={e => setQuery(e.target.value)}
                  />
                  {query && <button onClick={() => setQuery("")} className="btn btn-outline btn-sm">Clear</button>}
                  <button onClick={() => setActiveTab("create")} className="btn btn-primary whitespace-nowrap">+ New Quotation</button>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto p-5">
                {filteredQuotations.length === 0 ? (
                  <div className="text-center py-16 text-slate-500">
                    <div className="text-6xl mb-4">📋</div>
                    <p className="text-xl font-semibold text-slate-700">No quotations yet</p>
                    <p className="text-sm mt-2 mb-6 text-slate-500">Start by creating your first professional quotation</p>
                    <button onClick={() => setActiveTab("create")} className="btn btn-primary">Create First Quotation</button>
                  </div>
                ) : (
                  <div className="space-y-4">
                    {filteredQuotations.map(quotation => {
                      const isExpired = quotation.validUntil && new Date(quotation.validUntil) < new Date();
                      return (
                        <div key={quotation.id} className="bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-all hover:border-blue-300 overflow-hidden">
                          <div style={{height: '4px', background: isExpired ? '#ef4444' : 'var(--gradient-badge)'}} />
                          <div className="p-5">
                            <div className="flex items-start justify-between mb-4">
                              <div className="flex-1 min-w-0 pr-4">
                                <div className="flex flex-wrap items-center gap-3">
                                  <h3 className="font-bold text-xl text-slate-800">{quotation.customerName}</h3>
                                  <span className={`px-3 py-1 rounded-full text-xs font-bold flex-shrink-0 ${isExpired ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>
                                    {isExpired ? 'EXPIRED' : 'ACTIVE'}
                                  </span>
                                </div>
                                {quotation.customerCompany && <p className="text-sm text-slate-600 mt-1">{quotation.customerCompany}</p>}
                                <div className="flex flex-wrap gap-4 mt-2 text-xs text-slate-500">
                                  {quotation.customerPhone && <span>Tel: {quotation.customerPhone}</span>}
                                  {quotation.customerEmail && <span>{quotation.customerEmail}</span>}
                                </div>
                              </div>
                              <div className="text-right flex-shrink-0">
                                <div className="text-3xl font-bold text-blue-700">{settings?.currency || 'TSH'} {quotation.total.toLocaleString()}</div>
                                <div className="text-xs text-slate-500 mt-1">{quotation.items.length} item{quotation.items.length !== 1 ? 's' : ''}</div>
                              </div>
                            </div>

                            <div className="grid grid-cols-3 gap-3 mb-4">
                              <div className="bg-blue-50 rounded-lg p-3 border border-blue-100">
                                <p className="text-xs text-blue-600 font-semibold uppercase tracking-wide mb-1">Reference</p>
                                <p className="font-mono font-bold text-slate-700 text-sm">{quotation.id.substring(0, 10)}</p>
                              </div>
                              <div className="bg-amber-50 rounded-lg p-3 border border-amber-100">
                                <p className="text-xs text-amber-600 font-semibold uppercase tracking-wide mb-1">Created</p>
                                <p className="font-bold text-slate-700 text-sm">{new Date(quotation.createdDate).toLocaleDateString()}</p>
                              </div>
                              <div className={`rounded-lg p-3 border ${isExpired ? 'bg-red-50 border-red-200' : 'bg-purple-50 border-purple-100'}`}>
                                <p className={`text-xs font-semibold uppercase tracking-wide mb-1 ${isExpired ? 'text-red-600' : 'text-purple-600'}`}>Valid Until</p>
                                <p className={`font-bold text-sm ${isExpired ? 'text-red-700' : 'text-slate-700'}`}>{new Date(quotation.validUntil).toLocaleDateString()}</p>
                              </div>
                            </div>

                            {quotation.notes && (
                              <div className="mb-4 p-3 bg-blue-50 rounded-lg text-sm text-slate-700 border-l-2 border-blue-400">
                                <span className="font-semibold text-blue-800">Note: </span>{quotation.notes.substring(0, 120)}{quotation.notes.length > 120 && '...'}
                              </div>
                            )}

                            <div className="flex gap-2 pt-3 border-t border-slate-100">
                              <button onClick={() => setPreviewQuotation(quotation)} className="flex-1 px-4 py-2.5 rounded-lg bg-blue-600 text-white hover:bg-blue-700 text-sm font-semibold transition-colors">
                                View / Print
                              </button>
                              <button onClick={() => startEdit(quotation)} className="flex-1 px-4 py-2.5 rounded-lg border border-slate-300 bg-white text-slate-700 hover:bg-slate-50 text-sm font-semibold transition-colors">
                                Edit
                              </button>
                              <button
                                onClick={() => { if (confirm(`Delete quotation for ${quotation.customerName}?`)) { onDeleteQuotation(quotation.id); } }}
                                className="px-4 py-2.5 rounded-lg border border-red-200 bg-red-50 text-red-600 hover:bg-red-100 text-sm font-semibold transition-colors"
                              >Delete</button>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ── CREATE/EDIT TAB ── */}
          {activeTab === "create" && (
            <div className="flex-1 overflow-y-auto p-6">
              <div className="grid md:grid-cols-2 gap-6">
                {/* Left Column */}
                <div className="space-y-5">
                  {/* Customer Info */}
                  <div className="rounded-xl border border-slate-200 shadow-sm overflow-hidden bg-white">
                    <div style={{background: 'var(--gradient-badge)'}} className="px-5 py-3.5">
                      <h3 className="font-bold text-white text-sm uppercase tracking-wider">Customer Information</h3>
                    </div>
                    <div className="p-5 space-y-4">
                      <div>
                        <label className="form-label">Customer Name <span className="text-red-500">*</span></label>
                        <input type="text" value={customerName} onChange={(e) => setCustomerName(e.target.value)} className="form-input" placeholder="Full name" />
                      </div>
                      <div>
                        <label className="form-label">Company / Organization</label>
                        <input type="text" value={customerCompany} onChange={(e) => setCustomerCompany(e.target.value)} className="form-input" placeholder="Company or business name" />
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="form-label">Phone</label>
                          <input type="tel" value={customerPhone} onChange={(e) => setCustomerPhone(e.target.value)} className="form-input" placeholder="+255 XXX XXX" />
                        </div>
                        <div>
                          <label className="form-label">Email</label>
                          <input type="email" value={customerEmail} onChange={(e) => setCustomerEmail(e.target.value)} className="form-input" placeholder="email@example.com" />
                        </div>
                      </div>
                      <div>
                        <label className="form-label">Address</label>
                        <input type="text" value={customerAddress} onChange={(e) => setCustomerAddress(e.target.value)} className="form-input" placeholder="Street address, City" />
                      </div>
                      <div>
                        <label className="form-label">Valid Until</label>
                        <input type="date" value={validUntil} onChange={(e) => setValidUntil(e.target.value)} className="form-input" />
                      </div>
                    </div>
                  </div>

                  {/* Company Info */}
                  <div className="rounded-xl border border-slate-200 shadow-sm overflow-hidden bg-white">
                    <div style={{background: 'var(--gradient-dark-surface)'}} className="px-5 py-3.5">
                      <h3 className="font-bold text-white text-sm uppercase tracking-wider">Your Company Details</h3>
                    </div>
                    <div className="p-5 space-y-4">
                      <div>
                        <label className="form-label">Company Name</label>
                        <input type="text" value={companyName} onChange={(e) => setCompanyName(e.target.value)} className="form-input" placeholder="Your company name" />
                      </div>
                      <div>
                        <label className="form-label">Logo</label>
                        <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg text-sm">
                          {settings?.logoData ? (
                            <div className="flex items-center gap-3">
                              <img src={settings.logoData} alt="Logo" className="h-10 w-10 object-contain rounded" />
                              <div>
                                <p className="font-semibold text-blue-800">Logo is active</p>
                                <p className="text-xs text-blue-600 mt-0.5">Will appear on printed quotations</p>
                              </div>
                            </div>
                          ) : (
                            <p className="text-blue-700 text-xs">Upload a logo in Receipt settings to display it on quotations.</p>
                          )}
                        </div>
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="form-label">Company Phone</label>
                          <input type="tel" value={companyPhone} onChange={(e) => setCompanyPhone(e.target.value)} className="form-input" placeholder="+255 XXX XXX" />
                        </div>
                        <div>
                          <label className="form-label">Company Email</label>
                          <input type="email" value={companyEmail} onChange={(e) => setCompanyEmail(e.target.value)} className="form-input" placeholder="company@example.com" />
                        </div>
                      </div>
                      <div>
                        <label className="form-label">Company Address</label>
                        <input type="text" value={companyAddress} onChange={(e) => setCompanyAddress(e.target.value)} className="form-input" placeholder="Street, City, Country" />
                      </div>
                    </div>
                  </div>

                  {/* Financial */}
                  <div className="rounded-xl border border-slate-200 shadow-sm overflow-hidden bg-white">
                    <div style={{background: 'linear-gradient(90deg, #065f46, #059669)'}} className="px-5 py-3.5">
                      <h3 className="font-bold text-white text-sm uppercase tracking-wider">Financial Settings</h3>
                    </div>
                    <div className="p-5">
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="form-label">Discount (%)</label>
                          <input type="number" value={discountRate} onChange={(e) => setDiscountRate(Math.max(0, Number(e.target.value)))} className="form-input" placeholder="0" min="0" max="100" step="0.01" />
                        </div>
                        <div>
                          <label className="form-label">Tax / VAT (%)</label>
                          <input type="number" value={taxRate} onChange={(e) => setTaxRate(Math.max(0, Number(e.target.value)))} className="form-input" placeholder="0" min="0" max="100" step="0.01" />
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Notes & Terms */}
                  <div className="rounded-xl border border-slate-200 shadow-sm overflow-hidden bg-white">
                    <div style={{background: 'linear-gradient(90deg, #78350f, #b45309)'}} className="px-5 py-3.5">
                      <h3 className="font-bold text-white text-sm uppercase tracking-wider">Notes &amp; Terms</h3>
                    </div>
                    <div className="p-5 space-y-4">
                      <div>
                        <label className="form-label">Payment Terms</label>
                        <textarea value={terms} onChange={(e) => setTerms(e.target.value)} className="form-input resize-none" style={{height: '80px'}} placeholder="E.g., Payment due within 30 days, 50% advance required..." />
                      </div>
                      <div>
                        <label className="form-label">Additional Notes</label>
                        <textarea value={notes} onChange={(e) => setNotes(e.target.value)} className="form-input resize-none" style={{height: '80px'}} placeholder="Special instructions or remarks..." />
                      </div>
                    </div>
                  </div>
                </div>

                {/* Right Column */}
                <div className="space-y-5">
                  {/* Add Item */}
                  <div className="rounded-xl border border-slate-200 shadow-sm overflow-hidden bg-white">
                    <div style={{background: 'linear-gradient(90deg, #4c1d95, #7c3aed)'}} className="px-5 py-3.5">
                      <h3 className="font-bold text-white text-sm uppercase tracking-wider">Add Line Items</h3>
                    </div>
                    <div className="p-5 space-y-4">
                      <div>
                        <label className="form-label">Item Name <span className="text-red-500">*</span></label>
                        <input type="text" value={itemName} onChange={(e) => setItemName(e.target.value)} className="form-input" placeholder="Product or service name" />
                      </div>
                      <div>
                        <label className="form-label">Description (optional)</label>
                        <input type="text" value={itemDescription} onChange={(e) => setItemDescription(e.target.value)} className="form-input" placeholder="Additional details" />
                      </div>
                      <div className="grid grid-cols-3 gap-3">
                        <div>
                          <label className="form-label">Qty <span className="text-red-500">*</span></label>
                          <input type="number" value={itemQty} onChange={(e) => setItemQty(e.target.value)} className="form-input" placeholder="0" min="1" />
                        </div>
                        <div>
                          <label className="form-label">Unit</label>
                          <select value={itemUnit} onChange={(e) => setItemUnit(e.target.value)} className="form-input">
                            <option value="pcs">pcs</option>
                            <option value="box">box</option>
                            <option value="kg">kg</option>
                            <option value="m">m</option>
                            <option value="hour">hour</option>
                            <option value="day">day</option>
                            <option value="set">set</option>
                            <option value="lot">lot</option>
                          </select>
                        </div>
                        <div>
                          <label className="form-label">Unit Price <span className="text-red-500">*</span></label>
                          <input type="number" value={itemPrice} onChange={(e) => setItemPrice(e.target.value)} className="form-input" placeholder="0" min="0" step="0.01" />
                        </div>
                      </div>
                      {itemName.trim() && itemQty && itemPrice && (
                        <div className="p-3 bg-purple-50 border border-purple-200 rounded-lg text-sm">
                          <span className="text-purple-700 font-semibold">Preview: </span>
                          <span className="text-slate-700">{itemQty} {itemUnit} &times; {settings?.currency || 'TSH'} {Number(itemPrice).toLocaleString()} = </span>
                          <span className="font-bold text-purple-700">{settings?.currency || 'TSH'} {(Number(itemQty) * Number(itemPrice)).toLocaleString()}</span>
                        </div>
                      )}
                      <button onClick={addItem} className="btn btn-primary w-full py-3 font-bold text-base">
                        + Add Item to Quotation
                      </button>
                    </div>
                  </div>

                  {/* Line Items List */}
                  <div className="rounded-xl border border-slate-200 shadow-sm overflow-hidden bg-white">
                    <div style={{background: 'linear-gradient(90deg, #0c4a6e, #0284c7)'}} className="px-5 py-3.5 flex justify-between items-center">
                      <h3 className="font-bold text-white text-sm uppercase tracking-wider">Line Items ({quotationItems.length})</h3>
                      {quotationItems.length > 0 && (
                        <span className="text-blue-100 font-bold text-sm">{settings?.currency || 'TSH'} {calculateTotal().toLocaleString()}</span>
                      )}
                    </div>
                    <div className="p-5">
                      {quotationItems.length === 0 ? (
                        <div className="text-center py-10 text-slate-400">
                          <div className="text-4xl mb-3">📦</div>
                          <p className="font-medium text-sm">No items added yet</p>
                          <p className="text-xs mt-1">Use the form above to add items</p>
                        </div>
                      ) : (
                        <div className="space-y-2">
                          {quotationItems.map((item, idx) => (
                            <div key={item.id} className="flex items-start justify-between p-3 bg-slate-50 rounded-lg border border-slate-200 text-sm hover:border-blue-200 transition-colors">
                              <div className="flex-1 min-w-0">
                                <div className="flex items-center gap-2">
                                  <span className="w-6 h-6 bg-blue-600 text-white rounded-full text-xs flex items-center justify-center font-bold flex-shrink-0">{idx + 1}</span>
                                  <span className="font-semibold text-slate-800 truncate">{item.name}</span>
                                </div>
                                {item.description && <div className="text-xs text-slate-500 mt-1 ml-8">{item.description}</div>}
                                <div className="text-xs text-slate-600 mt-1 ml-8">
                                  {item.quantity} {item.unit} &times; {settings?.currency || 'TSH'} {item.price.toLocaleString()} = <strong className="text-blue-700">{settings?.currency || 'TSH'} {item.total.toLocaleString()}</strong>
                                </div>
                              </div>
                              <button onClick={() => removeItem(item.id)} className="ml-3 px-2 py-1 text-xs text-red-600 hover:bg-red-50 rounded border border-transparent hover:border-red-200 transition-colors font-semibold flex-shrink-0">
                                Remove
                              </button>
                            </div>
                          ))}

                          {/* Totals Summary */}
                          <div className="mt-4 border-t-2 border-slate-200 pt-3 space-y-1">
                            <div className="flex justify-between text-sm py-1.5">
                              <span className="text-slate-600">Subtotal:</span>
                              <span className="font-semibold">{settings?.currency || 'TSH'} {calculateSubtotal().toLocaleString()}</span>
                            </div>
                            {discountRate > 0 && (
                              <div className="flex justify-between text-sm py-1.5 text-amber-700">
                                <span>Discount ({discountRate}%):</span>
                                <span className="font-semibold">-{settings?.currency || 'TSH'} {calculateDiscount().toLocaleString()}</span>
                              </div>
                            )}
                            {taxRate > 0 && (
                              <div className="flex justify-between text-sm py-1.5">
                                <span className="text-slate-600">Tax / VAT ({taxRate}%):</span>
                                <span className="font-semibold">{settings?.currency || 'TSH'} {calculateTax().toLocaleString()}</span>
                              </div>
                            )}
                            <div className="flex justify-between py-3.5 px-4 rounded-xl font-bold text-lg text-white mt-2" style={{background: 'var(--gradient-badge)'}}>
                              <span>GRAND TOTAL:</span>
                              <span>{settings?.currency || 'TSH'} {calculateTotal().toLocaleString()}</span>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Action Buttons */}
                  <div className="flex gap-3">
                    <button onClick={() => { resetForm(); setActiveTab("list"); }} className="btn btn-outline flex-1 py-3">
                      Cancel
                    </button>
                    <button
                      onClick={handleSave}
                      disabled={!customerName.trim() || quotationItems.length === 0}
                      className="flex-1 py-3 rounded-lg font-bold text-base transition-all"
                      style={{
                        background: (!customerName.trim() || quotationItems.length === 0) ? '#e2e8f0' : 'var(--gradient-badge)',
                        color: (!customerName.trim() || quotationItems.length === 0) ? '#94a3b8' : 'white',
                        cursor: (!customerName.trim() || quotationItems.length === 0) ? 'not-allowed' : 'pointer'
                      }}
                    >
                      {editingId ? 'Update Quotation' : 'Save Quotation'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ---------- Analytics Modal ---------- */
function AnalyticsModal({ sales = [], products = [], expenses = [], settings, onClose }) {
  const chart1Ref = useRef(null);
  const chart2Ref = useRef(null);
  const chart3Ref = useRef(null);
  const chart1Instance = useRef(null);
  const chart2Instance = useRef(null);
  const chart3Instance = useRef(null);
  const [activeTab, setActiveTab] = useState('overview');

  const currency = settings?.currency || 'TSH';

  // Calculate metrics
  const totalRevenue = sales.reduce((sum, s) => sum + s.total, 0);
  const totalQty = sales.reduce((sum, s) => sum + s.quantity, 0);
  const avgTransaction = sales.length > 0 ? totalRevenue / sales.length : 0;
  const cashSales = sales.filter(s => s.payment_method === 'cash').length;
  const creditSales = sales.filter(s => s.payment_method === 'credit').length;
  const totalExpenses = expenses.reduce((sum, e) => sum + (parseFloat(e.amount) || 0), 0);
  const netRevenue = totalRevenue - totalExpenses;
  const profitMargin = totalRevenue > 0 ? ((netRevenue / totalRevenue) * 100).toFixed(1) : '0.0';

  const prodRevTotals = {};
  sales.forEach(sale => { prodRevTotals[sale.name] = (prodRevTotals[sale.name] || 0) + sale.total; });
  const topProductEntry = Object.entries(prodRevTotals).sort((a, b) => b[1] - a[1])[0];

  const kpiCards = [
    { label: 'Total Revenue',    value: `${currency} ${totalRevenue.toLocaleString()}`,              accent: '#10b981', bg: 'rgba(16,185,129,0.1)',   icon: 'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z' },
    { label: 'Total Expenses',   value: `${currency} ${totalExpenses.toLocaleString()}`,             accent: '#ef4444', bg: 'rgba(239,68,68,0.1)',    icon: 'M19 3H5c-1.1 0-2 .9-2 2v14l7-3 7 3V5c0-1.1-.9-2-2-2z' },
    { label: 'Net Profit',       value: `${currency} ${netRevenue.toLocaleString()}`,                accent: netRevenue >= 0 ? '#38bdf8' : '#f87171', bg: netRevenue >= 0 ? 'rgba(56,189,248,0.1)' : 'rgba(248,113,113,0.1)', icon: 'M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z' },
    { label: 'Profit Margin',    value: `${profitMargin}%`,                                          accent: '#a78bfa', bg: 'rgba(167,139,250,0.1)', icon: 'M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z' },
    { label: 'Transactions',     value: sales.length.toLocaleString(),                               accent: '#fbbf24', bg: 'rgba(251,191,36,0.1)',  icon: 'M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z' },
    { label: 'Avg Transaction',  value: `${currency} ${Math.round(avgTransaction).toLocaleString()}`, accent: '#f472b6', bg: 'rgba(244,114,182,0.1)', icon: 'M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z' },
    { label: 'Cash Sales',       value: cashSales.toLocaleString(),                                  accent: '#34d399', bg: 'rgba(52,211,153,0.1)',  icon: 'M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z' },
    { label: 'Credit Sales',     value: creditSales.toLocaleString(),                                accent: '#fb923c', bg: 'rgba(251,146,60,0.1)',  icon: 'M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z' },
  ];

  useEffect(() => {
    const draw = () => {
      if (activeTab !== 'overview') return;
      try {
        if (window.Chart) {
          Chart.defaults.font.family = 'Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
          Chart.defaults.font.size = 12;
          Chart.defaults.color = '#475569';
          Chart.defaults.plugins.legend.labels.usePointStyle = true;
          Chart.defaults.plugins.tooltip.cornerRadius = 10;
          Chart.defaults.plugins.tooltip.padding = 10;
        }

        // Revenue vs Expenses line chart
        const byDate = {};
        const expenseByDate = {};
        sales.forEach(sale => {
          const date = new Date(sale.timestamp).toLocaleDateString();
          byDate[date] = (byDate[date] || 0) + sale.total;
        });
        expenses.forEach(expense => {
          const date = new Date(expense.date).toLocaleDateString();
          expenseByDate[date] = (expenseByDate[date] || 0) + (parseFloat(expense.amount) || 0);
        });
        const labels = Array.from(new Set([...Object.keys(byDate), ...Object.keys(expenseByDate)])).sort((a, b) => new Date(a) - new Date(b)).slice(-7);
        const data = labels.map(l => byDate[l] || 0);
        const expenseData = labels.map(l => expenseByDate[l] || 0);
        if (chart1Ref.current && window.Chart) {
          if (chart1Instance.current) chart1Instance.current.destroy();
          const ctx = chart1Ref.current.getContext('2d');
          const revGrad = ctx.createLinearGradient(0, 0, 0, 260);
          revGrad.addColorStop(0, 'rgba(37,99,235,0.22)');
          revGrad.addColorStop(1, 'rgba(37,99,235,0.01)');
          const expGrad = ctx.createLinearGradient(0, 0, 0, 260);
          expGrad.addColorStop(0, 'rgba(249,115,22,0.18)');
          expGrad.addColorStop(1, 'rgba(249,115,22,0.01)');
          chart1Instance.current = new Chart(chart1Ref.current, {
            type: 'line',
            data: {
              labels,
              datasets: [{
                label: 'Revenue',
                data,
                backgroundColor: revGrad,
                borderColor: '#2563eb',
                borderWidth: 2.5,
                tension: 0.42,
                fill: true,
                pointRadius: 5,
                pointBackgroundColor: '#fff',
                pointBorderColor: '#2563eb',
                pointBorderWidth: 2
              }, {
                label: 'Expenses',
                data: expenseData,
                backgroundColor: expGrad,
                borderColor: '#f97316',
                borderWidth: 2.5,
                tension: 0.42,
                fill: true,
                pointRadius: 5,
                pointBackgroundColor: '#fff',
                pointBorderColor: '#f97316',
                pointBorderWidth: 2
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: true, position: 'bottom', labels: { boxWidth: 10, padding: 18, font: { size: 12 } } },
                tooltip: { callbacks: { label: c => ` ${currency} ${c.parsed.y.toLocaleString()}` } }
              },
              scales: {
                x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 11 } } },
                y: { beginAtZero: true, grid: { color: 'rgba(148,163,184,0.15)' }, ticks: { color: '#64748b', font: { size: 11 }, callback: v => currency + ' ' + (v >= 1000 ? (v/1000).toFixed(0)+'k' : v) } }
              }
            }
          });
        }

        // Top products horizontal bar chart
        const prodTotals = {};
        sales.forEach(sale => { prodTotals[sale.name] = (prodTotals[sale.name] || 0) + sale.total; });
        const prodEntries = Object.entries(prodTotals).sort((a, b) => b[1] - a[1]).slice(0, 8);
        const prodLabels = prodEntries.map(e => e[0]);
        const prodData = prodEntries.map(e => e[1]);
        if (chart2Ref.current && window.Chart) {
          if (chart2Instance.current) chart2Instance.current.destroy();
          const ctx2 = chart2Ref.current.getContext('2d');
          const barColors = prodData.map((_, i) => {
            const alpha = 1 - i * 0.08;
            return `rgba(37,99,235,${Math.max(0.35, alpha)})`;
          });
          chart2Instance.current = new Chart(chart2Ref.current, {
            type: 'bar',
            data: {
              labels: prodLabels.map(l => l.length > 18 ? l.substring(0, 16) + '…' : l),
              datasets: [{
                label: 'Revenue',
                data: prodData,
                backgroundColor: barColors,
                borderColor: 'transparent',
                borderRadius: 6,
                borderSkipped: false
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              indexAxis: 'y',
              plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: c => ` ${currency} ${c.parsed.x.toLocaleString()}` } }
              },
              scales: {
                x: { beginAtZero: true, grid: { color: 'rgba(148,163,184,0.15)' }, ticks: { color: '#64748b', font: { size: 11 }, callback: v => currency + ' ' + (v >= 1000 ? (v/1000).toFixed(0)+'k' : v) } },
                y: { grid: { display: false }, ticks: { color: '#334155', font: { size: 11, weight: '500' } } }
              }
            }
          });
        }

        // Payment methods doughnut
        const paymentCounts = {};
        sales.forEach(sale => {
          const method = sale.payment_method || 'cash';
          paymentCounts[method] = (paymentCounts[method] || 0) + sale.total;
        });
        const paymentLabels = Object.keys(paymentCounts);
        const paymentData = paymentLabels.map(l => paymentCounts[l]);
        if (chart3Ref.current && window.Chart) {
          if (chart3Instance.current) chart3Instance.current.destroy();
          chart3Instance.current = new Chart(chart3Ref.current, {
            type: 'doughnut',
            data: {
              labels: paymentLabels.map(l => l.charAt(0).toUpperCase() + l.slice(1)),
              datasets: [{
                data: paymentData,
                backgroundColor: ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'],
                hoverOffset: 14,
                borderWidth: 3,
                borderColor: '#fff'
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              cutout: '62%',
              plugins: {
                legend: { display: true, position: 'bottom', labels: { padding: 14, font: { size: 12 }, boxWidth: 12 } },
                tooltip: { callbacks: { label: c => ` ${currency} ${c.parsed.toLocaleString()}` } }
              }
            }
          });
        }
      } catch (e) {
        console.warn('chart draw failed', e);
      }
    };

    if (!window.Chart) {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/chart.js';
      s.onload = draw;
      document.body.appendChild(s);
    } else {
      draw();
    }

    return () => {
      [chart1Instance.current, chart2Instance.current, chart3Instance.current].forEach(chart => {
        if (chart && typeof chart.destroy === 'function') chart.destroy();
      });
    };
  }, [sales, expenses, activeTab]);

  const tabs = [
    { id: 'overview', label: 'Overview', svgPath: 'M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z' },
    { id: 'details',  label: 'Products', svgPath: 'M20 3H5c-1.1 0-2 .9-2 2v14l7-3 7 3V5c0-1.1-.9-2-2-2z' },
  ];

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-2 z-50">
      <div className="glass-card page-modal rounded-2xl shadow-2xl w-full max-w-6xl max-h-[95vh] flex flex-col overflow-hidden" style={{background: 'rgba(248,250,252,0.55)'}}>

        {/* Header */}
        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background: 'rgba(255,255,255,0.15)', borderRadius: '12px', padding: '9px', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M3 3v18h18M7 16l4-4 4 4 4-8" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <div>
              <h2 style={{color: '#fff', fontSize: '1.3rem', fontWeight: 800, margin: 0, letterSpacing: '-0.01em'}}>Sales Analytics</h2>
              <p className="theme-header-subtext" style={{fontSize: '0.8rem', margin: 0}}>{sales.length} transactions &nbsp;·&nbsp; {currency}</p>
            </div>
          </div>
          <button
            onClick={onClose}
            style={{background: 'rgba(255,255,255,0.15)', border: '1px solid rgba(255,255,255,0.2)', borderRadius: '10px', padding: '7px 16px', color: '#fff', fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '6px', fontSize: '0.88rem', transition: 'background 0.18s'}}
            onMouseOver={e => e.currentTarget.style.background='rgba(255,255,255,0.25)'}
            onMouseOut={e => e.currentTarget.style.background='rgba(255,255,255,0.15)'}
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
            Close
          </button>
        </div>

        {/* KPI Strip */}
        <div style={{padding: '1rem 1.25rem 0.5rem', flexShrink: 0}}>
          <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(148px, 1fr))', gap: '0.6rem'}}>
            {kpiCards.map((card, i) => (
              <div key={i} style={{background: '#fff', borderRadius: '14px', padding: '0.85rem 1rem', border: '1px solid rgba(203,213,225,0.55)', boxShadow: '0 1px 8px rgba(15,23,42,0.05)', display: 'flex', flexDirection: 'column', gap: '0.4rem'}}>
                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between'}}>
                  <span style={{fontSize: '0.7rem', color: '#94a3b8', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em'}}>{card.label}</span>
                  <div style={{background: card.bg, borderRadius: '8px', padding: '5px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill={card.accent}><path d={card.icon}/></svg>
                  </div>
                </div>
                <div style={{fontSize: '1.05rem', fontWeight: 800, color: card.accent, lineHeight: 1.1, wordBreak: 'break-word'}}>{card.value}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Tabs */}
        <div style={{display: 'flex', gap: '0', padding: '0 1.25rem', background: '#fff', borderBottom: '1px solid rgba(203,213,225,0.5)', flexShrink: 0, marginTop: '0.75rem'}}>
          {tabs.map(tab => (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              style={{
                display: 'flex', alignItems: 'center', gap: '6px',
                padding: '0.65rem 1.25rem',
                border: 'none',
                borderBottom: activeTab === tab.id ? '2.5px solid #2563eb' : '2.5px solid transparent',
                background: 'transparent',
                color: activeTab === tab.id ? '#2563eb' : '#64748b',
                fontWeight: activeTab === tab.id ? 700 : 500,
                fontSize: '0.88rem',
                cursor: 'pointer',
                transition: 'all 0.15s',
                marginBottom: '-1px'
              }}
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d={tab.svgPath}/></svg>
              {tab.label}
            </button>
          ))}
        </div>

        {/* Scrollable content */}
        <div className="flex-1 overflow-y-auto" style={{padding: '1.1rem 1.25rem 1.25rem', minHeight: 0}}>
          {activeTab === 'overview' && (
            <div style={{display: 'flex', flexDirection: 'column', gap: '1rem'}}>
              <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem'}}>
                {/* Revenue vs Expenses line */}

                  <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '0.75rem'}}>
                    <h3 style={{fontWeight: 700, color: '#0f172a', fontSize: '0.93rem', margin: 0}}>Revenue vs Expenses</h3>
                    <span style={{background: 'rgba(15,23,42,0.05)', borderRadius: '99px', padding: '3px 10px', fontSize: '0.75rem', color: '#475569', border: '1px solid rgba(148,163,184,0.2)', fontWeight: 600}}>Last 7 days</span>
                  </div>
                  <div style={{height: '230px'}}>
                    <canvas ref={chart1Ref} style={{maxHeight: '100%', width: '100%'}} />
                  </div>
                </div>
                {/* Payment methods doughnut */}
