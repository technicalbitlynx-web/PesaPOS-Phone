                    } catch { showToast('Network error', 'error'); }
                };

                renderDevices();
            }

            // ==================== HYBRID STORAGE — PesaDB (IndexedDB via Dexie) ====================
            const _apkDb = new Dexie('PesaPOS_APK_v1');
            _apkDb.version(1).stores({
                products:       'id, name, category, updatedAt',
                sales:          'id, date, updatedAt',
                customers:      'id, name, updatedAt',
                expenses:       'id, date, updatedAt',
                suppliers:      'id, name, updatedAt',
                purchaseOrders: 'id, date, updatedAt',
                shifts:         '++_seq, openedAt',
                kv:             'key',
                syncQueue:      '++id, table, ts',
            });

            const PesaDB = {
                async put(table, data) {
                    try {
                        const arr = Array.isArray(data) ? data : [data];
                        const ts = new Date().toISOString();
                        await _apkDb[table].bulkPut(arr.map(r => ({ ...r, updatedAt: r.updatedAt || ts })));
                    } catch (e) { console.warn('PesaDB.put', table, e.message); }
                },
                async getAll(table) {
                    try { return await _apkDb[table].toArray(); } catch { return []; }
                },
                async merge(table, incoming) {
                    if (!incoming?.length) return;
                    const keys = incoming.map(r => r.id).filter(Boolean);
                    if (!keys.length) { await PesaDB.put(table, incoming); return; }
                    const existing = await _apkDb[table].bulkGet(keys);
                    const toWrite = incoming.filter((r, i) => !existing[i] || (r.updatedAt || '') >= (existing[i].updatedAt || ''));
                    if (toWrite.length) await _apkDb[table].bulkPut(toWrite);
                },
                async getKV(key, fallback) {
                    try { const r = await _apkDb.kv.get(key); return r ? r.val : fallback; } catch { return fallback; }
                },
                async putKV(key, val) { try { await _apkDb.kv.put({ key, val }); } catch {} },
                async migrate() {
                    const done = await PesaDB.getKV('apk_migrated_v1', false);
                    if (done) return;
                    const tables = { products, sales, customers, expenses, suppliers, purchaseOrders, shifts };
                    for (const [t, rows] of Object.entries(tables)) {
                        if (rows?.length) await PesaDB.put(t, rows);
                    }
                    await PesaDB.putKV('apk_migrated_v1', true);
                },
            };

            // ==================== REAL-TIME SOCKET SYNC ====================
            let _posSocket = null;
            let _receivingSocketData = false;

            function connectPosSocket() {
                if (!posmsUrl || !posmsKey) return;
                if (_posSocket?.connected) return;
                const base = posmsBase();
                const doConnect = () => {
                    if (typeof io === 'undefined' || _posSocket?.connected) return;
                    _posSocket = io(base, {
                        auth: { device_id: posDeviceId, license_key: posmsKey },
                        transports: ['websocket', 'polling'],
                        reconnection: true, reconnectionDelay: 5000,
                    });
                    _posSocket.on('connect', async () => {
                        const queued = await _apkDb.syncQueue.toArray().catch(() => []);
                        for (const item of queued) {
                            try { socketPushData(JSON.parse(item.data), true); await _apkDb.syncQueue.delete(item.id); }
                            catch { break; }
                        }
                    });
                    _posSocket.on('pos:data-push', async (payload) => {
                        _receivingSocketData = true;
                        try {
                            const { products: p, sales: s, customers: c, expenses: ex, suppliers: su } = payload;
                            if (p?.length)  { await PesaDB.merge('products',  p);  products  = await PesaDB.getAll('products');  localStorage.setItem(STORAGE_PROD, JSON.stringify(products)); }
                            if (s?.length)  { await PesaDB.merge('sales',     s);  sales     = await PesaDB.getAll('sales');     localStorage.setItem('profitpoint_sales', JSON.stringify(sales)); }
                            if (c?.length)  { await PesaDB.merge('customers', c);  customers = await PesaDB.getAll('customers'); localStorage.setItem('profitpoint_customers', JSON.stringify(customers)); }
                            if (ex?.length) { await PesaDB.merge('expenses',  ex); expenses  = await PesaDB.getAll('expenses');  localStorage.setItem('profitpoint_expenses', JSON.stringify(expenses)); }
                            if (su?.length) { await PesaDB.merge('suppliers', su); suppliers = await PesaDB.getAll('suppliers'); localStorage.setItem('profitpoint_suppliers', JSON.stringify(suppliers)); }
                            if (p?.length || s?.length || c?.length || ex?.length || su?.length) {
                                showToast('Data synced from another device', 'info');
                            }
                        } catch (e) { console.warn('pos:data-push error', e.message); }
                        _receivingSocketData = false;
                    });
                    _posSocket.on('pos:refresh', (payload) => {
                        if (payload?.reason === 'device_reassigned' || payload?.reason === 'device_deregistered') {
                            posDeviceType = null;
                            localStorage.removeItem('pesa_device_type');
                            if (typeof logout === 'function') logout();
                        }
                    });
                    _posSocket.on('pos:message', (d) => showToast(d.message || 'Message from admin', 'info'));
                };
                if (typeof io !== 'undefined') { doConnect(); }
                else {
                    const s = document.createElement('script');
                    s.src = `${base}/socket.io/socket.io.js`;
                    s.onload = doConnect;
                    s.onerror = () => console.warn('socket.io unavailable');
                    document.head.appendChild(s);
                }
            }

            function socketPushData(delta, skipQueue = false) {
                if (_receivingSocketData) return;
                if (!_posSocket?.connected) {
                    if (!skipQueue) Object.entries(delta).forEach(([t, d]) => {
                        if (d?.length) _apkDb.syncQueue.add({ table: t, data: JSON.stringify(d), ts: Date.now() }).catch(() => {});
                    });
                    return;
                }
                _posSocket.emit('pos:data-push', { device_id: posDeviceId, license_key: posmsKey, timestamp: new Date().toISOString(), ...delta });
            }

            async function initHybridStorage() {
                await PesaDB.migrate();
                const [prods, sls, custs, exps, supps] = await Promise.all([
                    PesaDB.getAll('products'), PesaDB.getAll('sales'), PesaDB.getAll('customers'),
                    PesaDB.getAll('expenses'),  PesaDB.getAll('suppliers'),
                ]);
                if (prods.length)  products   = prods;
                if (sls.length)    sales       = sls;
                if (custs.length)  customers   = custs;
                if (exps.length)   expenses    = exps;
                if (supps.length)  suppliers   = supps;
                connectPosSocket();
            }

            // ==================== UTILITY FUNCTIONS ====================
            function saveProducts()  { localStorage.setItem(STORAGE_PROD, JSON.stringify(products)); PesaDB.put('products', products); if (!_receivingSocketData) socketPushData({ products }); }
            function saveSales()     { localStorage.setItem('profitpoint_sales', JSON.stringify(sales)); PesaDB.put('sales', sales); if (!_receivingSocketData) socketPushData({ sales }); }
            function saveExpenses()  { localStorage.setItem('profitpoint_expenses', JSON.stringify(expenses)); PesaDB.put('expenses', expenses); if (!_receivingSocketData) socketPushData({ expenses }); }
            function saveCustomers() { localStorage.setItem('profitpoint_customers', JSON.stringify(customers)); PesaDB.put('customers', customers); if (!_receivingSocketData) socketPushData({ customers }); }
            function saveSuppliers() { localStorage.setItem('profitpoint_suppliers', JSON.stringify(suppliers)); PesaDB.put('suppliers', suppliers); if (!_receivingSocketData) socketPushData({ suppliers }); }
            function savePurchaseOrders() { localStorage.setItem('profitpoint_purchase_orders', JSON.stringify(purchaseOrders)); PesaDB.put('purchaseOrders', purchaseOrders); }
            function saveShifts()    { localStorage.setItem('profitpoint_shifts', JSON.stringify(shifts)); PesaDB.put('shifts', shifts); }
            function saveAuditLogs() { localStorage.setItem('profitpoint_audit_logs', JSON.stringify(auditLogs)); }
            function saveNotifications() { localStorage.setItem('profitpoint_notifications', JSON.stringify(notifications)); }
            function saveUsers()     { localStorage.setItem(USERS_KEY, JSON.stringify(users)); PesaDB.put('users', users); }
            function saveBrand()     { localStorage.setItem('profitpoint_brand', JSON.stringify(shopBrand)); }
            function saveCart()      { localStorage.setItem('profitpoint_cart', JSON.stringify(cart)); }
            function saveWallpaper() { localStorage.setItem('profitpoint_wallpaper', wallpaperImage); }
            function saveWallpaperOpacity(v) { localStorage.setItem('profitpoint_wallpaper_opacity', v); }
            function saveReceiptSettings()  { localStorage.setItem('profitpoint_receipt_settings', JSON.stringify(receiptSettings)); }
            function saveLoyaltySettings()  { localStorage.setItem('profitpoint_loyalty_settings', JSON.stringify(loyaltySettings)); }
            function saveRecentProducts()   { localStorage.setItem('profitpoint_recent_products', JSON.stringify(recentProductIds.slice(0, 12))); }
            function saveFullscreenPreference() { localStorage.setItem(FULLSCREEN_PREF_KEY, shouldAutoFullscreen ? '1' : '0'); }

            function formatMoney(value) {
                return `${currencySymbol} ${Number(value || 0).toLocaleString()}`;
            }

            const APP_VERSION = '2.0';

            // ==================== SESSION PIN LOCK ====================
            const PIN_TIMEOUT_KEY = 'profitpoint_pin_timeout';
            let pinLockTimer = null;
            let pinLocked = false;

            function getPinTimeoutMs() {
                const mins = parseInt(localStorage.getItem(PIN_TIMEOUT_KEY) || '5');
                return mins * 60 * 1000;
            }

            function resetIdleTimer() {
                clearTimeout(pinLockTimer);
                if (!currentUser || pinLocked) return;
                const ms = getPinTimeoutMs();
                if (ms <= 0) return;
                pinLockTimer = setTimeout(showPinLock, ms);
            }

            function showPinLock() {
                if (pinLocked || !currentUser) return;
                pinLocked = true;
                clearTimeout(pinLockTimer);
                const overlay = document.createElement('div');
                overlay.id = 'pinLockOverlay';
                overlay.style.cssText = 'position:fixed;inset:0;z-index:9999999;background:var(--surface-0);display:flex;align-items:center;justify-content:center;';
                let pinEntry = '';
                const renderPin = () => {
                    overlay.innerHTML = `
                        <div style="text-align:center;width:280px;">
                            <div style="font-size:2.5rem;margin-bottom:0.8rem;"><i class="fas fa-lock" style="color:var(--teal-400);"></i></div>
                            <div style="font-size:1.1rem;font-weight:800;color:var(--text-primary);margin-bottom:0.3rem;">App Locked</div>
                            <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1.5rem;">Enter your password to continue</div>
                            <input type="password" id="pinInput" placeholder="Password" autocomplete="current-password"
                                style="width:100%;padding:0.9rem 1rem;border-radius:var(--radius-md);border:1.5px solid var(--border-medium);background:var(--surface-3);color:var(--text-primary);font-size:1rem;outline:none;text-align:center;margin-bottom:0.8rem;">
                            <div id="pinError" style="color:var(--color-danger);font-size:0.8rem;min-height:1.2rem;margin-bottom:0.6rem;"></div>
                            <button id="pinUnlockBtn" style="width:100%;padding:0.9rem;border-radius:var(--radius-full);border:none;background:linear-gradient(135deg,var(--teal-500),var(--teal-600));color:#fff;font-weight:700;font-size:1rem;cursor:pointer;">
                                <i class="fas fa-unlock"></i> Unlock
                            </button>
                        </div>`;
                    const input = overlay.querySelector('#pinInput');
                    input.focus();
                    const tryUnlock = () => {
                        const pwd = input.value;
                        if (currentUser && pwd === currentUser.password) {
                            overlay.remove();
                            pinLocked = false;
                            resetIdleTimer();
                        } else {
                            overlay.querySelector('#pinError').textContent = 'Incorrect password. Try again.';
                            input.value = '';
                            input.focus();
                        }
                    };
                    overlay.querySelector('#pinUnlockBtn').addEventListener('click', tryUnlock);
                    input.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
                };
                renderPin();
                document.body.appendChild(overlay);

            function startIdleMonitoring() {

            // Save any Blob/File via Android bridge or browser anchor
            function saveBlob(blob, filename) {
                if (window.AndroidBridge && window.AndroidBridge.saveFile) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        const base64 = reader.result.split(',')[1];
                        window.AndroidBridge.saveFile(base64, filename, blob.type || 'application/octet-stream');
                    };
                    reader.readAsDataURL(blob);
                } else {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 2000);
                }
            }

            // Download a PDF blob from a jsPDF doc instance
            function downloadPDF(doc, filename) {
                try {
                    const blob = doc.output('blob');
                    saveBlob(blob, filename);
                } catch (e) {
                    showToast('Download failed: ' + e.message, 'error');
                }
            }

            // Download a CSV file from an array of row arrays
            function downloadCSV(filename, headers, rows) {
                const escape = v => {
                    const s = String(v === null || v === undefined ? '' : v);
                    return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g, '""')}"` : s;
                };
                const lines = [headers.map(escape).join(','), ...rows.map(r => r.map(escape).join(','))];
                const blob = new Blob([lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
                saveBlob(blob, filename);
            }

            function getOrCreateCustomer(name, phone = '') {
                const normalizedName = String(name || '').trim();
                const normalizedPhone = String(phone || '').trim();
                if (!normalizedName && !normalizedPhone) return null;

                let customer = customers.find(item => (
                    normalizedPhone && item.phone === normalizedPhone
                ) || (
                    normalizedName && String(item.name || '').toLowerCase() === normalizedName.toLowerCase()
                ));

                if (!customer) {
                    customer = {
                        id: `c${Date.now()}`,
                        name: normalizedName || normalizedPhone,
                        phone: normalizedPhone,
                        loyaltyPoints: 0,
                        totalSpent: 0,
                        lastSaleAt: null,
                        createdAt: new Date().toISOString()
                    };
                    customers.push(customer);
                    saveCustomers();
                }

                return customer;
            }

            function findCustomer(name, phone = '') {
                const normalizedName = String(name || '').trim().toLowerCase();
                const normalizedPhone = String(phone || '').trim();
                if (!normalizedName && !normalizedPhone) return null;
                return customers.find(item => (
                    normalizedPhone && item.phone === normalizedPhone
                ) || (
                    normalizedName && String(item.name || '').toLowerCase() === normalizedName
                )) || null;
            }

            function getCustomerBalances() {
                const balances = {};
                sales.forEach(sale => {
                    if (!sale.customerId || sale.isReturn) return;
                    if (!balances[sale.customerId]) {
                        balances[sale.customerId] = {
                            customerId: sale.customerId,
                            customerName: sale.customerName || 'Walk-in',
                            outstanding: 0,
                            layaway: 0,
                            count: 0
                        };
                    }
                    const outstanding = Number(sale.outstandingAmount || 0);
                    balances[sale.customerId].outstanding += outstanding;
                    if (sale.paymentStatus === 'layaway') {
                        balances[sale.customerId].layaway += outstanding;
                    }
                    if (outstanding > 0) {
                        balances[sale.customerId].count += 1;
                    }
                });
                return Object.values(balances).filter(item => item.outstanding > 0).sort((a, b) => b.outstanding - a.outstanding);
            }

            function getTopSellingProducts(limit = 5) {
                const totals = {};
                sales.forEach(sale => {
                    if (sale.isReturn) return;
                    (sale.items || []).forEach(item => {
                        totals[item.productId] = (totals[item.productId] || 0) + Number(item.qty || 0);
                    });
                });
                return Object.entries(totals)
                    .map(([productId, qty]) => ({ productId, qty, product: products.find(product => String(product.id) === String(productId)) }))
                    .filter(item => item.product)
                    .sort((a, b) => b.qty - a.qty)
                    .slice(0, limit);
            }

            function getVariantLabel(product, variant) {
                return variant ? `${product.name} · ${variant}` : product.name;
            }

            function addRecentProduct(productId) {
                recentProductIds = [String(productId), ...recentProductIds.filter(id => String(id) !== String(productId))].slice(0, 12);
                saveRecentProducts();
            }

            function computeDiscountAmount(subtotal, discountType, discountValue) {
                const safeSubtotal = Number(subtotal || 0);
                const safeValue = Number(discountValue || 0);
                if (discountType === 'percent') return Math.min(safeSubtotal, (safeSubtotal * safeValue) / 100);
                if (discountType === 'fixed') return Math.min(safeSubtotal, safeValue);
                return 0;
            }

            function awardLoyalty(customerId, netSpend, redeemedPoints = 0) {
                if (!customerId) return { earned: 0, redeemedValue: 0 };
                const customer = customers.find(item => item.id === customerId);
                if (!customer) return { earned: 0, redeemedValue: 0 };

                const redeemValue = Math.min(Number(redeemedPoints || 0) * Number(loyaltySettings.redeemValuePerPoint || 0), Number(netSpend || 0));
                customer.loyaltyPoints = Math.max(0, Number(customer.loyaltyPoints || 0) - Number(redeemedPoints || 0));

                const earned = Math.floor(Number(netSpend || 0) / 1000) * Number(loyaltySettings.pointsPer1000 || 0);
                customer.loyaltyPoints += earned;
                customer.totalSpent = Number(customer.totalSpent || 0) + Number(netSpend || 0);
                customer.lastSaleAt = new Date().toISOString();
                saveCustomers();

                return { earned, redeemedValue: redeemValue };
            }

            function getLowStockProducts() {
                return products
                    .filter(product => Number(product.stock || 0) <= Number(product.minStock || 0))
                    .sort((a, b) => (a.stock - a.minStock) - (b.stock - b.minStock));
            }

            function getUnreadNotificationCount() {

            function addProductToCart(product, variant = '') {
                if (!product || Number(product.stock || 0) <= 0) {
                    showToast(__('outOfStock'), 'error');
                    return;
                }

                const cartKey = `${product.id}::${variant}`;
                const existing = cart.find(item => item.cartKey === cartKey);
                if (existing) {
                    existing.qty += 1;
                } else {
                    cart.push({
                        cartKey,
                        productId: product.id,
                        variant,
                        name: getVariantLabel(product, variant),
                        baseName: product.name,
                        price: parseFloat(product.sellPrice) || 0,
                        qty: 1
                    });
                }

                addRecentProduct(product.id);
                saveCart();
            }

                    productId: product.id,
                    productName: product.name,
                    supplierId: product.supplierId || '',

            async function sendPOToWhatsApp(order) {
                const supplier = suppliers.find(s => s.id === order.supplierId) || {};
                const phone = String(supplier.phone || '').replace(/\D/g, '');
                if (!phone) {
                    showToast('Supplier has no phone number', 'error');
                    return;
                }

                const totalCost = Number(order.qty || 0) * Number(order.costPerUnit || 0);
                const message = `Hello ${supplier.name || 'Supplier'},\n\nPurchase Order: ${order.id}\nFrom: ${shopBrand?.name || 'Pesa POS'}\n\nProduct: ${order.productName}\nQuantity: ${order.qty} units\nUnit cost: ${formatPdfCurrency(order.costPerUnit)}\nTotal: ${formatPdfCurrency(totalCost)}\n\nPlease confirm and arrange delivery.\nThank you.`;

                try {
                    const doc = buildPurchaseOrderPDF(order);
                    const blob = doc.output('blob');
                    const file = new File([blob], `PO-${order.id}.pdf`, { type: 'application/pdf' });

                    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            title: 'Purchase Order',
                            text: message,
                            files: [file]
                        });
                        showToast('Order sent to supplier');
                        return;
                    }
                } catch (err) {
                    // Fallback below
                }

                const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
                window.open(waUrl, '_blank');
                showToast('Opening WhatsApp...');
            }

            function receivePurchaseOrder(orderId) {

                if (!order || order.status === 'received') return;
                const product = products.find(item => String(item.id) === String(order.productId));
                if (!product) return;

                product.stock = Number(product.stock || 0) + Number(order.qty || 0);
                product.stockHistory = [
                    {
                        type: 'purchase-order',
                        qty: Number(order.qty || 0),
                        date: new Date().toISOString(),
                        note: `Received ${order.qty} from PO ${order.id}`
                    },
                    ...(product.stockHistory || [])
                ].slice(0, 20);

                order.status = 'received';
                order.receivedAt = new Date().toISOString();

                recordAudit('purchase-order-received', `Stock received for ${product.name}`, { quantity: order.qty });

                            style="width:72px;padding:0.4rem 0.5rem;border-radius:var(--radius-sm);border:1.5px solid var(--border-medium);background:var(--surface-3);color:var(--text-primary);text-align:center;font-size:0.9rem;font-weight:700;">
                    </div>`).join('');
                overlay.innerHTML = `
                    <div class="modal-card" style="max-width:420px;max-height:85vh;display:flex;flex-direction:column;">
                        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-shrink:0;">
                            <h3 style="font-size:1.05rem;font-weight:800;"><i class="fas fa-clipboard-list icon-one"></i> Stock Take</h3>
                            <button id="stockTakeClose" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1.2rem;"><i class="fas fa-times"></i></button>
                        </div>
                        <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.8rem;flex-shrink:0;">Enter the actual physical count for each product. Differences will be recorded as adjustments.</p>
                        <div style="overflow-y:auto;flex:1;padding-right:0.3rem;">${rows}</div>
                        <div style="flex-shrink:0;padding-top:0.8rem;border-top:1px solid var(--border-subtle);display:flex;gap:0.5rem;margin-top:0.5rem;">
                            <button id="stockTakeCancel" class="modal-btn secondary" style="flex:1;"><i class="fas fa-times"></i> Cancel</button>
                            <button id="stockTakeSubmit" class="modal-btn" style="flex:2;"><i class="fas fa-clipboard-check"></i> Apply Count</button>
                        </div>
                    </div>`;
                document.body.appendChild(overlay);
                overlay.querySelector('#stockTakeClose').onclick = () => overlay.remove();
                overlay.querySelector('#stockTakeCancel').onclick = () => overlay.remove();
                overlay.querySelector('#stockTakeSubmit').onclick = () => {
                    let changed = 0;
                    overlay.querySelectorAll('input[data-pid]').forEach(inp => {
                        const actual = Math.max(0, Number(inp.value) || 0);
                        const system = Number(inp.dataset.system) || 0;
                        const delta = actual - system;
                        if (delta !== 0) {
                            adjustStock(inp.dataset.pid, delta, `Stock take recount`);
                            changed++;
                        }
                    });
                    overlay.remove();
                    renderProductsMobile();
                    showToast(changed > 0 ? `Stock take complete · ${changed} product(s) adjusted` : 'Stock take complete · no changes needed');
                };
            }

            function adjustStock(productId, delta, reason) {
                const product = products.find(p => String(p.id) === String(productId));
                if (!product) return;
                const change = Number(delta || 0);
                product.stock = Math.max(0, Number(product.stock || 0) + change);
                product.stockHistory = [
                    { type: 'adjustment', qty: change, date: new Date().toISOString(), note: reason || 'Manual adjustment', user: currentUser?.name || 'Unknown' },
                    ...(product.stockHistory || [])
                ].slice(0, 50);
                saveProducts();
                recordAudit('stock-adjustment', `${change >= 0 ? '+' : ''}${change} units on ${product.name} (${reason})`, { change, reason });
            }

            function addStockIntake(productId, qty, costPerUnit = 0, note = 'Manual stock intake') {
                const product = products.find(item => String(item.id) === String(productId));
                const quantity = Number(qty || 0);
                if (!product || quantity <= 0) return;

                product.stock = Number(product.stock || 0) + quantity;
                if (Number(costPerUnit || 0) > 0) {
                    product.buyPrice = Number(costPerUnit);
                }
                product.stockHistory = [
                    {
                        type: 'intake',
                        qty: quantity,
                        date: new Date().toISOString(),
                        note
                    },
                    ...(product.stockHistory || [])
                ].slice(0, 20);
                saveProducts();
                recordAudit('stock-intake', `${quantity} units added to ${product.name}`, { quantity, costPerUnit });
            }

            function startShift(openingCash) {
                if (getActiveShift()) {
                    showToast('A shift is already open', 'error');
                    return;
                }

                shifts.unshift({
                    id: `shift${Date.now()}`,
                    openedAt: new Date().toISOString(),
                    openingCash: Number(openingCash || 0),
                    openedBy: currentUser?.name || 'System',
                    salesCount: 0,
                    salesTotal: 0
                });
                saveShifts();
                recordAudit('shift-opened', 'Shift opened', { openingCash: Number(openingCash || 0) });
            }

            function closeShift(actualCash) {
                const shift = getActiveShift();
                if (!shift) {
                    showToast('No open shift found', 'error');
                    return null;
                }

                const expectedCash = Number(shift.openingCash || 0) + sales
                    .filter(sale => !sale.isReturn && sale.payment === 'Cash' && new Date(sale.date) >= new Date(shift.openedAt))
                    .reduce((sum, sale) => sum + Number(sale.amountPaidNow || sale.paidAmount || sale.finalTotal || 0), 0);

                shift.closedAt = new Date().toISOString();
                shift.actualCash = Number(actualCash || 0);
                shift.expectedCash = expectedCash;
                shift.cashVariance = Number(actualCash || 0) - expectedCash;
                shift.closedBy = currentUser?.name || 'System';
                saveShifts();
                recordAudit('shift-closed', 'Shift closed', { actualCash: shift.actualCash, expectedCash });
                return shift;
            }

            function recordSaleOnShift(sale) {
                const shift = getActiveShift();
                if (!shift || !sale || sale.isReturn) return;
                shift.salesCount = Number(shift.salesCount || 0) + 1;
                shift.salesTotal = Number(shift.salesTotal || 0) + Number(sale.finalTotal || 0);
                saveShifts();
            }

            function createSaleRecord(payload) {
                const subtotal = Number(payload.subtotal || 0);
                const discountAmount = Number(payload.discountAmount || 0);
                const finalTotal = Math.max(0, subtotal - discountAmount - Number(payload.loyaltyRedeemedValue || 0));
                const amountPaidNow = Math.min(finalTotal, Number(payload.amountPaidNow ?? finalTotal));
                const outstandingAmount = Math.max(0, finalTotal - amountPaidNow);
                const sale = {
                    id: Date.now(),
                    receiptNumber: generateReceiptNumber(),
                    items: payload.items || [],
                    subtotal,
                    finalTotal,
                    payment: payload.payment || 'Cash',
                    paymentStatus: payload.paymentStatus || 'paid',
                    paidAmount: amountPaidNow,
                    amountPaidNow,
                    outstandingAmount,
                    customerId: payload.customerId || null,
                    customerName: payload.customerName || '',
                    customerPhone: payload.customerPhone || '',
                    userId: currentUser?.id || null,
                    userName: currentUser?.name || 'Unknown User',
                    discountType: payload.discountType || 'none',
                    discountValue: Number(payload.discountValue || 0),
                    discountAmount,
                    discountReason: payload.discountReason || '',
                    loyaltyRedeemedPoints: Number(payload.loyaltyRedeemedPoints || 0),
                    loyaltyRedeemedValue: Number(payload.loyaltyRedeemedValue || 0),
                    loyaltyEarnedPoints: Number(payload.loyaltyEarnedPoints || 0),
                    note: payload.note || '',
                    date: new Date().toISOString()
                };
                sales.push(sale);
                saveSales();
                recordSaleOnShift(sale);
                recordAudit('sale-completed', `${sale.receiptNumber} completed`, { finalTotal: sale.finalTotal, paymentStatus: sale.paymentStatus });
                if (sale.outstandingAmount > 0) {
                    pushNotification('Customer balance due', `${sale.customerName || 'Customer'} owes ${formatMoney(sale.outstandingAmount)}`, 'warning');
                }
                return sale;
            }

            function refundSale(saleId) {
                const sale = sales.find(item => item.id === saleId);
                if (!sale || sale.isReturn || sale.refundedAt) return false;

                (sale.items || []).forEach(item => {
                    const product = products.find(productItem => String(productItem.id) === String(item.productId));
                    if (product) {
                        product.stock = Number(product.stock || 0) + Number(item.qty || 0);
                    }
                });
                saveProducts();

                sale.refundedAt = new Date().toISOString();
                const refund = {
                    id: Date.now() + 1,
                    receiptNumber: `${sale.receiptNumber}-R`,
                    originalSaleId: sale.id,
                    items: sale.items || [],
                    subtotal: -Math.abs(Number(sale.subtotal || sale.finalTotal || 0)),
                    finalTotal: -Math.abs(Number(sale.finalTotal || 0)),
                    payment: 'Refund',
                    paymentStatus: 'refunded',
                    paidAmount: -Math.abs(Number(sale.finalTotal || 0)),
                    amountPaidNow: -Math.abs(Number(sale.finalTotal || 0)),
                    outstandingAmount: 0,
                    customerId: sale.customerId || null,
                    customerName: sale.customerName || '',
                    customerPhone: sale.customerPhone || '',
                    userId: currentUser?.id || null,
                    userName: currentUser?.name || 'Unknown User',
                    isReturn: true,
                    note: `Refund for ${sale.receiptNumber}`,
                    date: new Date().toISOString()
                };
                sales.push(refund);
                saveSales();
                recordAudit('sale-refunded', `${sale.receiptNumber} refunded`, { amount: sale.finalTotal });
                pushNotification('Refund processed', `${sale.receiptNumber} refunded`, 'warning');
                return true;
            }

            function recordCreditPayment(saleId, amount) {
                const sale = sales.find(s => String(s.id) === String(saleId));
                if (!sale || Number(amount) <= 0) return 0;
                const pay = Math.min(Number(amount), Number(sale.outstandingAmount || 0));
                if (pay <= 0) return 0;
                sale.outstandingAmount = Math.max(0, Number(sale.outstandingAmount) - pay);
                sale.paidAmount = Number(sale.paidAmount || 0) + pay;
                sale.amountPaidNow = Number(sale.amountPaidNow || 0) + pay;
                sale.paymentStatus = sale.outstandingAmount === 0 ? 'paid' : 'partial';
                saveSales();
                recordAudit('credit-payment', `Payment of ${formatMoney(pay)} on ${sale.receiptNumber}`, { saleId, amount: pay });
                return pay;
            }

            function recordCustomerCreditPayment(customerId, amount) {
                const creditSales = sales
                    .filter(s => String(s.customerId) === String(customerId) && !s.isReturn && Number(s.outstandingAmount || 0) > 0)
                    .sort((a, b) => new Date(a.date) - new Date(b.date));
                let remaining = Number(amount);
                let totalPaid = 0;
                creditSales.forEach(sale => {
                    if (remaining <= 0) return;
                    const pay = Math.min(remaining, Number(sale.outstandingAmount));
                    sale.outstandingAmount = Math.max(0, Number(sale.outstandingAmount) - pay);
                    sale.paidAmount = Number(sale.paidAmount || 0) + pay;
                    sale.amountPaidNow = Number(sale.amountPaidNow || 0) + pay;
                    sale.paymentStatus = sale.outstandingAmount === 0 ? 'paid' : 'partial';
                    remaining -= pay;
                    totalPaid += pay;
                });
                if (totalPaid > 0) {
                    saveSales();
                    const customerName = creditSales[0]?.customerName || 'Customer';
                    recordAudit('credit-payment', `Payment of ${formatMoney(totalPaid)} for ${customerName}`, { customerId, amount: totalPaid });
                }
                return totalPaid;
            }

            async function scanBarcode(onDetected) {
                const fallbackManual = () => {
                    const overlay = document.createElement('div');
                    overlay.className = 'modal-overlay';
                    overlay.innerHTML = `
                        <div class="modal-card" style="max-width:340px;">
                            <h3 style="margin-bottom:1rem;"><i class="fas fa-barcode icon-one"></i> Enter barcode</h3>
                            <input type="text" id="manualBarcodeInput" placeholder="Type or paste barcode" style="width:100%;padding:0.8rem 1rem;border:1px solid #e2e8f0;border-radius:12px;font-size:1rem;outline:none;margin-bottom:1rem;">
                            <div class="modal-actions">
                                <button class="modal-btn secondary" id="manualBarcodeCancel">Cancel</button>
                                <button class="modal-btn" id="manualBarcodeConfirm">Confirm</button>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(overlay);
                    
                    const input = overlay.querySelector('#manualBarcodeInput');
                    const confirmBtn = overlay.querySelector('#manualBarcodeConfirm');
                    const cancelBtn = overlay.querySelector('#manualBarcodeCancel');
                    
                    input.focus();
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') confirmBtn.click();
                    });
                    
                    cancelBtn.addEventListener('click', () => overlay.remove());
                    confirmBtn.addEventListener('click', () => {
                        const value = String(input.value || '').trim();
                        if (!value) {
                            showToast('Barcode is required', 'error');
                            input.focus();
                            return;
                        }
                        overlay.remove();
                        onDetected(value);
                    });
                };

                if (!window.isSecureContext) {
                    fallbackManual();
                    return;
                }

                if (!('BarcodeDetector' in window)) {
                    fallbackManual();
                    return;
                }

                try {
                    const supported = await window.BarcodeDetector.getSupportedFormats();
                    const detector = new window.BarcodeDetector({ formats: supported.length ? supported : ['ean_13', 'ean_8', 'code_128', 'qr_code'] });
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'environment',
                            width: { ideal: 1920 },
                            height: { ideal: 1080 },
                            focusMode: { ideal: 'continuous' },
                            focusDistance: { ideal: 0 }
                        }
                    });
                    // Apply advanced focus constraints if supported
                    const track = stream.getVideoTracks()[0];
                    if (track) {
                        try {
                            const caps = track.getCapabilities?.() || {};
                            const advanced = {};
                            if (caps.focusMode?.includes('continuous')) advanced.focusMode = 'continuous';
                            if (caps.zoom) advanced.zoom = Math.min(caps.zoom.max, 2);
                            if (Object.keys(advanced).length) await track.applyConstraints({ advanced: [advanced] });
                        } catch (_) {}
                    }
                    const overlay = document.createElement('div');
                    overlay.className = 'crop-modal-overlay';
                    overlay.innerHTML = `
                        <div class="crop-card">
                            <h3 style="margin-bottom:1rem;"><i class="fas fa-barcode icon-one"></i> Scan barcode</h3>
                            <video id="barcodeVideo" autoplay playsinline style="width:100%; border-radius:24px; background:#0f172a;"></video>
                            <p style="color:#888; font-size:0.72rem; margin:0.5rem 0 0; text-align:center;">Hold steady &amp; close to barcode</p>
                            <div class="modal-actions">
                                <button class="modal-btn secondary" id="barcodeManual"><i class="fas fa-keyboard"></i> Manual</button>
                                <button class="modal-btn secondary" id="barcodeCancel"><i class="fas fa-times"></i> Cancel</button>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(overlay);
                    const video = overlay.querySelector('#barcodeVideo');
                    video.srcObject = stream;

                    let active = true;
                    const stop = () => {
                        active = false;
                        stream.getTracks().forEach(track => track.stop());
                        overlay.remove();
                    };

                    overlay.querySelector('#barcodeCancel').addEventListener('click', stop);
                    overlay.querySelector('#barcodeManual').addEventListener('click', () => {
                        stop();
                        fallbackManual();
                    });

                    const tick = async () => {
                        if (!active) return;
                        try {
                            const codes = await detector.detect(video);
                            if (codes[0]?.rawValue) {
                                stop();
                                onDetected(codes[0].rawValue);
                                return;
                            }
                        } catch {
                            // Ignore transient detector errors while camera warms up.
                        }
                        requestAnimationFrame(tick);
                    };

                    requestAnimationFrame(tick);
                } catch {
                    showToast('Camera permission denied or unavailable. Using manual barcode input.', 'error');
                    fallbackManual();
                }
            }

            function showCropModal(imageSrc, callback) {
                const overlay = document.createElement('div');
                overlay.className = 'crop-modal-overlay';
                overlay.innerHTML = `
                    <div class="crop-card">
                        <h3 style="margin-bottom:1rem; color:#06c6d4;">Crop Image</h3>
                        <div class="crop-container">
                            <img id="cropImage" src="${imageSrc}" style="max-width:100%;">
                        </div>
                        <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                            <button class="modal-btn secondary" id="cancelCrop">Cancel</button>
                            <button class="modal-btn" id="confirmCrop">Crop & Save</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);

                const img = document.getElementById('cropImage');

                const initCropper = () => {
                    if (typeof Cropper === 'undefined') {
                        // Cropper not available — use raw image without cropping
                        document.getElementById('confirmCrop').addEventListener('click', () => {
                            overlay.remove();
                            callback(imageSrc);
                        });
                        document.getElementById('cancelCrop').addEventListener('click', () => {
                            overlay.remove();
                            callback(null);
                        });
                        return;
                    }
                    if (cropper) { try { cropper.destroy(); } catch(_) {} cropper = null; }
                    cropper = new Cropper(img, {
                        aspectRatio: 1,
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 1,
                        cropBoxResizable: true,
                        cropBoxMovable: true,
                    });

                    document.getElementById('confirmCrop').addEventListener('click', async () => {
                        if (cropper) {
                            const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
                            const croppedDataUrl = canvas.toDataURL('image/jpeg', 0.92);
                            overlay.remove();
                            cropper.destroy();
                            cropper = null;
                            callback(await compressImage(croppedDataUrl));
                        } else {
                            overlay.remove();
                            callback(null);
                        }
                    });

                    document.getElementById('cancelCrop').addEventListener('click', () => {
                        if (cropper) { try { cropper.destroy(); } catch(_) {} cropper = null; }
                        overlay.remove();
                        callback(null);
                    });
                };

                // Guard against onload race: if already complete, run immediately
                if (img.complete && img.naturalWidth > 0) {
                    initCropper();
                } else {
                    img.addEventListener('load', initCropper, { once: true });
                    img.addEventListener('error', () => {
                        overlay.remove();
                        callback(null);
                        showToast('Could not load image', 'error');
                    }, { once: true });
                }
            }

            function fileToBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                });
            }

            // Compress/resize image to max 400×400 px at 72% JPEG quality
            // Prevents localStorage bloat (a 3 MB photo → ~40 KB after compression)
            function compressImage(dataUrl, maxPx = 400, quality = 0.72) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        let { width, height } = img;
                        if (width > maxPx || height > maxPx) {
                            if (width > height) { height = Math.round(height * maxPx / width); width = maxPx; }
                            else { width = Math.round(width * maxPx / height); height = maxPx; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width  = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = () => resolve(dataUrl); // fallback: return original
                    img.src = dataUrl;
                });
            }

            async function pickContact(inputEl) {
                const applyPhone = (phone) => {
                    if (!phone) return;
                    if (inputEl) {
                        inputEl.value = phone.replace(/\s+/g, '');
                        inputEl.dispatchEvent(new Event('input', { bubbles: true }));
                        inputEl.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                };

                // Android WebView bridge (preferred on APK)
                if (window.AndroidBridge && window.AndroidBridge.pickContact) {
                    const callbackId = 'cb_' + Date.now();
                    _contactCallbacks[callbackId] = applyPhone;
                    window.AndroidBridge.pickContact(callbackId);
                    return;
                }

                // Web Contact Picker API (Chrome browser)
                if (navigator.contacts && navigator.contacts.select) {
                    try {
                        const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: false });
                        if (!contacts || !contacts.length) return;
                        const phone = (contacts[0].tel || [])[0] || '';
                        applyPhone(phone);
                    } catch (e) {
                        showToast('Could not access contacts', 'error');
                    }
                    return;
                }

                showToast('Contact picker not supported on this device', 'error');
            }

                    document.getElementById('modalUploadBtn').addEventListener('click', () => fileInput.click());
                    
                    if (cameraBtn) {
                        cameraBtn.addEventListener('click', async () => {
                            const b64 = await captureFromCamera();
                            if (b64) {
                                showCropModal(b64, (cropped) => {
                                    if (cropped) {
                                        imageData = cropped;
                                        preview.style.display = 'block';
                                        preview.innerHTML = `<img src="${cropped}">`;
                                    }
                                });
                            }
                        });

                    fileInput.addEventListener('change', async (e) => {
                        if (e.target.files[0]) {
                            const b64 = await fileToBase64(e.target.files[0]);

                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
                setTimeout(() => { const input = document.getElementById('productKeyInput'); if (input) input.focus(); }, 50);
                let activated = false;
                const handleActivate = () => {
                    if (activated) return;
                    const inp = document.getElementById('productKeyInput');
                    const rawKey = inp ? inp.value : '';
                    const key = normalizeProductKey(rawKey);
                    const validKeys = getValidProductKeys();
                    const validFormat = key.length >= 8 && /[A-Z]/.test(key) && /\d/.test(key);
                    const isAccepted = key && (validKeys.has(key) || validFormat);
                    if (isAccepted) {
                        activated = true;
                        saveLicense({ type: 'full', start: Date.now(), duration: MONTH_DURATION });
                        localStorage.setItem('profitpoint_last_activated_key', key);
                        trialExpiredNotified = false;
                        overlay.remove();
                        showToast('✅ License activated for 30 days!', 'success');
                        setTimeout(() => { renderPhoneApp();startLicenseMonitoring(); }, 100);
                    } else if (key) {
                        showToast('❌ Invalid key: ' + key, 'error');
                        if (inp) { inp.value = ''; inp.focus(); }
                    } else {
                        showToast('❌ Please enter a product key', 'error');
                        if (inp) inp.focus();
                    }
                };
                document.getElementById('submitKey')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    handleActivate();
                });
                document.getElementById('productKeyInput')?.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        handleActivate();
                    }
                });
                setTimeout(() => {
                    if (!isLocked) {
                        const cancel = document.getElementById('cancelKey');
                        if (cancel) cancel.addEventListener('click', () => overlay.remove());
                    }
                }, 50);
                if (isLocked) {
                    overlay.addEventListener('click', (e) => { if (e.target === overlay) { e.preventDefault(); e.stopPropagation(); } });
                }
            }

            function startLicenseMonitoring() {
                if (licenseCheckInterval) clearInterval(licenseCheckInterval);
                
                licenseCheckInterval = setInterval(() => {
                    const remaining = getRemainingMs();
                    
                    // Notify when 3 days remaining (only once per day)
                    const threeDaysMs = 3 * 24 * 60 * 60 * 1000;
                    const twoDaysMs = 2 * 24 * 60 * 60 * 1000;
                    if (remaining <= threeDaysMs && remaining > twoDaysMs) {
                        const today = new Date().toDateString();
                        if (lastLicenseWarningDate !== today) {
                            lastLicenseWarningDate = today;
                            const daysLeft = Math.ceil(remaining / (24 * 60 * 60 * 1000));
                            pushNotification('License renewal', `Your license expires in ${daysLeft} days. Please renew to continue using Pesa POS.`, 'warning');
                        }
                    }
                    
                    if (remaining <= 10000 && remaining > 0 && !trialExpiredNotified) {
                        trialExpiredNotified = true;
                        showToast('⚠️ Trial expiring in 10 seconds. Product key required!', 'error');
                    }
                    
                    if (isLicenseExpired() && getLicense()?.type === 'trial') {
                        clearInterval(licenseCheckInterval);
                        showToast('⏱️ Trial expired! Enter product key to continue.', 'error');
                        showProductKeyModal(true);
                    }
                }, 1000);
            }

            // ==================== PDF GENERATORS ====================
            function formatPdfCurrency(value) {
                return `${currencySymbol} ${Number(value || 0).toLocaleString()}`;
            }

            function getPdfLogoPayload() {
                const logo = shopBrand?.logo;
                if (typeof logo === 'string' && logo.startsWith('data:image/')) {
                    const match = logo.match(/^data:image\/(png|jpeg|jpg);/i);
                    if (match) {
                        const format = match[1].toLowerCase() === 'png' ? 'PNG' : 'JPEG';
                        return { type: 'image', src: logo, format };
                    }
                }
                const fallbackText = (shopBrand?.name || 'Pesa POS').trim().charAt(0).toUpperCase() || 'P';
                return { type: 'text', text: fallbackText };
            }

            function drawModernPdfHeader(doc, meta) {
                const pageWidth = doc.internal.pageSize.getWidth();
                const logo = getPdfLogoPayload();

                // Deep navy gradient band
                doc.setFillColor(10, 25, 47);
                doc.rect(0, 0, pageWidth, 34, 'F');
                // Teal accent stripe
                doc.setFillColor(6, 182, 212);
                doc.rect(0, 34, pageWidth, 1.5, 'F');
                // Subtle second stripe
                doc.setFillColor(2, 132, 199);
                doc.rect(0, 35.5, pageWidth, 0.5, 'F');

                // Logo box (white pill)
                const logoX = 12, logoY = 7, logoSize = 20;
                doc.setFillColor(255, 255, 255);
                doc.roundedRect(logoX, logoY, logoSize, logoSize, 4, 4, 'F');
                if (logo.type === 'image') {
                    try {
                        doc.addImage(logo.src, logo.format, logoX + 1.5, logoY + 1.5, logoSize - 3, logoSize - 3);
                    } catch {
                        doc.setTextColor(10, 25, 47); doc.setFont('helvetica', 'bold'); doc.setFontSize(13);
                        doc.text((shopBrand?.name || 'P').charAt(0).toUpperCase(), logoX + logoSize / 2, logoY + 13, { align: 'center' });
                    }
                } else {
                    doc.setTextColor(10, 25, 47); doc.setFont('helvetica', 'bold'); doc.setFontSize(13);
                    doc.text(logo.text, logoX + logoSize / 2, logoY + 13, { align: 'center' });
                }

                // Title
                doc.setTextColor(255, 255, 255);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(17);
                doc.text(meta.title, 36, 17);

                // Subtitle
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                doc.setTextColor(147, 210, 235);
                if (meta.subtitle) doc.text(meta.subtitle, 36, 24);

                // Generated date (right-aligned)
                doc.setFontSize(8);
                doc.setTextColor(147, 210, 235);
                doc.text(meta.generatedAt, pageWidth - 12, 24, { align: 'right' });
                doc.setTextColor(17, 24, 39);
            }

            function drawModernPdfFooter(doc, pageNumber, pageCount) {
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();

                // Footer bar
                doc.setFillColor(248, 250, 252);
                doc.rect(0, pageHeight - 14, pageWidth, 14, 'F');
                doc.setFillColor(226, 232, 240);
                doc.rect(0, pageHeight - 14, pageWidth, 0.3, 'F');

                doc.setFont('helvetica', 'normal');
                doc.setFontSize(8);
                doc.setTextColor(100, 116, 139);
                doc.text(`${shopBrand?.name || 'Pesa POS'} · Powered by Pesa POS`, 12, pageHeight - 5.5);
                doc.text(`Page ${pageNumber} / ${pageCount}`, pageWidth - 12, pageHeight - 5.5, { align: 'right' });
            }

            function finalizeModernPdfDoc(doc, meta) {
                const totalPages = doc.internal.getNumberOfPages();
                for (let page = 1; page <= totalPages; page++) {
                    doc.setPage(page);
                    drawModernPdfHeader(doc, meta);
                    drawModernPdfFooter(doc, page, totalPages);
                }
                doc.setPage(totalPages);
            }

            function createModernPdfDoc(title, subtitle) {
                if (!window.jspdf) throw new Error('PDF library not loaded. Please check your internet connection and reload.');
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const pageWidth = doc.internal.pageSize.getWidth();
                const meta = {
                    title: title || 'Report',
                    subtitle: subtitle || '',
                    generatedAt: `Generated: ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`
                };
                drawModernPdfHeader(doc, meta);
                return { doc, pageWidth, pageHeight: doc.internal.pageSize.getHeight(), startY: 42, meta };
            }

            function ensurePdfSpace(doc, cursorY, neededHeight) {
                const pageHeight = doc.internal.pageSize.getHeight();
                if (cursorY + neededHeight > pageHeight - 18) {
                    doc.addPage();
                    return 42;
                }
                return cursorY;
            }

            function drawPdfMetricCards(doc, startY, cards) {
                const pageWidth = doc.internal.pageSize.getWidth();
                const marginX = 12;
                const gapX = 4;
                const gapY = 4;
                const cols = 3;
                const cardHeight = 24;
                const cardWidth = (pageWidth - (marginX * 2) - (gapX * (cols - 1))) / cols;

                cards.forEach((card, index) => {
                    const row = Math.floor(index / cols);
                    const col = index % cols;
                    const x = marginX + (col * (cardWidth + gapX));
                    const y = startY + (row * (cardHeight + gapY));
                    const fill = card.color || [245, 248, 252];
                    const border = card.border || [203, 213, 225];
                    const valueColor = card.valueColor || [15, 23, 42];

                    // Card shadow effect
                    doc.setFillColor(210, 218, 230);
                    doc.roundedRect(x + 0.6, y + 0.8, cardWidth, cardHeight, 3.5, 3.5, 'F');

                    doc.setFillColor(fill[0], fill[1], fill[2]);
                    doc.setDrawColor(border[0], border[1], border[2]);
                    doc.setLineWidth(0.35);
                    doc.roundedRect(x, y, cardWidth, cardHeight, 3.5, 3.5, 'FD');

                    // Left accent bar
                    doc.setFillColor(border[0], border[1], border[2]);
                    doc.roundedRect(x, y, 2.5, cardHeight, 1.5, 1.5, 'F');

                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(7);
                    doc.setTextColor(100, 116, 139);
                    doc.text(String(card.label || '').toUpperCase(), x + 5, y + 6.5, { maxWidth: cardWidth - 7 });

                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(10.5);
                    doc.setTextColor(valueColor[0], valueColor[1], valueColor[2]);
                    doc.text(String(card.value || '-'), x + 5, y + 15, { maxWidth: cardWidth - 7 });

                    if (card.note) {
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(7);
                        doc.setTextColor(120, 134, 151);
                        doc.text(String(card.note), x + 5, y + 20.5, { maxWidth: cardWidth - 7 });
                    }
                });

                const rows = Math.ceil(cards.length / cols) || 1;
                return startY + (rows * cardHeight) + ((rows - 1) * gapY) + 8;
            }

            function drawPdfSectionTitle(doc, text, y) {
                const pageWidth = doc.internal.pageSize.getWidth();

            function createAnalyticsLineChartImage(labels, values) {
                const canvas = document.createElement('canvas');
                canvas.width = 900;
                canvas.height = 360;
                const ctx = canvas.getContext('2d');
                if (!ctx) return null;

                const left = 70;
                const right = 860;
                const top = 35;
                const bottom = 300;
                const width = right - left;
                const height = bottom - top;
                const maxValue = Math.max(...values, 1);
                const toShort = (num) => {
                    if (num >= 1000000) return `${(num / 1000000).toFixed(1)}M`;
                    if (num >= 1000) return `${(num / 1000).toFixed(1)}k`;
                    return `${Math.round(num)}`;
                };

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 1;
                for (let i = 0; i <= 4; i++) {
                    const y = top + (height / 4) * i;
                    ctx.beginPath();
                    ctx.moveTo(left, y);
                    ctx.lineTo(right, y);
                    ctx.stroke();

                    const value = Math.round(maxValue * (1 - (i / 4)));
                    ctx.fillStyle = '#64748b';
                    ctx.font = '12px Inter, Arial';
                    ctx.textAlign = 'right';
                    ctx.fillText(toShort(value), left - 10, y + 4);
                }

                ctx.strokeStyle = '#cbd5e1';
                ctx.beginPath();
                ctx.moveTo(left, bottom);
                ctx.lineTo(right, bottom);
                ctx.stroke();

                const stepX = values.length > 1 ? width / (values.length - 1) : width;
                const points = values.map((v, i) => ({
                    x: left + (i * stepX),
                    y: bottom - ((v / maxValue) * height)
                }));

                const gradient = ctx.createLinearGradient(0, top, 0, bottom);
                gradient.addColorStop(0, 'rgba(6,198,212,0.35)');
                gradient.addColorStop(1, 'rgba(6,198,212,0.02)');

                ctx.beginPath();
                points.forEach((p, i) => {
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });
                ctx.lineTo(points[points.length - 1].x, bottom);
                ctx.lineTo(points[0].x, bottom);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                points.forEach((p, i) => {
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });
                ctx.strokeStyle = '#06c6d4';
                ctx.lineWidth = 3;
                ctx.stroke();

                points.forEach((p, i) => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.strokeStyle = '#0d4765';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    ctx.fillStyle = '#334155';
                    ctx.font = '12px Inter, Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(labels[i] || '', p.x, bottom + 18);
                });

                return canvas.toDataURL('image/png');
            }

            function createAnalyticsPieChartImage(series) {
                const canvas = document.createElement('canvas');
                canvas.width = 900;
                canvas.height = 360;
                const ctx = canvas.getContext('2d');
                if (!ctx) return null;

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const colors = ['#06c6d4', '#0d4765', '#f59e0b', '#8b5cf6', '#ef4444', '#22c55e'];
                const pieCenterX = 190;
                const pieCenterY = 180;
                const radius = 112;
                const donutHole = 58;
                const data = Array.isArray(series) ? series.slice(0, 6) : [];
                const total = data.reduce((sum, item) => sum + (item.qty || 0), 0);

                if (total <= 0) {
                    ctx.beginPath();
                    ctx.arc(pieCenterX, pieCenterY, radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#e2e8f0';
                    ctx.fill();
                } else {
                    let angle = -Math.PI / 2;
                    data.forEach((item, index) => {
                        const slice = ((item.qty || 0) / total) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.moveTo(pieCenterX, pieCenterY);
                        ctx.arc(pieCenterX, pieCenterY, radius, angle, angle + slice);
                        ctx.closePath();
                        ctx.fillStyle = colors[index % colors.length];
                        ctx.fill();
                        angle += slice;
                    });
                }

                ctx.beginPath();
                ctx.arc(pieCenterX, pieCenterY, donutHole, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                ctx.fillStyle = '#0f172a';
                ctx.font = 'bold 24px Inter, Arial';
                ctx.textAlign = 'center';
                ctx.fillText(total > 0 ? `${total}` : '0', pieCenterX, pieCenterY - 4);
                ctx.fillStyle = '#64748b';
                ctx.font = '12px Inter, Arial';
                ctx.fillText('units sold', pieCenterX, pieCenterY + 16);

                const legendData = total > 0 ? data : [{ name: 'No sales data', qty: 0 }];
                legendData.forEach((item, index) => {
                    const legendY = 80 + (index * 36);
                    const color = total > 0 ? colors[index % colors.length] : '#94a3b8';
                    const pct = total > 0 ? (((item.qty || 0) / total) * 100).toFixed(1) : '0.0';
                    const label = total > 0
                        ? `${item.name} (${item.qty} | ${pct}%)`
                        : `${item.name}`;

                    ctx.fillStyle = color;
                    ctx.fillRect(390, legendY, 16, 16);

                    ctx.fillStyle = '#1e293b';
                    ctx.font = '13px Inter, Arial';
                    ctx.textAlign = 'left';
                    ctx.fillText(label.substring(0, 46), 416, legendY + 13);
                });

                return canvas.toDataURL('image/png');
            }
