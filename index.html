                  <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '0.75rem'}}>
                    <h3 style={{fontWeight: 700, color: '#0f172a', fontSize: '0.93rem', margin: 0}}>Payment Methods</h3>
                    <span style={{background: 'rgba(15,23,42,0.05)', borderRadius: '99px', padding: '3px 10px', fontSize: '0.75rem', color: '#475569', border: '1px solid rgba(148,163,184,0.2)', fontWeight: 600}}>By revenue</span>
                  </div>
                  <div style={{height: '230px', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                    <canvas ref={chart3Ref} style={{maxHeight: '100%'}} />
                  </div>
                </div>
              </div>
              {/* Top Products bar */}
              <div style={{background: '#fff', borderRadius: '16px', padding: '1.1rem 1.25rem', border: '1px solid rgba(203,213,225,0.5)', boxShadow: '0 2px 14px rgba(15,23,42,0.05)'}}>
                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '0.75rem'}}>
                  <h3 style={{fontWeight: 700, color: '#0f172a', fontSize: '0.93rem', margin: 0}}>Top Products by Revenue</h3>
                  <span style={{background: 'rgba(15,23,42,0.05)', borderRadius: '99px', padding: '3px 10px', fontSize: '0.75rem', color: '#475569', border: '1px solid rgba(148,163,184,0.2)', fontWeight: 600}}>Top 8 items</span>
                </div>
                <div style={{height: '260px'}}>
                  <canvas ref={chart2Ref} style={{maxHeight: '100%', width: '100%'}} />
                </div>
              </div>
            </div>
          )}

          {activeTab === 'details' && (
            <div>
              <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '0.85rem'}}>
                <div>
                  <h3 style={{fontWeight: 700, color: '#0f172a', fontSize: '0.95rem', margin: '0 0 2px'}}>Product Performance</h3>
                  <p style={{fontSize: '0.8rem', color: '#64748b', margin: 0}}>Revenue, quantity, and contribution breakdown per product</p>
                </div>
                <span style={{background: 'rgba(37,99,235,0.08)', borderRadius: '99px', padding: '4px 12px', fontSize: '0.78rem', color: '#2563eb', border: '1px solid rgba(37,99,235,0.2)', fontWeight: 700}}>Top 15 products</span>
              </div>
              <div style={{background: '#fff', borderRadius: '16px', border: '1px solid rgba(203,213,225,0.5)', overflow: 'hidden', boxShadow: '0 2px 14px rgba(15,23,42,0.05)'}}>
                <table style={{width: '100%', borderCollapse: 'collapse', fontSize: '0.88rem'}}>
                  <thead>
                    <tr style={{background: 'linear-gradient(90deg,#f8fafc,#f1f5f9)'}}>
                      <th style={{padding: '0.75rem 1rem', textAlign: 'left', fontWeight: 700, color: '#475569', fontSize: '0.78rem', textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid rgba(203,213,225,0.6)'}}>Product</th>
                      <th style={{padding: '0.75rem 1rem', textAlign: 'right', fontWeight: 700, color: '#475569', fontSize: '0.78rem', textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid rgba(203,213,225,0.6)'}}>Qty Sold</th>
                      <th style={{padding: '0.75rem 1rem', textAlign: 'right', fontWeight: 700, color: '#475569', fontSize: '0.78rem', textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid rgba(203,213,225,0.6)'}}>Revenue</th>
                      <th style={{padding: '0.75rem 1rem', textAlign: 'right', fontWeight: 700, color: '#475569', fontSize: '0.78rem', textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid rgba(203,213,225,0.6)'}}>Avg Price</th>
                      <th style={{padding: '0.75rem 1rem', textAlign: 'left', fontWeight: 700, color: '#475569', fontSize: '0.78rem', textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid rgba(203,213,225,0.6)', minWidth: '120px'}}>Share</th>
                    </tr>
                  </thead>
                  <tbody>
                    {products.slice(0, 15).map((p, idx) => {
                      const productSales = sales.filter(s => s.barcode === p.barcode);
                      const qtySold = productSales.reduce((sum, s) => sum + s.quantity, 0);
                      const revenue = productSales.reduce((sum, s) => sum + s.total, 0);
                      const avgPrice = qtySold > 0 ? revenue / qtySold : 0;
                      const pct = totalRevenue > 0 ? ((revenue / totalRevenue) * 100) : 0;
                      const isTop = idx === 0 && revenue > 0;
                      return (
                        <tr key={p.barcode} style={{borderTop: '1px solid rgba(203,213,225,0.35)', background: isTop ? 'rgba(37,99,235,0.03)' : 'transparent', transition: 'background 0.15s'}}
                          onMouseOver={e => e.currentTarget.style.background='rgba(37,99,235,0.04)'}
                          onMouseOut={e => e.currentTarget.style.background = isTop ? 'rgba(37,99,235,0.03)' : 'transparent'}
                        >
                          <td style={{padding: '0.7rem 1rem', fontWeight: 600, color: '#1e293b'}}>
                            <div style={{display: 'flex', alignItems: 'center', gap: '6px'}}>
                              {isTop && <span style={{background: 'linear-gradient(135deg,#f59e0b,#fbbf24)', color: '#fff', borderRadius: '4px', padding: '1px 5px', fontSize: '0.68rem', fontWeight: 800, letterSpacing: '0.04em', flexShrink: 0}}>TOP</span>}
                              {p.name}
                            </div>
                          </td>
                          <td style={{padding: '0.7rem 1rem', textAlign: 'right', color: '#475569', fontWeight: 500}}>{qtySold.toLocaleString()}</td>
                          <td style={{padding: '0.7rem 1rem', textAlign: 'right', fontWeight: 700, color: '#059669'}}>{currency} {revenue.toLocaleString()}</td>
                          <td style={{padding: '0.7rem 1rem', textAlign: 'right', color: '#64748b'}}>{currency} {Math.round(avgPrice).toLocaleString()}</td>
                          <td style={{padding: '0.7rem 1rem'}}>
                            <div style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
                              <div style={{flex: 1, background: 'rgba(203,213,225,0.4)', borderRadius: '99px', height: '6px', overflow: 'hidden'}}>
                                <div style={{width: `${pct}%`, background: 'linear-gradient(90deg,#2563eb,#60a5fa)', borderRadius: '99px', height: '100%', transition: 'width 0.4s ease'}} />
                              </div>
                              <span style={{fontSize: '0.78rem', fontWeight: 700, color: '#2563eb', minWidth: '36px', textAlign: 'right'}}>{pct.toFixed(1)}%</span>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------- Credit Management Modal ---------- */
function CreditManagementModal({ credits, sales, settings, onClose, onUpdateCredit, onDeleteCredit }) {
  const [query, setQuery] = useState("");
  const [showPaymentForm, setShowPaymentForm] = useState(null);
  const [paymentAmount, setPaymentAmount] = useState("");
  const [editingCreditId, setEditingCreditId] = useState(null);
  const [editedCredit, setEditedCredit] = useState(null);
  const [activeTab, setActiveTab] = useState("customers");

  const startEditingCredit = (credit) => {
    setShowPaymentForm(null);
    setPaymentAmount("");
    setEditingCreditId(credit.id);
    setEditedCredit({ ...credit });
  };

  const cancelEditCredit = () => {
    setEditingCreditId(null);
    setEditedCredit(null);
  };

  const saveEditedCredit = () => {
    if (!editedCredit) return;
    const updated = {
      ...editedCredit,
      original_amount: parseFloat(editedCredit.original_amount) || 0,
      balance_amount: parseFloat(editedCredit.balance_amount) || 0,
      paid_amount: parseFloat(editedCredit.original_amount) - parseFloat(editedCredit.balance_amount) || 0,
      last_updated: new Date().toISOString(),
      status: editedCredit.balance_amount <= 0 ? "paid" : editedCredit.status || "partial"
    };
    onUpdateCredit(updated, null);
    cancelEditCredit();
  };

  const handleAddPayment = (credit) => {
    if (!paymentAmount || parseFloat(paymentAmount) <= 0) {
      return;
    }
    const amount = parseFloat(paymentAmount);
    const updatedCredit = {
      ...credit,
      paid_amount: (credit.paid_amount || 0) + amount,
      balance_amount: Math.max(0, credit.balance_amount - amount),
      payment_history: [...(credit.payment_history || []), { amount, date: new Date().toISOString() }],
      status: amount >= credit.balance_amount ? "paid" : "partial",
      last_updated: new Date().toISOString()
    };
    const updatedSales = sales.map(sale => {
      if (sale.receipt_number === credit.receipt_number) {
        return {
          ...sale,
          payment_method: (credit.balance_amount - amount) <= 0 ? "cash" : "partial_credit",
          payment_date: new Date().toISOString(),
          credit_id: credit.id
        };
      }
      return sale;
    });

    onUpdateCredit(updatedCredit, updatedSales);
    setShowPaymentForm(null);
    setPaymentAmount("");
  };

  const filteredCredits = useMemo(() => {
    if (!query) return credits;
    const q = query.toLowerCase();
    return credits.filter(c =>
      c.customer_name.toLowerCase().includes(q) ||
      (c.customer_phone && c.customer_phone.includes(q)) ||
      c.receipt_number.includes(q)
    );
  }, [credits, query]);

  // Group customers with credits
  const customerSummary = useMemo(() => {
    const customerMap = new Map();
    filteredCredits.forEach(credit => {
      if (!customerMap.has(credit.customer_name)) {
        customerMap.set(credit.customer_name, {
          name: credit.customer_name,
          phone: credit.customer_phone,
          totalBalance: 0,
          totalOriginal: 0,
          creditsCount: 0,
          status: "active",
          lastUpdated: credit.last_updated,
          credits: []
        });
      }
      const customer = customerMap.get(credit.customer_name);
      customer.totalBalance += credit.balance_amount || 0;
      customer.totalOriginal += credit.original_amount || 0;
      customer.creditsCount += 1;
      customer.credits.push(credit);
      if (credit.status === "paid") customer.status = "paid";
      customer.lastUpdated = new Date(credit.last_updated) > new Date(customer.lastUpdated) ? credit.last_updated : customer.lastUpdated;
    });
    return Array.from(customerMap.values());
  }, [filteredCredits]);

  const curr = settings?.currency || 'TSH';
  const totalBalance = credits.reduce((s,c)=>s+(c.balance_amount||0),0);
  const totalOriginalAll = credits.reduce((s,c)=>s+(c.original_amount||0),0);
  const totalPaidAll = totalOriginalAll - totalBalance;
  const activeCount = credits.filter(c=>c.status!=='paid').length;

  const exportCSV = () => {
    const data = activeTab==="customers" ? customerSummary.flatMap(c=>c.credits) : filteredCredits;
    const csv = creditsToCSV(data);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download = `credits_${new Date().toISOString().split('T')[0]}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  const tabStyle = (id) => ({
    display:'flex',alignItems:'center',gap:'6px',
    padding:'0.65rem 1.25rem', border:'none',
    borderBottom: activeTab===id ? '2.5px solid #2563eb' : '2.5px solid transparent',
    background:'transparent',
    color: activeTab===id ? '#2563eb' : '#64748b',
    fontWeight: activeTab===id ? 700 : 500,
    fontSize:'0.88rem', cursor:'pointer', transition:'all 0.15s', marginBottom:'-1px'
  });

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-2 z-50">
      <div className="glass-card page-modal rounded-2xl shadow-2xl w-full max-w-7xl max-h-[95vh] flex flex-col overflow-hidden" style={{background:'rgba(248,250,252,0.55)'}}>

        {/* Header */}
        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'12px',padding:'9px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z" fill="white"/></svg>
            </div>
            <div>
              <h2 style={{color:'#fff',fontSize:'1.3rem',fontWeight:800,margin:0,letterSpacing:'-0.01em'}}>Credit Management</h2>
              <p className="theme-header-subtext" style={{fontSize:'0.8rem',margin:0}}>{activeCount} active credits &nbsp;·&nbsp; {curr}</p>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
            <button onClick={exportCSV}
              style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem'}}
              onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
              onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}
            >Export CSV</button>
            <button onClick={onClose}
              style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'5px'}}
              onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
              onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}
            >
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
              Close
            </button>
          </div>
        </div>

        {/* KPI Strip */}
        <div style={{padding:'0.85rem 1.25rem 0',flexShrink:0}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'0.6rem'}}>
            {[
              {label:'Total Issued',  value:`${curr} ${totalOriginalAll.toLocaleString()}`, accent:'#60a5fa', bg:'rgba(96,165,250,0.1)'},
              {label:'Outstanding',   value:`${curr} ${totalBalance.toLocaleString()}`,     accent:'#f97316', bg:'rgba(249,115,22,0.1)'},
              {label:'Collected',     value:`${curr} ${totalPaidAll.toLocaleString()}`,     accent:'#10b981', bg:'rgba(16,185,129,0.1)'},
              {label:'Active Credits',value:activeCount,                                    accent:'#a78bfa', bg:'rgba(167,139,250,0.1)'},
            ].map((k,i)=>(
              <div key={i} style={{background:'#fff',borderRadius:'12px',padding:'0.7rem 1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 1px 6px rgba(15,23,42,0.04)'}}>
                <div style={{fontSize:'0.68rem',color:'#94a3b8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.25rem'}}>{k.label}</div>
                <div style={{fontSize:'1rem',fontWeight:800,color:k.accent}}>{k.value}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Search + Tabs row */}
        <div style={{padding:'0.6rem 1.25rem 0',flexShrink:0,display:'flex',alignItems:'center',gap:'0.6rem'}}>
          <div style={{position:'relative',flex:1}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style={{position:'absolute',left:'10px',top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}><circle cx="11" cy="11" r="8" stroke="#94a3b8" strokeWidth="2"/><path d="M21 21l-4.35-4.35" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round"/></svg>
            <input value={query} onChange={e=>setQuery(e.target.value)}
              placeholder={activeTab==="customers"?"Search customers…":"Search by name, phone, or receipt…"}
              style={{width:'100%',padding:'7px 10px 7px 32px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.88rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />
          </div>
          {query&&<button onClick={()=>setQuery('')} style={{background:'transparent',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',padding:'7px 12px',color:'#64748b',fontWeight:600,cursor:'pointer',fontSize:'0.82rem'}}>Clear</button>}
        </div>

        {/* Tabs */}
        <div style={{display:'flex',gap:'0',padding:'0 1.25rem',background:'#fff',borderBottom:'1px solid rgba(203,213,225,0.5)',flexShrink:0,marginTop:'0.5rem'}}>
          <button onClick={()=>{setActiveTab("customers");setQuery('');}} style={tabStyle("customers")}>Customers ({customerSummary.length})</button>
          <button onClick={()=>{setActiveTab("credits");setQuery('');}} style={tabStyle("credits")}>All Credits ({filteredCredits.length})</button>
        </div>

        {/* Content */}
        <div className="flex-1 overflow-y-auto" style={{padding:'1rem 1.25rem 1.25rem',minHeight:0}}>

          {/* Customers Tab */}
          {activeTab==="customers" && (
            <div style={{display:'grid',gap:'0.75rem'}}>
              {customerSummary.map((customer,idx)=>{
                const paidPct = customer.totalOriginal>0 ? Math.round(((customer.totalOriginal-customer.totalBalance)/customer.totalOriginal)*100) : 100;
                const isActive = customer.totalBalance>0;
                return (
                  <div key={idx} style={{background:'#fff',borderRadius:'14px',padding:'1.1rem 1.25rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 1px 8px rgba(15,23,42,0.04)'}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'0.85rem'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'0.75rem'}}>
                        <div style={{width:'42px',height:'42px',borderRadius:'10px',background:isActive?'rgba(249,115,22,0.1)':'rgba(16,185,129,0.1)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                          <svg width="20" height="20" viewBox="0 0 24 24" fill={isActive?'#f97316':'#10b981'}><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
                        </div>
                        <div>
                          <h3 style={{fontWeight:700,color:'#0f172a',fontSize:'1rem',margin:0}}>{customer.name}</h3>
                          <p style={{fontSize:'0.8rem',color:'#64748b',margin:0}}>{customer.phone||'No phone'} &nbsp;·&nbsp; {customer.creditsCount} credit{customer.creditsCount!==1?'s':''}</p>
                        </div>
                      </div>
                      <span style={{padding:'4px 12px',borderRadius:'99px',fontSize:'0.73rem',fontWeight:700,background:isActive?'rgba(249,115,22,0.1)':'rgba(16,185,129,0.1)',color:isActive?'#ea580c':'#059669',border:`1px solid ${isActive?'rgba(249,115,22,0.25)':'rgba(16,185,129,0.25)'}`}}>
                        {isActive?'OUTSTANDING':'CLEARED'}
                      </span>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.6rem',marginBottom:'0.85rem'}}>
                      {[
                        {label:'Total Issued', value:`${curr} ${customer.totalOriginal.toLocaleString()}`, color:'#475569'},
                        {label:'Balance Due',  value:`${curr} ${customer.totalBalance.toLocaleString()}`,  color: isActive?'#ea580c':'#059669'},
                        {label:'Collected',    value:`${curr} ${(customer.totalOriginal-customer.totalBalance).toLocaleString()}`, color:'#059669'},
                      ].map((s,i)=>(
                        <div key={i} style={{background:'#f8fafc',borderRadius:'8px',padding:'0.6rem 0.75rem'}}>
                          <div style={{fontSize:'0.7rem',color:'#94a3b8',fontWeight:600,marginBottom:'2px'}}>{s.label}</div>
                          <div style={{fontSize:'0.95rem',fontWeight:700,color:s.color}}>{s.value}</div>
                        </div>
                      ))}
                    </div>
                    {/* Progress bar */}
                    <div style={{marginBottom:'0.75rem'}}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'4px'}}>
                        <span style={{fontSize:'0.72rem',color:'#64748b',fontWeight:600}}>Repayment progress</span>
                        <span style={{fontSize:'0.72rem',fontWeight:700,color:'#059669'}}>{paidPct}%</span>
                      </div>
                      <div style={{background:'rgba(203,213,225,0.4)',borderRadius:'99px',height:'7px',overflow:'hidden'}}>
                        <div style={{width:`${paidPct}%`,background:'linear-gradient(90deg,#10b981,#34d399)',borderRadius:'99px',height:'100%',transition:'width 0.4s'}} />
                      </div>
                    </div>
                    <button onClick={()=>setActiveTab("credits")}
                      style={{background:'rgba(37,99,235,0.07)',border:'1px solid rgba(37,99,235,0.2)',borderRadius:'8px',padding:'6px 18px',color:'#2563eb',fontWeight:600,cursor:'pointer',fontSize:'0.82rem'}}>
                      View Details
                    </button>
                  </div>
                );
              })}
              {customerSummary.length===0&&<div style={{textAlign:'center',padding:'3rem',color:'#94a3b8'}}>No customers with credits found.</div>}
            </div>
          )}

          {/* Credits Tab */}
          {activeTab==="credits" && (
            <div style={{background:'#fff',borderRadius:'14px',border:'1px solid rgba(203,213,225,0.5)',overflow:'hidden',boxShadow:'0 1px 8px rgba(15,23,42,0.04)'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.875rem'}}>
                <thead>
                  <tr style={{background:'linear-gradient(90deg,#f8fafc,#f1f5f9)'}}>
                    {['Customer','Phone','Receipt #','Original','Balance','Due Date','Status','Actions'].map((h,i)=>(
                      <th key={h} style={{padding:'0.75rem 1rem',textAlign:i>=3&&i<=4?'right':'left',fontWeight:700,color:'#475569',fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.04em',borderBottom:'1px solid rgba(203,213,225,0.6)',whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filteredCredits.map((credit)=>(
                    <React.Fragment key={credit.id}>
                      <tr style={{borderTop:'1px solid rgba(203,213,225,0.3)',transition:'background 0.12s'}}
                        onMouseOver={e=>e.currentTarget.style.background='rgba(37,99,235,0.02)'}
                        onMouseOut={e=>e.currentTarget.style.background='transparent'}
                      >
                        <td style={{padding:'0.7rem 1rem',fontWeight:600,color:'#1e293b'}}>{credit.customer_name}</td>
                        <td style={{padding:'0.7rem 1rem',color:'#64748b',fontSize:'0.82rem'}}>{credit.customer_phone||'—'}</td>
                        <td style={{padding:'0.7rem 1rem',fontFamily:'ui-monospace,monospace',fontSize:'0.78rem',color:'#64748b'}}>{credit.receipt_number}</td>
                        <td style={{padding:'0.7rem 1rem',textAlign:'right',color:'#475569',fontWeight:500}}>{curr} {credit.original_amount.toLocaleString()}</td>
                        <td style={{padding:'0.7rem 1rem',textAlign:'right',fontWeight:700,color:credit.balance_amount>0?'#ea580c':'#059669'}}>{curr} {credit.balance_amount.toLocaleString()}</td>
                        <td style={{padding:'0.7rem 1rem',color:'#64748b',fontSize:'0.82rem'}}>{formatDate(credit.due_date)}</td>
                        <td style={{padding:'0.7rem 1rem'}}>
                          <span style={{display:'inline-block',padding:'2px 8px',borderRadius:'99px',fontSize:'0.72rem',fontWeight:700,
                            background:credit.status==='paid'?'rgba(16,185,129,0.1)':credit.status==='partial'?'rgba(249,115,22,0.1)':'rgba(239,68,68,0.1)',
                            color:credit.status==='paid'?'#059669':credit.status==='partial'?'#ea580c':'#dc2626',
                            border:`1px solid ${credit.status==='paid'?'rgba(16,185,129,0.3)':credit.status==='partial'?'rgba(249,115,22,0.3)':'rgba(239,68,68,0.3)'}`
                          }}>{credit.status.toUpperCase()}</span>
                        </td>
                        <td style={{padding:'0.7rem 1rem'}}>
                          <div style={{display:'flex',gap:'0.35rem',flexWrap:'wrap'}}>
                            {credit.status!=='paid'&&<button onClick={()=>setShowPaymentForm(showPaymentForm===credit.id?null:credit.id)}
                              style={{background:'rgba(16,185,129,0.1)',border:'1px solid rgba(16,185,129,0.25)',borderRadius:'6px',padding:'4px 10px',color:'#059669',fontWeight:600,cursor:'pointer',fontSize:'0.78rem',whiteSpace:'nowrap'}}>Pay</button>}
                            <button onClick={()=>startEditingCredit(credit)}
                              style={{background:'rgba(37,99,235,0.08)',border:'1px solid rgba(37,99,235,0.2)',borderRadius:'6px',padding:'4px 10px',color:'#2563eb',fontWeight:600,cursor:'pointer',fontSize:'0.78rem'}}>Edit</button>
                            <button onClick={()=>onDeleteCredit(credit.id)}
                              style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'6px',padding:'4px 10px',color:'#dc2626',fontWeight:600,cursor:'pointer',fontSize:'0.78rem'}}>Del</button>
                          </div>
                        </td>
                      </tr>
                      {editingCreditId===credit.id&&editedCredit&&(
                        <tr>
                          <td colSpan="8" style={{padding:'1rem',background:'rgba(37,99,235,0.03)',borderTop:'1px solid rgba(37,99,235,0.1)'}}>
                            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.75rem',marginBottom:'0.75rem'}}>
                              {[
                                {label:'Customer Name',key:'customer_name',type:'text'},
                                {label:'Phone',key:'customer_phone',type:'text'},
                                {label:'Due Date',key:'due_date',type:'date',transform:v=>v?v.split('T')[0]:''},
                                {label:'Original Amount',key:'original_amount',type:'number'},
                                {label:'Balance Amount',key:'balance_amount',type:'number'},
                              ].map(f=>(
                                <div key={f.key}>
                                  <label style={{display:'block',fontSize:'0.75rem',fontWeight:600,color:'#475569',marginBottom:'4px'}}>{f.label}</label>
                                  <input type={f.type} value={f.transform?f.transform(editedCredit[f.key]):editedCredit[f.key]||''}
                                    onChange={e=>setEditedCredit({...editedCredit,[f.key]:e.target.value})}
                                    style={{width:'100%',padding:'6px 10px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'7px',fontSize:'0.85rem',color:'#334155',boxSizing:'border-box'}} />
                                </div>
                              ))}
                            </div>
                            <div style={{display:'flex',gap:'0.5rem'}}>
                              <button onClick={saveEditedCredit} style={{background:'linear-gradient(135deg,#1e40af,#3b82f6)',border:'none',borderRadius:'7px',padding:'7px 18px',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:'0.85rem'}}>Save</button>
                              <button onClick={cancelEditCredit} style={{background:'transparent',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'7px',padding:'7px 14px',color:'#64748b',fontWeight:600,cursor:'pointer',fontSize:'0.85rem'}}>Cancel</button>
                            </div>
                          </td>
                        </tr>
                      )}
                      {showPaymentForm===credit.id&&(
                        <tr>
                          <td colSpan="8" style={{padding:'1rem',background:'rgba(16,185,129,0.03)',borderTop:'1px solid rgba(16,185,129,0.15)'}}>
                            <div style={{display:'flex',alignItems:'flex-end',gap:'1rem',flexWrap:'wrap'}}>
                              <div style={{flex:1,minWidth:'200px'}}>
                                <label style={{display:'block',fontSize:'0.75rem',fontWeight:600,color:'#475569',marginBottom:'4px'}}>Payment Amount ({curr}) — max {curr} {credit.balance_amount.toLocaleString()}</label>
                                <input type="number" value={paymentAmount} onChange={e=>setPaymentAmount(e.target.value)}
                                  max={credit.balance_amount} min="1" placeholder="Enter amount"
                                  style={{width:'100%',padding:'7px 10px',border:'1px solid rgba(16,185,129,0.35)',borderRadius:'7px',fontSize:'0.88rem',color:'#334155',boxSizing:'border-box'}} />
                              </div>
                              <button onClick={()=>handleAddPayment(credit)} disabled={!paymentAmount||parseFloat(paymentAmount)<=0}
                                style={{background:'linear-gradient(135deg,#059669,#10b981)',border:'none',borderRadius:'7px',padding:'8px 20px',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:'0.88rem',opacity:!paymentAmount||parseFloat(paymentAmount)<=0?0.5:1}}>
                                Record Payment
                              </button>
                              <button onClick={()=>{setShowPaymentForm(null);setPaymentAmount('');}}
                                style={{background:'transparent',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'7px',padding:'8px 14px',color:'#64748b',fontWeight:600,cursor:'pointer',fontSize:'0.88rem'}}>Cancel</button>
                            </div>
                            {credit.payment_history&&credit.payment_history.length>0&&(
                              <div style={{marginTop:'0.75rem'}}>
                                <p style={{fontSize:'0.75rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:'0.4rem'}}>Payment History</p>
                                <div style={{display:'flex',flexWrap:'wrap',gap:'0.4rem'}}>
                                  {credit.payment_history.map((p,i)=>(
                                    <div key={i} style={{background:'#fff',border:'1px solid rgba(16,185,129,0.2)',borderRadius:'7px',padding:'4px 12px',fontSize:'0.8rem',display:'flex',gap:'10px'}}>
                                      <span style={{color:'#64748b'}}>{new Date(p.date).toLocaleDateString()}</span>
                                      <span style={{fontWeight:700,color:'#059669'}}>{curr} {p.amount.toLocaleString()}</span>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            )}
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  ))}
                  {filteredCredits.length===0&&<tr><td colSpan="8" style={{padding:'3rem',textAlign:'center',color:'#94a3b8'}}>No credits found.</td></tr>}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------- Expenses Management Modal ---------- */
function ExpensesModal({ expenses, settings, onClose, onAddExpense, onDeleteExpense, currentUser }) {
  const [query, setQuery] = useState("");
  const [showAddForm, setShowAddForm] = useState(false);
  const [newExpense, setNewExpense] = useState({
    description: "",
    category: "",
    amount: "",
    date: new Date().toISOString().split('T')[0],
    notes: ""
  });

  const handleAddExpense = () => {
    if (!newExpense.description.trim() || !newExpense.amount || parseFloat(newExpense.amount) <= 0) {
      alert("Please enter description and valid amount");
      return;
    }

    const expense = {
      id: `EXP_${Date.now()}`,
      description: newExpense.description.trim(),
      category: newExpense.category.trim(),
      amount: parseFloat(newExpense.amount),
      date: newExpense.date,
      user: currentUser?.name || "Unknown",
      notes: newExpense.notes.trim()
    };

    onAddExpense(expense);
    setNewExpense({
      description: "",
      category: "",
      amount: "",
      date: new Date().toISOString().split('T')[0],
      notes: ""
    });
    setShowAddForm(false);
  };

  const handleDeleteExpense = (expenseId) => {
    if (confirm("Are you sure you want to delete this expense?")) {
      onDeleteExpense(expenseId);
    }
  };

  const filteredExpenses = useMemo(() => {
    if (!query) return expenses;
    const q = query.toLowerCase();
    return expenses.filter(e =>
      e.description.toLowerCase().includes(q) ||
      e.category.toLowerCase().includes(q) ||
      e.notes.toLowerCase().includes(q)
    );
  }, [expenses, query]);

  const totalExpenses = filteredExpenses.reduce((sum, e) => sum + e.amount, 0);

  const currency = settings?.currency || 'TSH';
  const categoryTotals = useMemo(() => {
    const map = {};
    filteredExpenses.forEach(e => { const c = e.category||'Uncategorized'; map[c]=(map[c]||0)+e.amount; });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,3);
  }, [filteredExpenses]);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-2 z-50">
      <div className="glass-card rounded-2xl shadow-2xl w-full max-w-6xl max-h-[95vh] flex flex-col overflow-hidden" style={{background:'rgba(248,250,252,0.55)'}}>

        {/* Header */}
        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'12px',padding:'9px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="white"/></svg>
            </div>
            <div>
              <h2 style={{color:'#fff',fontSize:'1.3rem',fontWeight:800,margin:0,letterSpacing:'-0.01em'}}>Expenses</h2>
              <p className="theme-header-subtext" style={{fontSize:'0.8rem',margin:0}}>{filteredExpenses.length} records &nbsp;·&nbsp; {currency}</p>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
            <button onClick={()=>setShowAddForm(v=>!v)}
              style={{background:'rgba(16,185,129,0.25)',border:'1px solid rgba(16,185,129,0.4)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:'0.82rem'}}>
              + Add Expense
            </button>
            <button onClick={onClose}
              style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'5px'}}
              onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
              onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}
            >
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
              Close
            </button>
          </div>
        </div>

        {/* KPI Strip */}
        <div style={{padding:'0.85rem 1.25rem 0',flexShrink:0}}>
          <div style={{display:'grid',gridTemplateColumns:`repeat(${2+categoryTotals.length},1fr)`,gap:'0.6rem'}}>
            <div style={{background:'#fff',borderRadius:'12px',padding:'0.7rem 1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 1px 6px rgba(15,23,42,0.04)'}}>
              <div style={{fontSize:'0.68rem',color:'#94a3b8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.25rem'}}>Total</div>
              <div style={{fontSize:'1rem',fontWeight:800,color:'#ef4444'}}>{currency} {totalExpenses.toLocaleString()}</div>
            </div>
            <div style={{background:'#fff',borderRadius:'12px',padding:'0.7rem 1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 1px 6px rgba(15,23,42,0.04)'}}>
              <div style={{fontSize:'0.68rem',color:'#94a3b8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.25rem'}}>Records</div>
              <div style={{fontSize:'1rem',fontWeight:800,color:'#60a5fa'}}>{filteredExpenses.length}</div>
            </div>
            {categoryTotals.map(([cat,amt],i)=>(
              <div key={i} style={{background:'#fff',borderRadius:'12px',padding:'0.7rem 1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 1px 6px rgba(15,23,42,0.04)',overflow:'hidden'}}>
                <div style={{fontSize:'0.68rem',color:'#94a3b8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.25rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cat}</div>
                <div style={{fontSize:'0.95rem',fontWeight:800,color:'#f97316'}}>{currency} {amt.toLocaleString()}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Add Form */}
        {showAddForm && (
          <div style={{margin:'0.75rem 1.25rem 0',background:'#fff',borderRadius:'14px',border:'1px solid rgba(37,99,235,0.2)',padding:'1.1rem 1.25rem',boxShadow:'0 2px 12px rgba(37,99,235,0.06)',flexShrink:0}}>
            <h3 style={{fontWeight:700,color:'#1e40af',fontSize:'0.95rem',marginBottom:'0.85rem'}}>New Expense</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem',marginBottom:'0.75rem'}}>
              {[
                {label:'Description *',key:'description',type:'text',placeholder:'Expense description'},
                {label:'Category',key:'category',type:'text',placeholder:'e.g. Office, Travel'},
                {label:`Amount * (${currency})`,key:'amount',type:'number',placeholder:'0.00'},
                {label:'Date',key:'date',type:'date',placeholder:''},
              ].map(f=>(
                <div key={f.key}>
                  <label style={{display:'block',fontSize:'0.78rem',fontWeight:600,color:'#475569',marginBottom:'4px'}}>{f.label}</label>
                  <input type={f.type} value={newExpense[f.key]} placeholder={f.placeholder}
                    onChange={e=>setNewExpense({...newExpense,[f.key]:e.target.value})}
                    style={{width:'100%',padding:'7px 10px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.88rem',color:'#334155',background:'#f8fafc',boxSizing:'border-box'}} />
                </div>
              ))}
            </div>
            <div style={{marginBottom:'0.75rem'}}>
              <label style={{display:'block',fontSize:'0.78rem',fontWeight:600,color:'#475569',marginBottom:'4px'}}>Notes</label>
              <textarea value={newExpense.notes} onChange={e=>setNewExpense({...newExpense,notes:e.target.value})} placeholder="Additional notes" rows="2"
                style={{width:'100%',padding:'7px 10px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.88rem',color:'#334155',background:'#f8fafc',boxSizing:'border-box',resize:'vertical'}} />
            </div>
            <div style={{display:'flex',gap:'0.5rem'}}>
              <button onClick={handleAddExpense} style={{background:'linear-gradient(135deg,#1e40af,#3b82f6)',border:'none',borderRadius:'8px',padding:'8px 20px',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:'0.88rem'}}>Save Expense</button>
              <button onClick={()=>setShowAddForm(false)} style={{background:'transparent',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',padding:'8px 16px',color:'#64748b',fontWeight:600,cursor:'pointer',fontSize:'0.88rem'}}>Cancel</button>
            </div>
          </div>
        )}

        {/* Search */}
        <div style={{padding:'0.75rem 1.25rem',flexShrink:0}}>
          <div style={{position:'relative'}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style={{position:'absolute',left:'10px',top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}><circle cx="11" cy="11" r="8" stroke="#94a3b8" strokeWidth="2"/><path d="M21 21l-4.35-4.35" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round"/></svg>
            <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search by description, category, or notes…"
              style={{width:'100%',padding:'7px 10px 7px 32px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.88rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />
          </div>
        </div>

        {/* Table */}
        <div className="flex-1 overflow-y-auto" style={{padding:'0 1.25rem 1.25rem',minHeight:0}}>
          <div style={{background:'#fff',borderRadius:'14px',border:'1px solid rgba(203,213,225,0.5)',overflow:'hidden',boxShadow:'0 1px 8px rgba(15,23,42,0.04)'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.875rem'}}>
              <thead>
                <tr style={{background:'linear-gradient(90deg,#f8fafc,#f1f5f9)'}}>
                  {['Date','Description','Category','Amount','Recorded By',''].map((h,i)=>(
                    <th key={i} style={{padding:'0.75rem 1rem',textAlign:i===3?'right':i===5?'center':'left',fontWeight:700,color:'#475569',fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.04em',borderBottom:'1px solid rgba(203,213,225,0.6)',whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filteredExpenses.map(expense=>(
                  <tr key={expense.id} style={{borderTop:'1px solid rgba(203,213,225,0.3)',transition:'background 0.12s'}}
                    onMouseOver={e=>e.currentTarget.style.background='rgba(37,99,235,0.03)'}
                    onMouseOut={e=>e.currentTarget.style.background='transparent'}
                  >
                    <td style={{padding:'0.7rem 1rem',color:'#475569',whiteSpace:'nowrap',fontSize:'0.82rem'}}>{new Date(expense.date).toLocaleDateString()}</td>
                    <td style={{padding:'0.7rem 1rem'}}>
                      <div style={{fontWeight:600,color:'#1e293b'}}>{expense.description}</div>
                      {expense.notes&&<div style={{fontSize:'0.78rem',color:'#64748b',marginTop:'1px'}}>{expense.notes}</div>}
                    </td>
                    <td style={{padding:'0.7rem 1rem'}}>
                      {expense.category?<span style={{background:'rgba(139,92,246,0.1)',border:'1px solid rgba(139,92,246,0.2)',borderRadius:'99px',padding:'2px 10px',fontSize:'0.75rem',fontWeight:600,color:'#7c3aed'}}>{expense.category}</span>:<span style={{color:'#94a3b8'}}>—</span>}
                    </td>
                    <td style={{padding:'0.7rem 1rem',textAlign:'right',fontWeight:700,color:'#ef4444'}}>{currency} {expense.amount.toLocaleString()}</td>
                    <td style={{padding:'0.7rem 1rem',color:'#64748b',fontSize:'0.85rem'}}>{expense.user}</td>
                    <td style={{padding:'0.7rem 1rem',textAlign:'center'}}>
                      <button onClick={()=>handleDeleteExpense(expense.id)}
                        style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'6px',padding:'4px 10px',color:'#dc2626',fontWeight:600,cursor:'pointer',fontSize:'0.8rem'}}>Delete</button>
                    </td>
                  </tr>
                ))}
                {filteredExpenses.length===0&&<tr><td colSpan="6" style={{padding:'3rem',textAlign:'center',color:'#94a3b8'}}>No expenses found.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Supplier Management Modal ---------- */
function SupplierManagementModal({ suppliers, onClose, onUpdateSupplier, onDeleteSupplier, onOpenAddPurchase }) {
  const [query, setQuery] = useState("");
  const [editingSupplierId, setEditingSupplierId] = useState(null);
  const [editedSupplier, setEditedSupplier] = useState(null);

  const startEditSupplier = (supplier) => {
    setEditingSupplierId(supplier.id);
    setEditedSupplier({ ...supplier });
  };

  const cancelEditSupplier = () => {
    setEditingSupplierId(null);
    setEditedSupplier(null);
  };

  const saveSupplierEdit = () => {
    if (!editedSupplier) return;
    const updated = {
      ...editedSupplier,
      original_amount: parseFloat(editedSupplier.original_amount) || 0,
      balance_amount: parseFloat(editedSupplier.balance_amount) || 0,
      last_updated: new Date().toISOString(),
      status: editedSupplier.balance_amount <= 0 ? "paid" : editedSupplier.status || "pending"
    };
    onUpdateSupplier(updated);
    cancelEditSupplier();
  };

  const filteredSuppliers = useMemo(() => {
    if (!query) return suppliers;
    const q = query.toLowerCase();
    return suppliers.filter(s =>
      s.supplier_name.toLowerCase().includes(q) ||
      (s.supplier_phone || "").includes(q)
    );
  }, [suppliers, query]);

  const totalOwed = suppliers.reduce((s,sup)=>s+(sup.balance_amount||0),0);
  const totalPaid = suppliers.reduce((s,sup)=>s+(sup.original_amount||0)-(sup.balance_amount||0),0);
  const activeSuppliers = new Set(suppliers.map(s=>s.supplier_name)).size;

  const exportCSV = () => {
    const csv = suppliersToCSV(filteredSuppliers);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download = `suppliers_${new Date().toISOString().split('T')[0]}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  const statusColor = s => s==='paid'?{bg:'rgba(16,185,129,0.1)',color:'#059669',border:'rgba(16,185,129,0.3)'}:s==='partial'?{bg:'rgba(249,115,22,0.1)',color:'#ea580c',border:'rgba(249,115,22,0.3)'}:{bg:'rgba(239,68,68,0.1)',color:'#dc2626',border:'rgba(239,68,68,0.3)'};

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-2 z-50">
      <div className="glass-card rounded-2xl shadow-2xl w-full max-w-7xl max-h-[95vh] flex flex-col overflow-hidden" style={{background:'rgba(248,250,252,0.55)'}}>
        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'12px',padding:'9px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="white" strokeWidth="2" strokeLinejoin="round"/><path d="M9 22V12h6v10" stroke="white" strokeWidth="2" strokeLinejoin="round"/></svg>
            </div>
            <div>
              <h2 style={{color:'#fff',fontSize:'1.3rem',fontWeight:800,margin:0}}>Supplier Management</h2>
              <p className="theme-header-subtext" style={{fontSize:'0.8rem',margin:0}}>{activeSuppliers} suppliers &nbsp;·&nbsp; {filteredSuppliers.length} purchase{filteredSuppliers.length!==1?'s':''}</p>
            </div>
          </div>
          <div style={{display:'flex',gap:'0.5rem'}}>
            <button onClick={onOpenAddPurchase}
              style={{background:'rgba(16,185,129,0.25)',border:'1px solid rgba(16,185,129,0.4)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:'0.82rem'}}>+ Add Purchase</button>
            <button onClick={exportCSV}
              style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem'}}
              onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
              onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}
            >Export CSV</button>
            <button onClick={onClose}
              style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'5px'}}
              onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
              onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}
            ><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg> Close</button>
          </div>
        </div>

        <div style={{padding:'0.85rem 1.25rem 0',flexShrink:0}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.6rem'}}>
            {[{label:'Total Purchases',value:suppliers.length,accent:'#60a5fa'},{label:'Outstanding',value:`TSH ${totalOwed.toLocaleString()}`,accent:'#f97316'},{label:'Paid So Far',value:`TSH ${totalPaid.toLocaleString()}`,accent:'#10b981'}].map((k,i)=>(
              <div key={i} style={{background:'#fff',borderRadius:'12px',padding:'0.7rem 1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 1px 6px rgba(15,23,42,0.04)'}}>
                <div style={{fontSize:'0.68rem',color:'#94a3b8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.25rem'}}>{k.label}</div>
                <div style={{fontSize:'1rem',fontWeight:800,color:k.accent}}>{k.value}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{padding:'0.75rem 1.25rem',flexShrink:0,display:'flex',gap:'0.6rem'}}>
          <div style={{position:'relative',flex:1}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style={{position:'absolute',left:'10px',top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}><circle cx="11" cy="11" r="8" stroke="#94a3b8" strokeWidth="2"/><path d="M21 21l-4.35-4.35" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round"/></svg>
            <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search by name or phone…"
              style={{width:'100%',padding:'7px 10px 7px 32px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.88rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />
          </div>
          {query&&<button onClick={()=>setQuery('')} style={{background:'transparent',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',padding:'7px 12px',color:'#64748b',fontWeight:600,cursor:'pointer',fontSize:'0.82rem'}}>Clear</button>}
        </div>

        <div className="flex-1 overflow-y-auto" style={{padding:'0 1.25rem 1.25rem',minHeight:0}}>
          <div style={{background:'#fff',borderRadius:'14px',border:'1px solid rgba(203,213,225,0.5)',overflow:'hidden',boxShadow:'0 1px 8px rgba(15,23,42,0.04)'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.875rem'}}>
              <thead><tr style={{background:'linear-gradient(90deg,#f8fafc,#f1f5f9)'}}>
                {['Supplier','Phone','Date','Amount','Balance','Status','Actions'].map((h,i)=>(
                  <th key={h} style={{padding:'0.75rem 1rem',textAlign:i>=3&&i<=4?'right':'left',fontWeight:700,color:'#475569',fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.04em',borderBottom:'1px solid rgba(203,213,225,0.6)',whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {filteredSuppliers.map(supplier=>(
                  <React.Fragment key={supplier.id}>
                    <tr style={{borderTop:'1px solid rgba(203,213,225,0.3)',transition:'background 0.12s'}}
                      onMouseOver={e=>e.currentTarget.style.background='rgba(37,99,235,0.03)'}
                      onMouseOut={e=>e.currentTarget.style.background='transparent'}
                    >
                      <td style={{padding:'0.7rem 1rem',fontWeight:600,color:'#1e293b'}}>{supplier.supplier_name}</td>
                      <td style={{padding:'0.7rem 1rem',color:'#64748b',fontSize:'0.82rem'}}>{supplier.supplier_phone||'—'}</td>
                      <td style={{padding:'0.7rem 1rem',color:'#475569',fontSize:'0.82rem',whiteSpace:'nowrap'}}>{formatDate(supplier.purchase_date)}</td>
                      <td style={{padding:'0.7rem 1rem',textAlign:'right',fontWeight:500,color:'#475569'}}>TSH {supplier.original_amount.toLocaleString()}</td>
                      <td style={{padding:'0.7rem 1rem',textAlign:'right',fontWeight:700,color:supplier.balance_amount>0?'#ea580c':'#059669'}}>TSH {supplier.balance_amount.toLocaleString()}</td>
                      <td style={{padding:'0.7rem 1rem'}}>
                        {(()=>{const sc=statusColor(supplier.status);return <span style={{display:'inline-block',padding:'2px 9px',borderRadius:'99px',fontSize:'0.73rem',fontWeight:700,background:sc.bg,color:sc.color,border:`1px solid ${sc.border}`}}>{supplier.status.toUpperCase()}</span>;})()}
                      </td>
                      <td style={{padding:'0.7rem 1rem'}}>
                        <div style={{display:'flex',gap:'0.35rem'}}>
                          <button onClick={()=>startEditSupplier(supplier)}
                            style={{background:'rgba(37,99,235,0.08)',border:'1px solid rgba(37,99,235,0.2)',borderRadius:'6px',padding:'4px 10px',color:'#2563eb',fontWeight:600,cursor:'pointer',fontSize:'0.78rem'}}>Edit</button>
                          <button onClick={()=>onDeleteSupplier(supplier.id)}
                            style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'6px',padding:'4px 10px',color:'#dc2626',fontWeight:600,cursor:'pointer',fontSize:'0.78rem'}}>Delete</button>
                        </div>
                      </td>
                    </tr>
                    {editingSupplierId===supplier.id&&editedSupplier&&(
                      <tr>
                        <td colSpan="7" style={{padding:'1rem',background:'rgba(37,99,235,0.025)',borderTop:'1px solid rgba(37,99,235,0.1)'}}>
                          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.75rem',marginBottom:'0.75rem'}}>
                            {[{label:'Supplier Name',key:'supplier_name',type:'text'},{label:'Phone',key:'supplier_phone',type:'text'},{label:'Purchase Date',key:'purchase_date',type:'date',transform:v=>v?v.split('T')[0]:''},{label:'Amount',key:'original_amount',type:'number'},{label:'Balance',key:'balance_amount',type:'number'}].map(f=>(
                              <div key={f.key}>
                                <label style={{display:'block',fontSize:'0.75rem',fontWeight:600,color:'#475569',marginBottom:'4px'}}>{f.label}</label>
                                <input type={f.type} value={f.transform?f.transform(editedSupplier[f.key]):editedSupplier[f.key]||''} onChange={e=>setEditedSupplier({...editedSupplier,[f.key]:e.target.value})}
                                  style={{width:'100%',padding:'6px 10px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'7px',fontSize:'0.85rem',color:'#334155',boxSizing:'border-box'}} />
                              </div>
                            ))}
                            <div>
                              <label style={{display:'block',fontSize:'0.75rem',fontWeight:600,color:'#475569',marginBottom:'4px'}}>Status</label>
                              <select value={editedSupplier.status||'pending'} onChange={e=>setEditedSupplier({...editedSupplier,status:e.target.value})}
                                style={{width:'100%',padding:'6px 10px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'7px',fontSize:'0.85rem',color:'#334155',boxSizing:'border-box'}}>
                                <option value="pending">Pending</option>
                                <option value="paid">Paid</option>
                                <option value="partial">Partial</option>
                              </select>
                            </div>
                          </div>
                          <div style={{display:'flex',gap:'0.5rem'}}>
                            <button onClick={saveSupplierEdit} style={{background:'linear-gradient(135deg,#1e40af,#3b82f6)',border:'none',borderRadius:'7px',padding:'7px 18px',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:'0.85rem'}}>Save</button>
                            <button onClick={cancelEditSupplier} style={{background:'transparent',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'7px',padding:'7px 14px',color:'#64748b',fontWeight:600,cursor:'pointer',fontSize:'0.85rem'}}>Cancel</button>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                ))}
                {filteredSuppliers.length===0&&<tr><td colSpan="7" style={{padding:'3rem',textAlign:'center',color:'#94a3b8'}}>No supplier records found.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Add Supplier Purchase Modal ---------- */
function AddSupplierPurchaseModal({ products, onClose, onSave, currentUser }) {
  const [supplierName, setSupplierName] = useState("");
  const [supplierPhone, setSupplierPhone] = useState("");
  const [purchaseDate, setPurchaseDate] = useState(new Date().toISOString().split('T')[0]);
  const [paymentMethod, setPaymentMethod] = useState("cash");
  const [dueDate, setDueDate] = useState("");
  const [notes, setNotes] = useState("");
  const [selectedItems, setSelectedItems] = useState([]);
  const [productSearch, setProductSearch] = useState("");
  const [searchResults, setSearchResults] = useState([]);
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [quantity, setQuantity] = useState("");
  const [buyPrice, setBuyPrice] = useState("");
  const [sellPrice, setSellPrice] = useState("");
  const [expirationDate, setExpirationDate] = useState("");

  useEffect(() => {
    if (!productSearch.trim()) {
      setSearchResults([]);
      return;
    }

    const query = productSearch.toLowerCase();
    const results = products.filter(p =>
      p.name.toLowerCase().includes(query) ||
      p.barcode.includes(query)
    ).slice(0, 8);

    setSearchResults(results);
  }, [productSearch, products]);

  useEffect(() => {
    if (paymentMethod === "credit" && !dueDate) {
      const futureDate = new Date();
      futureDate.setDate(futureDate.getDate() + 30);
      setDueDate(futureDate.toISOString().split('T')[0]);
    }
  }, [paymentMethod, dueDate]);

  const selectProduct = (product) => {
    setSelectedProduct(product);
    setProductSearch(product.name);
    setSearchResults([]);
    if (product.buy_price) {
      setBuyPrice(product.buy_price.toString());
      setSellPrice(Math.round(product.buy_price * 1.5).toString());
    } else if (product.price) {
      setSellPrice(product.price.toString());
    }
  };

  const addItem = () => {
    if (!selectedProduct || !quantity || !buyPrice) {
      alert("Please select a product, enter quantity, and buy price");
      return;
    }

    const item = {
      barcode: selectedProduct.barcode,
      name: selectedProduct.name,
      quantity: parseInt(quantity, 10),
      buy_price: parseFloat(buyPrice),
      sell_price: parseFloat(sellPrice) || parseFloat(buyPrice) * 1.5,
      expiration_date: expirationDate || selectedProduct.expiration_date || "",
      added_by: currentUser?.name || "Unknown"
    };

    setSelectedItems([...selectedItems, item]);
    setSelectedProduct(null);
    setProductSearch("");
    setQuantity("");
    setBuyPrice("");
    setSellPrice("");
    setExpirationDate("");
  };

  const removeItem = (index) => {
    setSelectedItems(selectedItems.filter((_, i) => i !== index));
  };

  const calculateTotal = () => {
    return selectedItems.reduce((sum, item) => sum + (item.quantity * item.buy_price), 0);
  };

  const handleSave = () => {
    if (!supplierName.trim()) {
      alert("Please enter supplier name");
      return;
    }

    if (selectedItems.length === 0) {
      alert("Please add at least one item");
      return;
    }

    const totalAmount = calculateTotal();
    const supplierPurchase = {
      id: `SUP_${Date.now()}`,
      supplier_name: supplierName.trim(),
      supplier_phone: supplierPhone.trim(),
      purchase_date: purchaseDate,
      items: selectedItems,
      original_amount: totalAmount,
      paid_amount: paymentMethod === "cash" ? totalAmount : 0,
      balance_amount: paymentMethod === "credit" ? totalAmount : 0,
      payment_method: paymentMethod,
      due_date: paymentMethod === "credit" ? dueDate : "",
      status: paymentMethod === "cash" ? "paid" : "pending",
      payment_history: paymentMethod === "cash" ? [{
        date: new Date().toISOString(),
        amount: totalAmount,
        user: currentUser?.name || "Unknown"
      }] : [],
      last_updated: new Date().toISOString(),
      notes: notes.trim()
    };

    onSave(supplierPurchase);
  };

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-2 z-50">
      <div className="glass-card rounded-2xl shadow-2xl w-full max-w-6xl max-h-[95vh] overflow-hidden flex flex-col" style={{background:'rgba(248,250,252,0.55)'}}>

        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'12px',padding:'9px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z" stroke="white" strokeWidth="2"/><path d="M16 3H8L6 7h12l-2-4z" stroke="white" strokeWidth="2" strokeLinejoin="round"/></svg>
            </div>
            <div>
              <h2 style={{color:'#fff',fontSize:'1.3rem',fontWeight:800,margin:0,letterSpacing:'-0.01em'}}>Add Supplier Purchase</h2>
              <p className="theme-header-subtext" style={{fontSize:'0.8rem',margin:0}}>Record purchases from suppliers (cash or credit)</p>
            </div>
          </div>
          <button onClick={onClose}
            style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'5px'}}
            onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
            onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
            Close
          </button>
        </div>

        <div className="modal-content-scrollable">
          <div className="grid md:grid-cols-2 gap-6 flex-1 min-h-0">
            <div className="space-y-4">
              <div style={{background:'#fff',borderRadius:'12px',padding:'1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 1px 6px rgba(15,23,42,0.04)'}}>
                <h3 style={{fontWeight:700,color:'#0f172a',fontSize:'0.95rem',marginBottom:'0.85rem'}}>Supplier Information</h3>
                <div className="space-y-4">
                  <div>
                    <label className="form-label">Supplier Name *</label>
                    <input
                      type="text"
                      value={supplierName}
                      onChange={(e) => setSupplierName(e.target.value)}
                      className="form-input"
                      placeholder="Enter supplier name"
                      required
                    />
                  </div>
                  <div>
                    <label className="form-label">Supplier Phone</label>
                    <input
                      type="tel"
                      value={supplierPhone}
                      onChange={(e) => setSupplierPhone(e.target.value)}
                      className="form-input"
                      placeholder="Enter phone number"
                    />
                  </div>
                  <div>
                    <label className="form-label">Purchase Date</label>
                    <input
                      type="date"
                      value={purchaseDate}
                      onChange={(e) => setPurchaseDate(e.target.value)}
                      className="form-input"
                    />
                  </div>
                  <div>
                    <label className="form-label">Payment Method</label>
                    <div className="grid grid-cols-2 gap-2">
                      <button
                        className={`btn ${paymentMethod === "cash" ? "btn-primary" : "btn-outline"}`}
                        onClick={() => setPaymentMethod("cash")}
                      >
                        Cash
                      </button>
                      <button
                        className={`btn ${paymentMethod === "credit" ? "btn-primary" : "btn-outline"}`}
                        onClick={() => setPaymentMethod("credit")}
                      >
                        Credit
                      </button>
                    </div>
                  </div>
                  {paymentMethod === "credit" && (
                    <div>
                      <label className="form-label">Due Date</label>
                      <input
                        type="date"
                        value={dueDate}
                        onChange={(e) => setDueDate(e.target.value)}
                        className="form-input"
                      />
                    </div>
                  )}
                  <div>
                    <label className="form-label">Notes</label>
                    <textarea
                      value={notes}
                      onChange={(e) => setNotes(e.target.value)}
                      className="form-input h-24"
                      placeholder="Additional notes about this purchase..."
                    />
                  </div>
                </div>
              </div>
            </div>

            <div className="space-y-4">
              <div style={{background:'#fff',borderRadius:'12px',padding:'1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 1px 6px rgba(15,23,42,0.04)'}}>
                <h3 style={{fontWeight:700,color:'#0f172a',fontSize:'0.95rem',marginBottom:'0.85rem'}}>Add Items</h3>
                <div className="space-y-4">
                  <div>
                    <label className="form-label">Search Product</label>
                    <input
                      type="text"
                      value={productSearch}
                      onChange={(e) => setProductSearch(e.target.value)}
                      className="form-input"
                      placeholder="Type product name or barcode..."
                    />
                    {searchResults.length > 0 && (
                      <div className="mt-2 border border-slate-200 rounded-lg max-h-40 overflow-y-auto bg-white shadow-lg">
                        {searchResults.map((product, idx) => (
                          <div
                            key={idx}
                            className="px-4 py-3 hover:bg-blue-50 cursor-pointer border-b border-slate-100 last:border-b-0"
                            onClick={() => selectProduct(product)}
                          >
                            <div className="font-medium">{product.name}</div>
                            <div className="text-sm text-slate-500">
                              Barcode: <span className="font-mono">{product.barcode}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="form-label">Quantity *</label>
                      <input
                        type="number"
                        value={quantity}
                        onChange={(e) => setQuantity(e.target.value)}
                        className="form-input"
                        placeholder="Quantity"
                        min="1"
                        disabled={!selectedProduct}
                      />
                    </div>
                    <div>
                      <label className="form-label">Buy Price (TSH) *</label>
                      <input
                        type="number"
                        value={buyPrice}
                        onChange={(e) => setBuyPrice(e.target.value)}
                        className="form-input"
                        placeholder="Buying price"
                        min="0"
                        step="0.01"
                        disabled={!selectedProduct}
                      />
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="form-label">Sell Price (TSH)</label>
                      <input
                        type="number"
                        value={sellPrice}
                        onChange={(e) => setSellPrice(e.target.value)}
                        className="form-input"
                        placeholder="Will auto-calculate"
                        min="0"
                        step="0.01"
                        disabled={!selectedProduct}
                      />
                    </div>
                    <div>
                      <label className="form-label">Expiration Date</label>
                      <input
                        type="date"
                        value={expirationDate}
                        onChange={(e) => setExpirationDate(e.target.value)}
                        className="form-input"
                        disabled={!selectedProduct}
                      />
                    </div>
                  </div>

                  <button
                    onClick={addItem}
                    className="btn btn-primary w-full"
                    disabled={!selectedProduct || !quantity || !buyPrice}
                  >
                    Add Item to Purchase
                  </button>
                </div>
              </div>

              <div style={{background:'#fff',borderRadius:'12px',padding:'1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 1px 6px rgba(15,23,42,0.04)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.85rem'}}>
                  <h3 style={{fontWeight:700,color:'#0f172a',fontSize:'0.95rem',margin:0}}>Selected Items ({selectedItems.length})</h3>
                  <div style={{fontSize:'1rem',fontWeight:800,color:'#059669',fontFamily:'ui-monospace,monospace'}}>
                    Total: {calculateTotal().toLocaleString()}
                  </div>
                </div>

                {selectedItems.length === 0 ? (
                  <div style={{textAlign:'center',padding:'2rem',color:'#94a3b8',fontSize:'0.88rem'}}>
                    No items added yet
                  </div>
                ) : (
                  <div style={{display:'flex',flexDirection:'column',gap:'0.4rem',maxHeight:'240px',overflowY:'auto'}}>
                    {selectedItems.map((item, index) => (
                      <div key={index} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0.6rem 0.75rem',background:'#f8fafc',borderRadius:'8px',border:'1px solid rgba(203,213,225,0.4)'}}>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:600,color:'#0f172a',fontSize:'0.88rem'}}>{item.name}</div>
                          <div style={{fontSize:'0.78rem',color:'#64748b'}}>
                            {item.quantity} × {item.buy_price.toLocaleString()} = {(item.quantity * item.buy_price).toLocaleString()}
                          </div>
                        </div>
                        <button onClick={()=>removeItem(index)}
                          style={{padding:'4px 10px',borderRadius:'6px',border:'1px solid rgba(239,68,68,0.3)',background:'rgba(239,68,68,0.07)',color:'#dc2626',fontWeight:600,cursor:'pointer',fontSize:'0.78rem'}}
                          onMouseOver={e=>e.currentTarget.style.background='rgba(239,68,68,0.14)'}
                          onMouseOut={e=>e.currentTarget.style.background='rgba(239,68,68,0.07)'}>
                          Remove
                        </button>
                      </div>
                    ))}
                  </div>
                )}

                <div style={{marginTop:'0.85rem',paddingTop:'0.75rem',borderTop:'1px solid rgba(203,213,225,0.5)'}}>
                  <button onClick={handleSave} disabled={!supplierName.trim()||selectedItems.length===0}
                    style={{width:'100%',padding:'11px',borderRadius:'9px',border:'none',
                      background:(!supplierName.trim()||selectedItems.length===0)?'#cbd5e1':'linear-gradient(135deg,#059669,#10b981)',
                      color:'#fff',fontWeight:700,cursor:(!supplierName.trim()||selectedItems.length===0)?'not-allowed':'pointer',fontSize:'0.9rem',
                      boxShadow:(!supplierName.trim()||selectedItems.length===0)?'none':'0 4px 14px rgba(16,185,129,0.3)',transition:'opacity 0.15s'}}
                    onMouseOver={e=>{if(supplierName.trim()&&selectedItems.length>0)e.currentTarget.style.opacity='0.9';}}
                    onMouseOut={e=>e.currentTarget.style.opacity='1'}>
                    Save Purchase
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Employee Performance Modal ---------- */
function EmployeePerformanceModal({ sales, users, onClose }) {
  const perfData = users.map(user => {
    const userSales = sales.filter(s => s.user_name === user.name || s.user === user.name);
    const transactions = new Set(userSales.map(s=>s.receipt_number)).size;
    const itemsSold = userSales.reduce((sum,s)=>sum+s.quantity,0);
    const revenue = userSales.reduce((sum,s)=>sum+s.total,0);
    return { ...user, transactions, itemsSold, revenue };

function UserManagementModal({ users, onClose, onSave, currentUser }) {
  const [userList, setUserList] = useState(users);
  const [showAdd, setShowAdd] = useState(false);
  const [newUser, setNewUser] = useState({ username: "", password: "", name: "", role: "teller" });
  const [editingUserId, setEditingUserId] = useState(null);
  const [editedUser, setEditedUser] = useState(null);
  const [query, setQuery] = useState("");
  const filteredUsers = useMemo(() => {
    if (!query) return userList;
    const q = query.toLowerCase();
    return userList.filter(u =>
      u.username.toLowerCase().includes(q) ||
      u.name.toLowerCase().includes(q)
    );
  }, [userList, query]);

  const addUser = () => {
    if (!newUser.username || !newUser.password || !newUser.name) {
      alert("Please fill all required fields");
      return;
    }

    if (userList.find(u => u.username === newUser.username)) {
      alert("Username already exists");
      return;
    }

    const user = {
      id: Math.max(...userList.map(u => u.id), 0) + 1,
      ...newUser,
      created: new Date().toISOString()
    };

    const updated = [...userList, user];
    setUserList(updated);
    onSave(updated);
    setNewUser({ username: "", password: "", name: "", role: "teller" });
    setShowAdd(false);
  };

  const startEditUser = (user) => {
    setEditingUserId(user.id);
    setEditedUser({ ...user, password: "" });
  };

  const cancelEditUser = () => {
    setEditingUserId(null);
    setEditedUser(null);
  };

    if (!editedUser.username || !editedUser.name) {
