            function generateAnalyticsPDF() {
                let totalRevenue = sales.reduce((a, s) => a + (s.finalTotal || 0), 0);
                let totalCost = 0;
                let productSales = {};

                sales.forEach(s => {
                    (s.items || []).forEach(itm => {
                        const qty = Number(itm.qty || 0);
                        const p = products.find(prod => String(prod.id) === String(itm.productId));
                        totalCost += (Number(p?.buyPrice || 0) * qty);

                        const key = String(itm.productId ?? itm.name ?? 'unknown');
                        if (!productSales[key]) {
                            productSales[key] = {
                                name: itm.name || p?.name || 'Unknown Product',
                                qty: 0,
                                revenue: 0
                            };
                        }
                        productSales[key].qty += qty;
                        productSales[key].revenue += Number((itm.price || 0) * qty);
                    });
                });

                let totalExpenses = expenses.reduce((a, e) => a + (e.amount || 0), 0);
                let netProfit = totalRevenue - totalCost - totalExpenses;
                let transactionCount = sales.length;
                let margin = totalRevenue > 0 ? ((netProfit / totalRevenue) * 100).toFixed(1) : '0.0';

                const last7Days = [];
                const dailyRevenue = [];
                for (let i = 6; i >= 0; i--) {
                    const date = new Date();
                    date.setDate(date.getDate() - i);
                    last7Days.push(date.toLocaleDateString('en', { weekday: 'short' }));
                    const dayTotal = sales
                        .filter(s => new Date(s.date).toDateString() === date.toDateString())
                        .reduce((sum, s) => sum + (s.finalTotal || 0), 0);
                    dailyRevenue.push(dayTotal);
                }

                const topProducts = Object.values(productSales)
                    .sort((a, b) => b.qty - a.qty)
                    .slice(0, 6);

                const { doc, pageWidth, startY, meta } = createModernPdfDoc('Analytics Report', 'Pesa POS | Revenue, costs, and product insights');
                let cursorY = drawPdfMetricCards(doc, startY, [
                    {
                        label: 'Revenue',
                        value: formatPdfCurrency(totalRevenue),
                        note: `${transactionCount} transactions`,
                        color: [240, 249, 255],
                        border: [186, 230, 253],
                        valueColor: [12, 74, 110]
                    },
                    {
                        label: 'Expenses',
                        value: formatPdfCurrency(totalExpenses),
                        note: `Cost ${formatPdfCurrency(totalCost)}`,
                        color: [255, 241, 242],
                        border: [254, 205, 211],
                        valueColor: [159, 18, 57]
                    },
                    {
                        label: 'Net Profit',
                        value: formatPdfCurrency(netProfit),
                        note: `${margin}% margin`,
                        color: netProfit >= 0 ? [236, 253, 245] : [254, 242, 242],
                        border: netProfit >= 0 ? [167, 243, 208] : [254, 202, 202],
                        valueColor: netProfit >= 0 ? [6, 95, 70] : [153, 27, 27]
                    }
                ]);

                cursorY = ensurePdfSpace(doc, cursorY, 72);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(12);
                doc.setTextColor(17, 24, 39);
                doc.text('Revenue Trend (Last 7 Days)', 14, cursorY);
                const lineChartImage = createAnalyticsLineChartImage(last7Days, dailyRevenue);
                if (lineChartImage) {
                    doc.addImage(lineChartImage, 'PNG', 14, cursorY + 2, pageWidth - 28, 62);
                }
                cursorY += 68;

                cursorY = ensurePdfSpace(doc, cursorY, 72);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(12);
                doc.setTextColor(17, 24, 39);
                doc.text('Product Distribution (Top Sellers)', 14, cursorY);
                const pieSeries = topProducts.map(p => ({ name: p.name, qty: p.qty }));
                const pieChartImage = createAnalyticsPieChartImage(pieSeries);
                if (pieChartImage) {
                    doc.addImage(pieChartImage, 'PNG', 14, cursorY + 2, pageWidth - 28, 62);
                }
                cursorY += 68;

                const productRows = topProducts.map((p, idx) => [
                    `${idx + 1}`,
                    p.name,
                    `${p.qty}`,
                    formatPdfCurrency(p.revenue)
                ]);

                if (productRows.length > 0) {
                    cursorY = ensurePdfSpace(doc, cursorY, 24);
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(12);
                    doc.setTextColor(17, 24, 39);
                    doc.text('Top Selling Products', 14, cursorY);

                    drawStyledPdfTable(doc, {
                        head: [['#', 'Product', 'Units Sold', 'Revenue']],
                        body: productRows,
                        startY: cursorY + 2,
                        columnStyles: {
                            0: { halign: 'center', cellWidth: 12 },
                            2: { halign: 'right', cellWidth: 30 },
                            3: { halign: 'right', cellWidth: 40 }
                        }
                    });
                }

                finalizeModernPdfDoc(doc, meta);
                downloadPDF(doc, 'analytics.pdf');
                showToast('Analytics PDF saved');
            }

            function buildReceiptPDF(sale) {
                if (!window.jspdf) throw new Error('PDF library not loaded');
                const { jsPDF } = window.jspdf;

                const receiptNo = sale.receiptNumber || `RCPT-${sale.id}`;
                const saleDate = new Date(sale.date);
                const items = sale.items || [];
                const subtotal = Number(sale.subtotal || sale.finalTotal || 0);
                const discount = Number(sale.discountAmount || 0);
                const loyalty = Number(sale.loyaltyRedeemedValue || 0);
                const total = Number(sale.finalTotal || 0);
                const paid = Number(sale.amountPaidNow || sale.paidAmount || total);
                const outstanding = Number(sale.outstandingAmount || 0);
                const change = Math.max(0, paid - total);
                const logo = getPdfLogoPayload();
                const shop = shopBrand || {};
                const PW = 80;  // 80mm thermal receipt width

                const doc = new jsPDF({ unit: 'mm', format: [PW, 297], orientation: 'portrait' });
                const W = doc.internal.pageSize.getWidth();
                let y = 0;

                const pLine = (h = 0.3, col = [220, 230, 240]) => {
                    doc.setDrawColor(...col); doc.setLineWidth(h);
                    doc.line(6, y, W - 6, y); y += 2;
                };
                const pDash = () => {
                    doc.setDrawColor(200, 210, 220); doc.setLineWidth(0.2);
                    doc.setLineDashPattern([1.2, 1.2], 0);
                    doc.line(6, y, W - 6, y);
                    doc.setLineDashPattern([], 0);
                    y += 2.5;
                };
                const pText = (text, size, style, align, color = [30, 41, 59]) => {
                    doc.setFont('helvetica', style || 'normal');
                    doc.setFontSize(size || 9);
                    doc.setTextColor(...color);
                    const xPos = align === 'right' ? W - 6 : align === 'center' ? W / 2 : 6;
                    doc.text(String(text || ''), xPos, y, { align: align || 'left' });
                    y += (size || 9) * 0.48;
                };
                const pRow = (left, right, size = 9, boldRight = false) => {
                    doc.setFont('helvetica', 'normal'); doc.setFontSize(size); doc.setTextColor(30, 41, 59);
                    doc.text(String(left), 6, y);
                    doc.setFont('helvetica', boldRight ? 'bold' : 'normal');
                    doc.text(String(right), W - 6, y, { align: 'right' });
                    y += size * 0.48;
                };

                // ── HEADER ──
                y = 6;
                // Logo
                if (logo.type === 'image') {
                    try { doc.addImage(logo.src, logo.format, W / 2 - 8, y, 16, 16); y += 19; }
                    catch { y += 1; }
                } else {
                    doc.setFillColor(10, 25, 47);
                    doc.circle(W / 2, y + 6, 7, 'F');
                    doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold'); doc.setFontSize(10);
                    doc.text(logo.text, W / 2, y + 8.5, { align: 'center' });
                    y += 17;
                }
                pText(shop.name || 'Pesa POS', 13, 'bold', 'center', [10, 25, 47]);
                if (shop.address) { y += 0.5; pText(shop.address, 8, 'normal', 'center', [100, 116, 139]); }
                if (shop.phone) pText(shop.phone, 8, 'normal', 'center', [100, 116, 139]);
                y += 2; pLine(0.5, [10, 25, 47]);

                // ── RECEIPT TITLE ──
                y += 1;
                pText('SALES RECEIPT', 11, 'bold', 'center', [10, 25, 47]);
                y += 1; pLine(0.3, [200, 215, 230]);

                // ── RECEIPT META ──
                y += 1;
                pRow('Receipt #', receiptNo, 8);
                pRow('Date', saleDate.toLocaleDateString(), 8);
                pRow('Time', saleDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), 8);
                pRow('Cashier', sale.userName || 'Unknown', 8);
                if (sale.customerName) pRow('Customer', sale.customerName, 8);
                y += 1; pDash();

                // ── ITEMS HEADER ──
                doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(100, 116, 139);
                doc.text('ITEM', 6, y);
                doc.text('QTY', W * 0.58, y, { align: 'right' });
                doc.text('PRICE', W * 0.77, y, { align: 'right' });
                doc.text('TOTAL', W - 6, y, { align: 'right' });
                y += 4; pLine(0.2, [220, 230, 240]);

                // ── ITEMS ──
                items.forEach(item => {
                    const qty = Number(item.qty || 1);
                    const price = Number(item.price || 0);
                    const lineTotal = qty * price;
                    doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); doc.setTextColor(30, 41, 59);
                    const nameLines = doc.splitTextToSize(item.name || '-', W * 0.52);
                    doc.text(nameLines, 6, y);
                    doc.text(String(qty), W * 0.58, y, { align: 'right' });
                    doc.text(formatPdfCurrency(price), W * 0.77, y, { align: 'right' });
                    doc.setFont('helvetica', 'bold');
                    doc.text(formatPdfCurrency(lineTotal), W - 6, y, { align: 'right' });
                    y += (nameLines.length * 4.2) + 1.2;
                });
                y += 1; pDash();

                // ── TOTALS ──
                if (subtotal !== total || discount > 0 || loyalty > 0) {
                    pRow('Subtotal', formatPdfCurrency(subtotal), 8.5);
                    if (discount > 0) pRow('Discount', `- ${formatPdfCurrency(discount)}`, 8.5);
                    if (loyalty > 0) pRow('Loyalty redeemed', `- ${formatPdfCurrency(loyalty)}`, 8.5);
                    y += 1; pLine(0.25, [200, 215, 230]);
                }

                // Grand total box
                y += 1;
                doc.setFillColor(10, 25, 47);
                doc.roundedRect(5, y - 1.5, W - 10, 9, 1.5, 1.5, 'F');
                doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(255, 255, 255);
                doc.text('TOTAL', 9, y + 4.5);
                doc.text(formatPdfCurrency(total), W - 9, y + 4.5, { align: 'right' });
                y += 12;

                pRow('Payment', sale.payment || 'Cash', 8.5);
                if (sale.paymentStatus === 'partial' || outstanding > 0) {
                    pRow('Amount Paid', formatPdfCurrency(paid), 8.5);
                    doc.setTextColor(220, 38, 38);
                    pRow('Outstanding', formatPdfCurrency(outstanding), 8.5, true);
                    doc.setTextColor(30, 41, 59);
                } else if (change > 0) {
                    pRow('Change', formatPdfCurrency(change), 8.5);
                }

                // Loyalty
                if (sale.loyaltyEarnedPoints > 0 || sale.loyaltyRedeemedPoints > 0) {
                    y += 1; pLine(0.2, [220, 230, 240]);
                    doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(100, 116, 139);
                    if (sale.loyaltyEarnedPoints > 0) { pText(`+ ${sale.loyaltyEarnedPoints} loyalty points earned`, 8, 'normal', 'center', [6, 95, 70]); }
                    if (sale.loyaltyRedeemedPoints > 0) { pText(`- ${sale.loyaltyRedeemedPoints} points redeemed`, 8, 'normal', 'center', [100, 116, 139]); }
                }

                // Status badge
                y += 2; pLine(0.4, [10, 25, 47]);
                const statusLabel = outstanding > 0 ? 'PARTIAL PAYMENT' : 'PAID';
                const statusColor = outstanding > 0 ? [220, 38, 38] : [5, 150, 105];
                doc.setFillColor(...statusColor);
                doc.roundedRect(W / 2 - 16, y, 32, 7, 2, 2, 'F');
                doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(255, 255, 255);
                doc.text(statusLabel, W / 2, y + 4.8, { align: 'center' });
                y += 10;

                // Footer message
                pLine(0.25, [220, 230, 240]);
                y += 1;
                const footerMsg = receiptSettings?.footer || 'Thank you for shopping with us!';
                pText(footerMsg, 9, 'bold', 'center', [10, 25, 47]);
                if (receiptSettings?.showSupportPhone && receiptSettings?.supportPhone) {
                    y += 0.5; pText(`Support: ${receiptSettings.supportPhone}`, 8, 'normal', 'center', [100, 116, 139]);
                }
                y += 1; pText('Powered by Pesa POS', 7, 'normal', 'center', [148, 163, 184]);
                y += 4;

                // Trim page to content
                doc.internal.pageSize.height = y;
                return doc;
            }

            function buildReceiptPNG(sale) {
                const receiptNo = sale.receiptNumber || `RCPT-${sale.id}`;
                const saleDate = new Date(sale.date);
                const items = sale.items || [];
                const shopName = shopBrand?.name || 'Pesa POS';
                const total = Number(sale.finalTotal || 0);
                const discount = Number(sale.discountAmount || 0);
                const subtotal = Number(sale.subtotal || total);
                const outstanding = Number(sale.outstandingAmount || 0);

                const SC = 2; // scale for retina
                const W = 640, PAD = 40;
                const ITEM_H = 46;
                const H_HEADER = 160;
                const H_META = 110;
                const H_ITEMS = items.length * ITEM_H + 60;
                const H_TOTALS = (discount > 0 ? 36 : 0) + 80 + (outstanding > 0 ? 36 : 0) + 80;
                const H_FOOTER = 90;
                const H = H_HEADER + H_META + H_ITEMS + H_TOTALS + H_FOOTER;

                const canvas = document.createElement('canvas');
                canvas.width = W * SC; canvas.height = H * SC;
                const ctx = canvas.getContext('2d');
                ctx.scale(SC, SC);

                const rf = (x, y, w, h, r, fill) => {
                    ctx.beginPath();
                    ctx.moveTo(x + r, y);
                    ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                    ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                    ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                    ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
                    ctx.closePath();
                    ctx.fillStyle = fill; ctx.fill();
                };

                // White background with subtle shadow
                ctx.fillStyle = '#f8fafc';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ffffff';
                rf(16, 16, W - 32, H - 32, 16, '#ffffff');

                // ── HEADER BAND ──
                rf(16, 16, W - 32, H_HEADER, 16, '#0a192f');
                // Teal accent at bottom of header
                ctx.fillStyle = '#06b6d4';
                ctx.fillRect(16, 16 + H_HEADER - 4, W - 32, 4);

                let y = 44;
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${28 / 1}px -apple-system,sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText(shopName, W / 2, y);
                y += 34;
                ctx.fillStyle = '#93c5fd';
                ctx.font = `${15}px -apple-system,sans-serif`;
                ctx.fillText('SALES RECEIPT', W / 2, y);
                y += 22;
                ctx.fillStyle = '#64748b';
                ctx.font = `${13}px -apple-system,sans-serif`;
                ctx.fillText(receiptNo, W / 2, y);

                // ── META SECTION ──
                y = H_HEADER + 30;
                const metaItems = [
                    ['Date', saleDate.toLocaleDateString()],
                    ['Time', saleDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })],
                    ['Cashier', sale.userName || 'Unknown'],
                    ['Payment', sale.payment || 'Cash'],
                ];
                if (sale.customerName) metaItems.push(['Customer', sale.customerName]);
                metaItems.forEach(([label, value]) => {
                    ctx.textAlign = 'left'; ctx.fillStyle = '#94a3b8';
                    ctx.font = `${13}px -apple-system,sans-serif`;
                    ctx.fillText(label, PAD, y);
                    ctx.textAlign = 'right'; ctx.fillStyle = '#1e293b';
                    ctx.font = `bold ${13}px -apple-system,sans-serif`;
                    ctx.fillText(value, W - PAD, y);
                    y += 22;
                });

                // Dashed divider
                y = H_HEADER + H_META;
                ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1; ctx.setLineDash([6, 4]);
                ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
                ctx.setLineDash([]);

                // ── ITEMS HEADER ──
                y += 18;
                ctx.fillStyle = '#64748b';
                ctx.font = `bold ${12}px -apple-system,sans-serif`;
                ctx.textAlign = 'left'; ctx.fillText('ITEM', PAD, y);
                ctx.textAlign = 'center'; ctx.fillText('QTY', W * 0.62, y);
                ctx.textAlign = 'right'; ctx.fillText('TOTAL', W - PAD, y);
                y += 14;

                // ── ITEMS ──
                ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1; ctx.setLineDash([]);
                ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
                y += 4;

                items.forEach((itm, i) => {
                    const qty = Number(itm.qty || 1);
                    const price = Number(itm.price || 0);
                    const lineTotal = qty * price;
                    if (i % 2 === 0) { ctx.fillStyle = '#f8fafc'; ctx.fillRect(PAD - 8, y - 14, W - PAD * 2 + 16, ITEM_H - 4); }
                    ctx.textAlign = 'left'; ctx.fillStyle = '#1e293b';
                    ctx.font = `bold 14px -apple-system,sans-serif`;
                    ctx.fillText(String(itm.name || '').substring(0, 28), PAD, y);
                    ctx.font = `13px -apple-system,sans-serif`; ctx.fillStyle = '#64748b';
                    ctx.fillText(`${qty} × ${formatPdfCurrency(price)}`, PAD, y + 18);
                    ctx.textAlign = 'right'; ctx.fillStyle = '#0f172a';
                    ctx.font = `bold 15px -apple-system,sans-serif`;
                    ctx.fillText(formatPdfCurrency(lineTotal), W - PAD, y + 8);
                    y += ITEM_H;
                });

                y += 4;
                ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
                y += 16;

                // Subtotals
                if (discount > 0 || subtotal !== total) {
                    ctx.textAlign = 'left'; ctx.fillStyle = '#64748b'; ctx.font = `14px -apple-system,sans-serif`;
                    ctx.fillText('Subtotal', PAD, y);
                    ctx.textAlign = 'right'; ctx.fillStyle = '#475569';
                    ctx.fillText(formatPdfCurrency(subtotal), W - PAD, y); y += 28;
                    if (discount > 0) {
                        ctx.textAlign = 'left'; ctx.fillStyle = '#f59e0b'; ctx.font = `14px -apple-system,sans-serif`;
                        ctx.fillText('Discount', PAD, y);
                        ctx.textAlign = 'right';
                        ctx.fillText(`- ${formatPdfCurrency(discount)}`, W - PAD, y); y += 28;
                    }
                }

                // Grand Total box
                rf(PAD - 8, y - 4, W - PAD * 2 + 16, 52, 10, '#0a192f');
                ctx.textAlign = 'left'; ctx.fillStyle = '#94a3b8'; ctx.font = `bold 13px -apple-system,sans-serif`;
                ctx.fillText('TOTAL', PAD, y + 18);
                ctx.textAlign = 'right'; ctx.fillStyle = '#ffffff'; ctx.font = `bold 22px -apple-system,sans-serif`;
                ctx.fillText(formatPdfCurrency(total), W - PAD, y + 20);
                y += 62;

                // Outstanding / status
                if (outstanding > 0) {
                    rf(PAD - 8, y - 4, W - PAD * 2 + 16, 36, 8, '#fef2f2');
                    ctx.textAlign = 'left'; ctx.fillStyle = '#dc2626'; ctx.font = `bold 13px -apple-system,sans-serif`;
                    ctx.fillText('Outstanding', PAD, y + 14);
                    ctx.textAlign = 'right';
                    ctx.fillText(formatPdfCurrency(outstanding), W - PAD, y + 14);
                    y += 46;
                }

                // Status badge
                const statusLabel = outstanding > 0 ? '⚠ PARTIAL PAYMENT' : '✓ PAID';
                const statusFill = outstanding > 0 ? '#fef2f2' : '#ecfdf5';
                const statusTxt = outstanding > 0 ? '#dc2626' : '#059669';
                rf(W / 2 - 80, y, 160, 32, 10, statusFill);
                ctx.textAlign = 'center'; ctx.fillStyle = statusTxt;
                ctx.font = `bold 14px -apple-system,sans-serif`;
                ctx.fillText(statusLabel, W / 2, y + 21);
                y += 46;

                // Footer
                ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
                ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
                ctx.setLineDash([]);
                y += 20;
                const footerMsg = receiptSettings?.footer || 'Thank you for shopping with us!';
                ctx.textAlign = 'center'; ctx.fillStyle = '#0f172a';
                ctx.font = `bold 15px -apple-system,sans-serif`;
                ctx.fillText(footerMsg, W / 2, y); y += 24;
                ctx.fillStyle = '#94a3b8'; ctx.font = `12px -apple-system,sans-serif`;
                ctx.fillText('Powered by Pesa POS', W / 2, y);

                return canvas;
            }

            async function sendReceiptOnWhatsApp(sale, phoneRaw) {
                const phone = String(phoneRaw || '').replace(/\D/g, '');
                if (!phone) {
                    showToast('Enter a WhatsApp number to send receipt', 'error');
                    return;
                }

                const receiptNo = sale.receiptNumber || `RCPT-${sale.id}`;
                const message = `Hello, here is your receipt ${receiptNo} from ${shopBrand?.name || 'Pesa POS'} for ${formatPdfCurrency(sale.finalTotal)}.`;
                const fileName = `receipt-${sale.id}.png`;

                try {
                    const canvas = buildReceiptPNG(sale);
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
                    const file = new File([blob], fileName, { type: 'image/png' });

                    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            title: 'Sales Receipt',
                            text: message,
                            files: [file]
                        });
                        showToast('Receipt sent');
                        return;
                    }

                    // Fallback: download PNG then open WhatsApp
                    saveBlob(blob, fileName);
                } catch (err) {
                    // ignore share cancellation
                }

                const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(`${message} Image downloaded, please attach it from your files.`)}`;
                const popup = window.open(waUrl, '_blank');
                if (!popup) {
                    try {
                        await navigator.clipboard.writeText(waUrl);
                        showToast('WhatsApp link copied. Open WhatsApp and paste it.');
                    } catch {
                        showToast('Open WhatsApp manually and attach the downloaded image.', 'error');
                    }
                    return;
                }
                showToast('Image downloaded. Attach it in WhatsApp chat.');
            }

                const bindCartEvents = () => {
                    const refreshComputed = () => {

                            const amountInput = overlay.querySelector('#amountPaidInput');
                            if (amountInput) amountInput.value = '0';
                            amountPaidDraft = 0;
                        }
                        overlay.querySelector('#liveTotalCard').textContent = formatMoney(totals.finalTotal);
                        overlay.querySelector('#summarySubtotal').textContent = formatMoney(totals.subtotal);
                        overlay.querySelector('#summaryItemDiscount').textContent = `-${formatMoney(totals.itemDiscountTotal)}`;
                        overlay.querySelector('#summaryCartDiscount').textContent = `-${formatMoney(totals.cartDiscountAmount)}`;
                        overlay.querySelector('#summaryLoyaltyDiscount').textContent = `-${formatMoney(totals.loyaltyRedeemedValue)}`;
                        const taxEl = overlay.querySelector('#summaryTax');
                        if (taxEl) taxEl.textContent = `+${formatMoney(totals.taxAmount)}`;
                        overlay.querySelector('#summaryOutstanding').textContent = formatMoney(Math.max(0, totals.finalTotal - adjustedPaid));
                        overlay.querySelector('#summaryTotal').textContent = formatMoney(totals.finalTotal);
                        overlay.querySelector('#customerPointsHint').textContent = `Available loyalty points: ${totals.availablePoints}`;
                        // Show change due when customer pays more than total
                        const changeEl = overlay.querySelector('#summaryChangeDue');
                        if (changeEl) {
                            const change = Math.max(0, adjustedPaid - totals.finalTotal);
                            if (paymentStatus === 'paid' && change > 0) {
                                changeEl.style.display = 'flex';
                                changeEl.querySelector('strong').textContent = formatMoney(change);
                            } else {
                                changeEl.style.display = 'none';
                            }
                        }
                    };

                    overlay.querySelectorAll('.payment-option').forEach(el => {
                        el.addEventListener('click', event => {
                            event.preventDefault();
                            selectedPayment = el.dataset.pay;
                            renderCartOverlay();
                        });
                    });

                    // Split payment
                    overlay.querySelector('#addSplitBtn')?.addEventListener('click', () => {
                        const methods = ['Cash', 'Card', 'Mobile'];
                        const remaining = getTotals().finalTotal - splitPayments.reduce((s, p) => s + Number(p.amount || 0), 0);
                        const nextMethod = methods.find(m => !splitPayments.some(sp => sp.method === m)) || 'Cash';
                        splitPayments.push({ method: nextMethod, amount: Math.max(0, remaining) });
                        renderCartOverlay();
                    });
                    overlay.querySelectorAll('.remove-split-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            splitPayments.splice(parseInt(btn.dataset.idx), 1);
                            renderCartOverlay();
                        });
                    });
                    overlay.querySelectorAll('.split-amount-input').forEach(inp => {
                        inp.addEventListener('input', () => {
                            splitPayments[parseInt(inp.dataset.idx)].amount = Number(inp.value || 0);
                        });
                    });

                    overlay.querySelector('#closeCartModal')?.addEventListener('click', () => {
                        overlay.remove();
                        const badge = document.getElementById('cartItemCount');
                        if (badge) badge.textContent = cart.reduce((a, i) => a + i.qty, 0);
                    });

                    overlay.querySelectorAll('.cart-item-remove-btn').forEach(button => {
                        button.addEventListener('click', event => {
                            event.stopPropagation();
                            const idx = Number(button.dataset.idx);
                            if (!Number.isNaN(idx)) {
                                cart.splice(idx, 1);
                                saveCart();
                                amountPaidDraft = null;
                                renderCartOverlay();
                                const badge = document.getElementById('cartItemCount');
                                if (badge) badge.textContent = cart.reduce((a, i) => a + i.qty, 0);
                            }
                        });
                    });

                    overlay.querySelectorAll('.cart-item-price-btn').forEach(button => {
                        button.addEventListener('click', () => {
                            const idx = Number(button.dataset.idx);
                            const item = cart[idx];
                            if (!item) return;
                            showEnhancedModal({
                                title: 'Edit price',
                                fields: [
                                    { name: 'price', type: 'number', value: Number(item.price || 0), placeholder: 'Unit price' }
                                ],
                                onConfirm: data => {
                                    const nextPrice = Number(data.price || 0);
                                    if (nextPrice <= 0) {
                                        showToast('Price must be greater than zero', 'error');
                                        return;
                                    }
                                    item.price = nextPrice;
                                    saveCart();
                                    renderCartOverlay();
                                }
                            });
                        });
                    });

                    overlay.querySelectorAll('.cart-item-discount-btn').forEach(button => {
                        button.addEventListener('click', () => {
                            const idx = Number(button.dataset.idx);
                            const item = cart[idx];
                            if (!item) return;
                            showEnhancedModal({
                                title: 'Item discount',
                                fields: [
                                    {
                                        name: 'discountType',
                                        type: 'select',
                                        value: item.discountType || 'none',
                                        options: [
                                            { value: 'none', label: 'No discount' },
                                            { value: 'fixed', label: 'Fixed' },
                                            { value: 'percent', label: 'Percent' }
                                        ]
                                    },
                                    { name: 'discountValue', type: 'number', value: item.discountValue || 0, placeholder: 'Discount value' }
                                ],
                                onConfirm: data => {
                                    item.discountType = data.discountType || 'none';
                                    item.discountValue = Number(data.discountValue || 0);
                                    saveCart();
                                    renderCartOverlay();
                                }
                            });
                        });
                    });

                    overlay.querySelector('#paymentStatusInput')?.addEventListener('change', event => {
                        paymentStatus = event.target.value;
                        if (paymentStatus === 'paid') {
                            const totals = getTotals();
                            const amountInput = overlay.querySelector('#amountPaidInput');
                            if (amountInput) {
                                amountInput.value = totals.finalTotal;
                                amountPaidDraft = totals.finalTotal;
                            }
                        }
                        refreshComputed();
                    });

                    overlay.querySelector('#discountTypeInput')?.addEventListener('change', event => {
                        cartDiscountType = event.target.value;
                        refreshComputed();
                    });

                    overlay.querySelector('#discountValueInput')?.addEventListener('input', event => {
                        cartDiscountValue = Number(event.target.value || 0);
                        refreshComputed();
                    });

                    overlay.querySelector('#discountReasonInput')?.addEventListener('input', event => {
                        cartDiscountReason = event.target.value;
                    });

                    overlay.querySelector('#customerNameInput')?.addEventListener('input', event => {
                        customerName = event.target.value;
                        refreshComputed();
                    });

                    overlay.querySelector('#customerPhoneInput')?.addEventListener('input', event => {
                        customerPhone = event.target.value;
                        refreshComputed();
                    });

                    overlay.querySelector('#redeemPointsInput')?.addEventListener('input', event => {
                        redeemPoints = Number(event.target.value || 0);
                        refreshComputed();
                    });

                    overlay.querySelector('#amountPaidInput')?.addEventListener('input', event => {
                        amountPaidDraft = Number(event.target.value || 0);
                        refreshComputed();
                    });

                    overlay.querySelector('#modalCompleteSale')?.addEventListener('click', async () => {
                        if (cart.length === 0) {
                            showToast(__('emptyCart'), 'error');
                            overlay.remove();
                            return;
                        }

                        customerName = (overlay.querySelector('#customerNameInput')?.value || '').trim();
                        customerPhone = (overlay.querySelector('#customerPhoneInput')?.value || '').trim();
                        const phoneInput = (overlay.querySelector('#receiptPhoneInput')?.value || '').trim();
                        const shouldSendReceipt = !!overlay.querySelector('#sendReceiptWhatsApp')?.checked;
                        const paidNowInput = Number(overlay.querySelector('#amountPaidInput')?.value || 0);
                        const redeemPointsRequested = Number(overlay.querySelector('#redeemPointsInput')?.value || 0);
                        paymentStatus = overlay.querySelector('#paymentStatusInput')?.value || paymentStatus;
                        cartDiscountType = overlay.querySelector('#discountTypeInput')?.value || cartDiscountType;
                        cartDiscountValue = Number(overlay.querySelector('#discountValueInput')?.value || 0);
                        cartDiscountReason = overlay.querySelector('#discountReasonInput')?.value || '';

                        receiptWhatsAppPhone = phoneInput;
                        autoSendReceiptWhatsApp = shouldSendReceipt;
                        localStorage.setItem('profitpoint_receipt_phone', receiptWhatsAppPhone);
                        localStorage.setItem('profitpoint_receipt_auto', autoSendReceiptWhatsApp ? '1' : '0');

                        if ((paymentStatus === 'credit' || paymentStatus === 'layaway' || paymentStatus === 'partial') && !customerName && !customerPhone) {
                            showToast('Customer name or phone is required for balance tracking', 'error');
                            return;
                        }

                        const customer = getOrCreateCustomer(customerName, customerPhone);
                        const availablePoints = customer ? Number(customer.loyaltyPoints || 0) : 0;
                        const redeemedPoints = Math.max(0, Math.min(availablePoints, redeemPointsRequested));

                        const subtotal = cart.reduce((sum, item) => sum + (Number(item.price || 0) * Number(item.qty || 0)), 0);
                        const itemDiscountTotal = cart.reduce((sum, item) => sum + computeDiscountAmount(Number(item.price || 0) * Number(item.qty || 0), item.discountType, item.discountValue), 0);
                        const afterItemDiscounts = subtotal - itemDiscountTotal;
                        const cartDiscountAmount = computeDiscountAmount(afterItemDiscounts, cartDiscountType, cartDiscountValue);
                        const provisionalTotal = Math.max(0, afterItemDiscounts - cartDiscountAmount);
                        const loyaltyRedeemedValue = Math.min(provisionalTotal, redeemedPoints * Number(loyaltySettings.redeemValuePerPoint || 0));
                        const finalTotal = Math.max(0, provisionalTotal - loyaltyRedeemedValue);

                        let amountPaidNow = finalTotal;
                        if (paymentStatus === 'partial' || paymentStatus === 'layaway') {
                            amountPaidNow = Math.min(finalTotal, Math.max(0, paidNowInput));
                        }
                        if (paymentStatus === 'credit') {
                            amountPaidNow = 0;
                        }
                        if (paymentStatus === 'paid') {
                            amountPaidNow = finalTotal;
                        }

                        for (const item of cart) {
                            const product = products.find(productItem => String(productItem.id) === String(item.productId));
                            if (!product || Number(product.stock || 0) < Number(item.qty || 0)) {
                                showToast(`${item.name} has insufficient stock`, 'error');
                                return;
                            }
                        }

                        const saleItems = cart.map(item => ({
                            productId: item.productId,
                            name: item.name,
                            qty: item.qty,
                            price: item.price,
                            variant: item.variant || '',
                            discountType: item.discountType || 'none',
                            discountValue: Number(item.discountValue || 0),
                            discountAmount: computeDiscountAmount(Number(item.price || 0) * Number(item.qty || 0), item.discountType, item.discountValue)
                        }));

                        saleItems.forEach(item => {
                            const product = products.find(productItem => String(productItem.id) === String(item.productId));
                            if (product) {
                                product.stock = Number(product.stock || 0) - Number(item.qty || 0);
                                if (Number(product.stock || 0) <= Number(product.minStock || 0)) {
                                    pushNotification('Low stock', `${product.name} is down to ${product.stock}`, 'warning');
                                }
                            }
                        });
                        saveProducts();

                        const sale = createSaleRecord({
                            items: saleItems,
                            subtotal,
                            payment: selectedPayment,
                            paymentStatus,
                            amountPaidNow,
                            customerId: customer?.id || null,
                            customerName: customer?.name || '',
                            customerPhone: customer?.phone || '',
                            discountType: cartDiscountType,
                            discountValue: cartDiscountValue,
                            discountAmount: itemDiscountTotal + cartDiscountAmount,
                            discountReason: cartDiscountReason,
                            loyaltyRedeemedPoints: redeemedPoints,
                            loyaltyRedeemedValue,
                            note: paymentStatus === 'layaway' ? 'Layaway sale' : ''
                        });

                        const loyalty = awardLoyalty(customer?.id, sale.finalTotal, redeemedPoints);
                        sale.loyaltyEarnedPoints = loyalty.earned;
                        sale.loyaltyRedeemedValue = loyaltyRedeemedValue;
                        saveSales();

                        cart = [];
                        saveCart();
                        overlay.remove();
                        renderPosMobile();

                        // Post-sale success overlay
                        const successOverlay = document.createElement('div');
                        successOverlay.className = 'sale-success-overlay';
                        const change = paymentStatus === 'paid' ? Math.max(0, amountPaidNow - finalTotal) : 0;
                        successOverlay.innerHTML = `
                            <div class="sale-success-card">
                                <div class="sale-success-icon"><i class="fas fa-check"></i></div>
                                <div style="font-size:1rem; font-weight:700; color:#16a34a; margin-bottom:0.2rem;">Sale Complete!</div>
                                <div class="sale-success-receipt">${sale.receiptNumber}</div>
                                <div class="sale-success-amount">${formatMoney(finalTotal)}</div>
                                ${change > 0 ? `<div style="font-size:0.85rem; color:#64748b; margin-bottom:0.4rem;">Change: <strong style="color:#0f172a;">${formatMoney(change)}</strong></div>` : ''}
                                ${paymentStatus !== 'paid' ? `<div style="font-size:0.8rem; color:#f59e0b; font-weight:600; margin-bottom:0.4rem;">Outstanding: ${formatMoney(Math.max(0, finalTotal - amountPaidNow))}</div>` : ''}
                                <div class="sale-success-actions">
                                    <button class="btn-primary" id="successNewSale"><i class="fas fa-plus"></i> New Sale</button>
                                    <button class="btn-ghost" id="successViewReceipt"><i class="fas fa-receipt"></i> Receipt</button>
                                    ${phoneInput ? `<button class="btn-whatsapp" id="successWhatsApp"><i class="fab fa-whatsapp"></i></button>` : ''}
                                </div>
                            </div>
                        `;
                        document.body.appendChild(successOverlay);
                        setTimeout(() => { if (successOverlay.parentNode) successOverlay.remove(); }, 4000);
                        successOverlay.querySelector('#successNewSale').addEventListener('click', () => successOverlay.remove());
                        successOverlay.querySelector('#successViewReceipt')?.addEventListener('click', () => { successOverlay.remove(); showReceiptModal(sale); });
                        successOverlay.querySelector('#successWhatsApp')?.addEventListener('click', async () => { successOverlay.remove(); await sendReceiptOnWhatsApp(sale, phoneInput); });

                        if (shouldSendReceipt) {
                            await sendReceiptOnWhatsApp(sale, phoneInput);
                        }
                    });

                    refreshComputed();
                    attachContactPickersToDOM(overlay);
                };

                document.body.appendChild(overlay);
                renderCartOverlay();
            }

            // ==================== POS PAGE ====================
            function renderPosMobile() {
                let searchTerm = '';
                
                const filterProducts = () => {
                    return products.filter(p => 
                        (searchTerm === '' || p.name.toLowerCase().includes(searchTerm.toLowerCase()) || String(p.barcode || '').includes(searchTerm))
                    );
                };
                
                const renderPosContent = () => {
                    const filtered = filterProducts();
                    const favorites = products.filter(product => product.favorite).slice(0, 6);
                    const recent = recentProductIds.map(id => products.find(product => String(product.id) === String(id))).filter(Boolean).slice(0, 6);
                    const topSelling = getTopSellingProducts(5);
                    
                    
                    let productGridHtml = filtered.map(p => {
                        let imgHtml = p.image ? 
                            `<img src="${p.image}" style="width:100%; height:100%; object-fit:cover;">` : 
                            '<i class="fas fa-box" style="font-size:2rem; color:#06c6d4;"></i>';
                        
                        return `
                            <div class="product-tile-mobile" data-id="${p.id}" data-name="${p.name}" data-price="${p.sellPrice}" data-stock="${p.stock}">
                                <div class="product-image-mobile">${imgHtml}</div>
                                <div class="product-info-panel">
                                    <div class="product-name-mobile">${p.name}</div>
                                    <div class="product-price-mobile">${formatMoney(p.sellPrice)}</div>
                                    <div class="stock-badge-mobile">${p.stock} ${__('quantity')}</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    const noShiftBannerHtml = (!getActiveShift() && isManager() && !sessionStorage.getItem('shiftBannerDismissed')) ? `
                        <div class="shift-reminder-banner" id="shiftBanner">
                            <i class="fas fa-clock-rotate-left"></i>
                            <span>No shift open — sales won't be tracked</span>
                            <button id="openShiftFromBanner">Open Shift</button>
                            <button class="dismiss-btn" id="dismissShiftBanner" title="Dismiss"><i class="fas fa-times"></i></button>
                        </div>` : '';

                    const _dailyTarget = Number(localStorage.getItem('profitpoint_daily_target') || 0);
                    const _todayRevenue = (() => {
                        const today = new Date(); today.setHours(0,0,0,0);
                        return sales.filter(s => !s.isReturn && new Date(s.date) >= today).reduce((a,s) => a + Number(s.finalTotal||0), 0);
                    })();
                    const _targetBarHtml = _dailyTarget > 0 ? (() => {
                        const pct = Math.min(100, Math.round((_todayRevenue / _dailyTarget) * 100));
                        const barColor = pct >= 100 ? '#22c55e' : pct >= 60 ? '#f59e0b' : '#06c6d4';
                        return `<div style="margin-bottom:0.7rem;background:var(--surface-3);border-radius:var(--radius-md);padding:0.6rem 0.9rem;border:1px solid var(--border-subtle);">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.35rem;">
                                <span style="font-size:0.72rem;font-weight:700;color:var(--text-secondary);"><i class="fas fa-bullseye icon-one"></i> Daily Target</span>
                                <span style="font-size:0.72rem;font-weight:700;color:${barColor};">${formatMoney(_todayRevenue)} / ${formatMoney(_dailyTarget)} · ${pct}%</span>
                            </div>
                            <div style="height:6px;background:var(--surface-4);border-radius:99px;overflow:hidden;">
                                <div style="height:100%;width:${pct}%;background:${barColor};border-radius:99px;transition:width 0.4s ease;"></div>
                            </div>
                        </div>`;
                    })() : '';

                    let html = `
                        ${noShiftBannerHtml}
                        ${_targetBarHtml}
                        <div style="display:flex; align-items:center; gap:0.5rem; background:var(--surface-3); border:1.5px solid var(--border-subtle); border-radius:60px; padding:0.2rem 0.5rem 0.2rem 1rem; margin-bottom:0.8rem; transition:border-color 0.2s ease; box-shadow:var(--shadow-xs);">
                            <i class="fas fa-search icon-one"></i>
                            <input type="text" id="mobileSearch" placeholder="${__('search')}" value="${searchTerm}"
                                style="border:none; background:transparent; padding:0.9rem 0; width:100%; outline:none; color:var(--text-primary); font-size:0.95rem; font-weight:500;">
                            <button type="button" id="voiceSearchBtn" class="voice-btn" title="Voice search" aria-label="Search by voice">
                                <i class="fas fa-microphone"></i> Mic
                            </button>
                            <button type="button" id="scanBarcodeBtn" class="icon-btn" style="padding:0.5rem 1rem; background:linear-gradient(135deg,var(--teal-500),var(--teal-600)); color:#fff; border-color:transparent; flex-shrink:0; box-shadow:var(--shadow-accent-sm);">
                                <i class="fas fa-barcode" style="color:#fff;"></i> Scan
                            </button>
                        </div>
                        
                        <div class="product-grid-mobile" id="mobileProductGrid">
                            ${productGridHtml || (searchTerm ? `<div class="pos-empty-state"><i class="fas fa-search-minus"></i><p>No products match "<strong>${searchTerm}</strong>"</p></div>` : `<div class="pos-empty-state"><i class="fas fa-box-open"></i><p>Your catalog is empty.<br>Add products to start selling.</p>${isManager() ? `<button onclick="renderProductsMobile()"><i class="fas fa-plus"></i> Add Products</button>` : ''}</div>`)}
                        </div>
                        
                        <div class="cart-fab" style="flex-direction:column;gap:0.4rem;">
                            <button class="cart-btn" id="toggleCartBtn" aria-label="Open cart">
                                <i class="fas fa-shopping-cart icon-one"></i> ${__('cart')}
                                <span class="cart-badge" id="cartItemCount">${cart.reduce((a, i) => a + i.qty, 0)}</span>
                            </button>
                            <div style="display:flex;gap:0.5rem;justify-content:center;pointer-events:auto;">
                                ${cart.length > 0 ? `<button class="btn-small analytics-ghost-btn" id="holdCartBtn" style="font-size:0.72rem;padding:0.35rem 0.8rem;min-height:auto;"><i class="fas fa-pause icon-one"></i> Hold</button>` : ''}
                                ${heldCarts.length > 0 ? `<button class="btn-small analytics-ghost-btn" id="recallCartBtn" style="font-size:0.72rem;padding:0.35rem 0.8rem;min-height:auto;"><i class="fas fa-inbox icon-one"></i> Recall (${heldCarts.length})</button>` : ''}
                            </div>
                        </div>
                    `;
                    
                    document.getElementById('mobileContent').innerHTML = html;
                    
                    const searchInput = document.getElementById('mobileSearch');
                    if (searchInput) {
                        searchInput.addEventListener('input', (e) => {
                            searchTerm = e.target.value;
                            renderPosContent();
                        });
                    }

                    // Voice search
                    const voiceBtn = document.getElementById('voiceSearchBtn');
                    if (voiceBtn) {
                        voiceBtn.addEventListener('click', () => startVoiceSearch());
                    }
                    
                    document.querySelectorAll('.product-tile-mobile').forEach(t => {
                        t.addEventListener('click', (e) => {
                            e.preventDefault();
                            const id = t.dataset.id;
                            const stock = parseInt(t.dataset.stock);
                            const product = products.find(item => String(item.id) === String(id));
                            
                            if (stock <= 0) {
                                showToast(__('outOfStock'), 'error');
                                return;
                            }

                            // Flying-to-cart animation
                            (function() {
                                const tileRect = t.getBoundingClientRect();
                                const cartBtnEl = document.getElementById('toggleCartBtn');
                                if (!cartBtnEl) return;
                                const cartRect = cartBtnEl.getBoundingClientRect();
                                const fly = document.createElement('div');
                                fly.className = 'flying-product';
                                fly.style.left   = tileRect.left + 'px';
                                fly.style.top    = tileRect.top  + 'px';
                                fly.style.width  = tileRect.width  + 'px';
                                fly.style.height = tileRect.height + 'px';
                                const img = t.querySelector('.product-image-mobile img');
                                if (img && img.src) {
                                    fly.style.backgroundImage = `url('${img.src}')`;
                                } else {
                                    fly.style.background = 'linear-gradient(135deg,#06c6d4,#0492a0)';
                                    fly.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#fff;font-size:1.8rem;"><i class="fas fa-shopping-bag"></i></div>';
                                }
                                const destX = cartRect.left + cartRect.width  / 2 - tileRect.left - tileRect.width  / 2;
                                const destY = cartRect.top  + cartRect.height / 2 - tileRect.top  - tileRect.height / 2;
                                fly.style.setProperty('--fly-x', destX + 'px');
                                fly.style.setProperty('--fly-y', destY + 'px');
                                document.body.appendChild(fly);
                                fly.style.animation = 'flyToCart 0.75s cubic-bezier(0.25,0.46,0.45,0.94) forwards';
                                setTimeout(() => fly.remove(), 760);
                            })();

                            showVariantPicker(product, variant => {
                                addProductToCart(product, variant);
                                const cartBtn = document.getElementById('toggleCartBtn');
                                if (cartBtn) {
                                    cartBtn.classList.add('cart-bump');
                                    setTimeout(() => cartBtn.classList.remove('cart-bump'), 400);
                                }
                                renderPosContent();
                            });
                            
                        });
                    });

                    document.querySelectorAll('.quick-pick').forEach(chip => {
                        chip.addEventListener('click', () => {
                            const product = products.find(item => String(item.id) === String(chip.dataset.id));
                            if (!product) return;
                            showVariantPicker(product, variant => {
                                addProductToCart(product, variant);
                                renderPosContent();
                            });
                        });
                    });

                    document.getElementById('scanBarcodeBtn')?.addEventListener('click', async () => {
                        try {
                            await scanBarcode(rawValue => {
                                const product = findProductByBarcode(rawValue);
                                if (!product) {
                                    showToast(`No product found for ${rawValue}`, 'error');
                                    searchTerm = rawValue;
                                    renderPosContent();
                                    return;
                                }
                                showVariantPicker(product, variant => {
                                    addProductToCart(product, variant);
                                    renderPosContent();
                                    showToast(`${product.name} scanned`);
                                });
                            });
                        } catch {
                            showToast('Unable to start barcode scanner', 'error');
                        }
                    });
                    
                    document.getElementById('toggleCartBtn')?.addEventListener('click', (e) => {
                        e.preventDefault();
                        showCartModal();
                    });

                    document.getElementById('holdCartBtn')?.addEventListener('click', () => {
                        if (!cart.length) return;
                        heldCarts.unshift({ id: Date.now(), items: [...cart], heldAt: new Date().toISOString() });
                        saveHeldCarts();
                        cart = []; saveCart();
                        renderPosContent();
                        showToast(`Cart held (${heldCarts.length} held)`);
                    });

                    document.getElementById('recallCartBtn')?.addEventListener('click', () => {
                        if (!heldCarts.length) return;
                        if (heldCarts.length === 1) {
                            if (cart.length) heldCarts.unshift({ id: Date.now(), items: [...cart], heldAt: new Date().toISOString() });
                            cart = [...heldCarts.shift().items];
                            saveHeldCarts(); saveCart(); renderPosContent();
                            showToast('Cart recalled');
                        } else {
                            // Multiple held carts — show picker
                            const overlay = document.createElement('div');
                            overlay.className = 'modal-overlay';
                            overlay.innerHTML = `<div class="modal-card" style="max-width:340px;">
                                <h3 style="margin-bottom:1rem;"><i class="fas fa-inbox icon-one"></i> Held Carts</h3>
                                ${heldCarts.map((hc, i) => `
                                    <div style="display:flex;justify-content:space-between;align-items:center;padding:0.7rem;border-radius:var(--radius-md);background:var(--surface-3);margin-bottom:0.5rem;border:1px solid var(--border-subtle);">

                            </div>`;
                            document.body.appendChild(overlay);

                    document.getElementById('dismissShiftBanner')?.addEventListener('click', () => {
