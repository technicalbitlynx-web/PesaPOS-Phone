/* ---------- ABC Analysis Modal ---------- */
function ABCAnalysisModal({ products, sales, onClose }) {
  const productAnalysis = useMemo(() => {
    // Calculate sales for each product
    const productMetrics = products.map(product => {
      const productSales = sales.filter(s => s.barcode === product.barcode);
      const qtySold = productSales.reduce((sum, s) => sum + s.quantity, 0);
      const totalRevenue = productSales.reduce((sum, s) => sum + s.total, 0);
      
      return {
        ...product,
        qtySold,
        totalRevenue,
        avgPrice: qtySold > 0 ? totalRevenue / qtySold : 0
      };
    }).filter(p => p.totalRevenue > 0);

    // Sort by revenue (descending)
    productMetrics.sort((a, b) => b.totalRevenue - a.totalRevenue);

    // Calculate cumulative revenue and total
    const totalRevenue = productMetrics.reduce((sum, p) => sum + p.totalRevenue, 0);
    let cumulativeRevenue = 0;

    // Classify into A, B, C
    const classified = productMetrics.map(p => {
      cumulativeRevenue += p.totalRevenue;
      const percentOfTotal = (p.totalRevenue / totalRevenue) * 100;
      const cumulativePercent = (cumulativeRevenue / totalRevenue) * 100;
      
      let classification = 'C';
      if (cumulativePercent <= 80) {
        classification = 'A';
      } else if (cumulativePercent <= 95) {
        classification = 'B';
      }

      return {
        ...p,
        percentOfTotal,
        cumulativePercent,
        classification
      };
    });

    return classified;
  }, [products, sales]);

  const totals = useMemo(() => {
    const a = productAnalysis.filter(p => p.classification === 'A');
    const b = productAnalysis.filter(p => p.classification === 'B');
    const c = productAnalysis.filter(p => p.classification === 'C');
    
    const totalRevenue = productAnalysis.reduce((sum, p) => sum + p.totalRevenue, 0);
    
    return {
      a: {
        count: a.length,
        revenue: a.reduce((sum, p) => sum + p.totalRevenue, 0),
        percent: totalRevenue > 0 ? (a.reduce((sum, p) => sum + p.totalRevenue, 0) / totalRevenue) * 100 : 0,
        qty: a.reduce((sum, p) => sum + p.qtySold, 0)
      },
      b: {
        count: b.length,
        revenue: b.reduce((sum, p) => sum + p.totalRevenue, 0),
        percent: totalRevenue > 0 ? (b.reduce((sum, p) => sum + p.totalRevenue, 0) / totalRevenue) * 100 : 0,
        qty: b.reduce((sum, p) => sum + p.qtySold, 0)
      },
      c: {
        count: c.length,
        revenue: c.reduce((sum, p) => sum + p.totalRevenue, 0),
        percent: totalRevenue > 0 ? (c.reduce((sum, p) => sum + p.totalRevenue, 0) / totalRevenue) * 100 : 0,
        qty: c.reduce((sum, p) => sum + p.qtySold, 0)
      }
    };
  }, [productAnalysis]);

  const abcConfig = {
    A: {color:'#ef4444',bg:'rgba(239,68,68,0.1)',border:'rgba(239,68,68,0.25)',label:'High-value · top 80% revenue'},
    B: {color:'#f59e0b',bg:'rgba(245,158,11,0.1)',border:'rgba(245,158,11,0.25)',label:'Mid-value · 80–95% revenue'},
    C: {color:'#10b981',bg:'rgba(16,185,129,0.1)',border:'rgba(16,185,129,0.25)',label:'Low-value · bottom 5% revenue'},
  };

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-2 z-50">
      <div className="glass-card rounded-2xl shadow-2xl w-full max-w-6xl max-h-[95vh] flex flex-col overflow-hidden" style={{background:'rgba(248,250,252,0.55)'}}>
        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'12px',padding:'9px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M18 20V10M12 20V4M6 20v-6" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
            <div>
              <h2 style={{color:'#fff',fontSize:'1.3rem',fontWeight:800,margin:0}}>ABC Inventory Analysis</h2>
              <p className="theme-header-subtext" style={{fontSize:'0.8rem',margin:0}}>{productAnalysis.length} products ranked by revenue</p>
            </div>
          </div>
          <button onClick={onClose}
            style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'5px'}}
            onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
            onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}
          ><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg> Close</button>
        </div>

        {/* ABC Summary Cards */}
        <div style={{padding:'0.85rem 1.25rem 0',flexShrink:0}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.75rem'}}>
            {['A','B','C'].map(cls=>{
              const t = totals[cls.toLowerCase()];
              const cfg = abcConfig[cls];
              return (
                <div key={cls} style={{background:'#fff',borderRadius:'14px',padding:'1rem 1.25rem',border:`1px solid ${cfg.border}`,boxShadow:'0 1px 8px rgba(15,23,42,0.04)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'0.6rem'}}>
                    <div style={{width:'36px',height:'36px',borderRadius:'10px',background:cfg.bg,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:'1.1rem',color:cfg.color,flexShrink:0}}>{cls}</div>
                    <div>
                      <div style={{fontWeight:700,color:'#0f172a',fontSize:'0.9rem'}}>{t.count} product{t.count!==1?'s':''}</div>
                      <div style={{fontSize:'0.72rem',color:'#64748b'}}>{cfg.label}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontSize:'0.68rem',color:'#94a3b8',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em'}}>Revenue</div>
                      <div style={{fontSize:'1rem',fontWeight:800,color:cfg.color}}>TSH {t.revenue.toLocaleString()}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:'0.68rem',color:'#94a3b8',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em'}}>Share</div>
                      <div style={{fontSize:'1rem',fontWeight:800,color:'#334155'}}>{t.percent.toFixed(1)}%</div>
                    </div>
                  </div>
                  <div style={{marginTop:'0.5rem',background:'rgba(203,213,225,0.3)',borderRadius:'99px',height:'5px',overflow:'hidden'}}>
                    <div style={{width:`${t.percent}%`,background:cfg.color,borderRadius:'99px',height:'100%',transition:'width 0.4s'}} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="flex-1 overflow-y-auto" style={{padding:'0.85rem 1.25rem 1.25rem',minHeight:0}}>
          <div style={{background:'#fff',borderRadius:'14px',border:'1px solid rgba(203,213,225,0.5)',overflow:'hidden',boxShadow:'0 1px 8px rgba(15,23,42,0.04)'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.875rem'}}>
              <thead><tr style={{background:'linear-gradient(90deg,#f8fafc,#f1f5f9)'}}>
                {['Class','Product','Qty Sold','Revenue','% of Total','Cumulative'].map((h,i)=>(
                  <th key={h} style={{padding:'0.75rem 1rem',textAlign:i>=2?'right':'left',fontWeight:700,color:'#475569',fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.04em',borderBottom:'1px solid rgba(203,213,225,0.6)'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {productAnalysis.map((p,idx)=>{
                  const cfg = abcConfig[p.classification];
                  return (
                    <tr key={p.barcode} style={{borderTop:'1px solid rgba(203,213,225,0.3)',background:`${cfg.bg}33`,transition:'background 0.12s'}}
                      onMouseOver={e=>e.currentTarget.style.background=cfg.bg}
                      onMouseOut={e=>e.currentTarget.style.background=`${cfg.bg}33`}
                    >
                      <td style={{padding:'0.65rem 1rem'}}>
                        <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:'28px',height:'28px',borderRadius:'8px',fontWeight:900,fontSize:'0.85rem',color:cfg.color,background:cfg.bg,border:`1px solid ${cfg.border}`}}>{p.classification}</span>
                      </td>
                      <td style={{padding:'0.65rem 1rem',fontWeight:600,color:'#1e293b'}}>{p.name}</td>
                      <td style={{padding:'0.65rem 1rem',textAlign:'right',color:'#475569',fontWeight:500}}>{p.qtySold.toLocaleString()}</td>
                      <td style={{padding:'0.65rem 1rem',textAlign:'right',fontWeight:700,color:cfg.color}}>TSH {p.totalRevenue.toLocaleString()}</td>
                      <td style={{padding:'0.65rem 1rem',textAlign:'right',fontWeight:600,color:'#334155'}}>{p.percentOfTotal.toFixed(1)}%</td>
                      <td style={{padding:'0.65rem 1rem',textAlign:'right',color:'#64748b'}}>{p.cumulativePercent.toFixed(1)}%</td>
                    </tr>
                  );
                })}
                {productAnalysis.length===0&&<tr><td colSpan="6" style={{padding:'3rem',textAlign:'center',color:'#94a3b8'}}>No sales data to analyze.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Data Tools Modal ---------- */
function DataToolsModal({ onClose, onDeleteSalesRange, onDeleteAllSales, onDeleteStockLogRange, onDeleteAllStockLog, onDeleteAllCredits }) {
  const [activeTab, setActiveTab] = useState("sales");
  const [from, setFrom] = useState("");
  const [to, setTo] = useState("");

  const handleClear = (type) => {
    if (!from && !to && (type === 'sales-range' || type === 'stock-range')) {
      return alert("Please select a date range.");
    }
    const messages = {
      'sales-range': `Delete all sales within the selected period? This action cannot be undone.`,
      'sales-all': `Delete ALL sales history? This is permanent and cannot be undone.`,
      'stock-range': `Delete all stock log entries within the selected period? This is permanent.`,
      'stock-all': `Delete ALL stock history? This is permanent and cannot be undone.`,
      'credits-all': `Delete ALL credit records? This is permanent and cannot be undone.`
    };
    if (!confirm(messages[type])) return;
    
    if (type === 'sales-range') onDeleteSalesRange(from, to);
    else if (type === 'sales-all') onDeleteAllSales();
    else if (type === 'stock-range') onDeleteStockLogRange(from, to);
    else if (type === 'stock-all') onDeleteAllStockLog();
    else if (type === 'credits-all') onDeleteAllCredits();
    
    setFrom("");
    setTo("");
    onClose();
  };

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-2 z-50">
      <div className="glass-card rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col" style={{background:'rgba(248,250,252,0.55)'}}>

        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'12px',padding:'9px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h12M3 18h8" stroke="white" strokeWidth="2" strokeLinecap="round"/><path d="M16 16l2 2 4-4" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
            <div>
              <h2 style={{color:'#fff',fontSize:'1.3rem',fontWeight:800,margin:0,letterSpacing:'-0.01em'}}>Data Management</h2>
              <p className="theme-header-subtext" style={{fontSize:'0.8rem',margin:0}}>Clear sales, stock, and credit history records</p>
            </div>
          </div>
          <button onClick={onClose}
            style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'5px'}}
            onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
            onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
            Close
          </button>
        </div>

        <div style={{padding:'1rem 1.5rem 0',flexShrink:0}}>
          <div style={{display:'flex',borderBottom:'2px solid rgba(203,213,225,0.5)'}}>
            {['sales','stock','credits'].map(tab=>(
              <button key={tab} onClick={()=>{setActiveTab(tab);setFrom('');setTo('');}}
                style={{padding:'0.55rem 1.1rem',fontWeight:600,fontSize:'0.88rem',
                  color:activeTab===tab?'#2563eb':'#64748b',
                  borderBottom:activeTab===tab?'2px solid #2563eb':'2px solid transparent',
                  background:'none',outline:'none',border:'none',boxShadow:'none',
                  cursor:'pointer',marginBottom:'-2px',transition:'color 0.15s'}}>
                {tab==='sales'?'Sales History':tab==='stock'?'Stock History':'Credits'}
              </button>
            ))}
          </div>
        </div>

        <div style={{padding:'1.25rem 1.5rem',flex:1}}>
          {(activeTab === 'sales' || activeTab === 'stock') && (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem',marginBottom:'1rem'}}>
              <div>
                <label style={{display:'block',fontSize:'0.78rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.3rem'}}>From Date</label>
                <input type="date" value={from} onChange={e=>setFrom(e.target.value)}
                  style={{width:'100%',padding:'8px 10px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.88rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />
              </div>
              <div>
                <label style={{display:'block',fontSize:'0.78rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.3rem'}}>To Date</label>
                <input type="date" value={to} onChange={e=>setTo(e.target.value)}
                  style={{width:'100%',padding:'8px 10px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.88rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />
              </div>
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:'0.6rem',marginTop:'0.25rem'}}>
            {(activeTab === 'sales' || activeTab === 'stock') && (
              <button onClick={()=>handleClear(activeTab==='sales'?'sales-range':'stock-range')}
                style={{padding:'11px',borderRadius:'9px',border:'1px solid rgba(245,158,11,0.3)',background:'rgba(245,158,11,0.08)',color:'#b45309',fontWeight:700,cursor:'pointer',fontSize:'0.9rem',transition:'background 0.15s'}}
                onMouseOver={e=>e.currentTarget.style.background='rgba(245,158,11,0.15)'}
                onMouseOut={e=>e.currentTarget.style.background='rgba(245,158,11,0.08)'}>
                Delete in Date Range
              </button>
            )}
            <button onClick={()=>handleClear(activeTab==='sales'?'sales-all':activeTab==='stock'?'stock-all':'credits-all')}
              style={{padding:'11px',borderRadius:'9px',border:'1px solid rgba(239,68,68,0.3)',background:'rgba(239,68,68,0.08)',color:'#dc2626',fontWeight:700,cursor:'pointer',fontSize:'0.9rem',transition:'background 0.15s'}}
              onMouseOver={e=>e.currentTarget.style.background='rgba(239,68,68,0.15)'}
              onMouseOut={e=>e.currentTarget.style.background='rgba(239,68,68,0.08)'}>
              Delete All {activeTab==='sales'?'Sales':activeTab==='stock'?'Stock Log':'Credits'}
            </button>
            <button onClick={onClose}
              style={{padding:'11px',borderRadius:'9px',border:'1px solid rgba(203,213,225,0.7)',background:'#fff',color:'#64748b',fontWeight:600,cursor:'pointer',fontSize:'0.9rem',transition:'background 0.15s'}}
              onMouseOver={e=>e.currentTarget.style.background='#f8fafc'}
              onMouseOut={e=>e.currentTarget.style.background='#fff'}>
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- JSON Data Backup/Restore Modal ---------- */
function JSONDataModal({
  products,
  sales,
  credits,
  suppliers,
  stockLog,
  users,
  expenses,
  onClose,
  onImportData
}) {
  const [activeTab, setActiveTab] = useState("export");
  const [importData, setImportData] = useState("");
  const [importError, setImportError] = useState("");
  const [importSuccess, setImportSuccess] = useState("");

  const exportData = useMemo(() => {
    return {
      version: "2.0",
      export_date: new Date().toISOString(),
      system: "Pesa POS",
      data: {
        products: products,
        sales: sales,
        credits: credits,
        suppliers: suppliers,
        stockLog: stockLog,
        users: users,
        expenses: expenses
      }
    };
  }, [products, sales, credits, suppliers, stockLog, users, expenses]);

  const handleFileSelect = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setImportData(ev.target.result);
    reader.readAsText(file);
  };

  const handleExport = () => {
    const dataStr = JSON.stringify(exportData, null, 2);
    const dataBlob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(dataBlob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `pos_backup_${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setImportSuccess("Backup exported successfully!");
    setTimeout(() => setImportSuccess(""), 3000);
  };

  const handleImport = () => {
    if (!importData.trim()) {
      setImportError("Please paste JSON data to import");
      return;
    }

    try {
      const parsed = JSON.parse(importData);
      if (!parsed.version || !parsed.data) {
        throw new Error("Invalid backup format");
      }
      if (!confirm(`This will replace all current data. Are you sure you want to import backup from ${parsed.export_date ? new Date(parsed.export_date).toLocaleString() : 'unknown date'}?`)) {
        return;
      }
      onImportData(parsed.data);
      setImportSuccess("Data imported successfully!");
      setImportError("");
      setImportData("");
      setTimeout(() => {
        onClose();
        // reload to make sure any cached state is cleared and new data is reflected
        window.location.reload();
      }, 2000);
    } catch (error) {
      setImportError(`Import failed: ${error.message}`);
      setImportSuccess("");
    }
  };

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-2 z-50">
      <div className="glass-card rounded-2xl shadow-2xl w-full max-w-4xl max-h-[95vh] overflow-hidden flex flex-col" style={{background:'rgba(248,250,252,0.55)'}}>

        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'12px',padding:'9px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="5" rx="9" ry="3" stroke="white" strokeWidth="2"/><path d="M3 5v6c0 1.66 4.03 3 9 3s9-1.34 9-3V5" stroke="white" strokeWidth="2"/><path d="M3 11v6c0 1.66 4.03 3 9 3s9-1.34 9-3v-6" stroke="white" strokeWidth="2"/></svg>
            </div>
            <div>
              <h2 style={{color:'#fff',fontSize:'1.3rem',fontWeight:800,margin:0,letterSpacing:'-0.01em'}}>JSON Data Backup & Restore</h2>
              <p className="theme-header-subtext" style={{fontSize:'0.8rem',margin:0}}>Export complete system data or restore from backup</p>
            </div>
          </div>
          <button onClick={onClose}
            style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'5px'}}
            onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
            onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
            Close
          </button>
        </div>

        <div style={{padding:'1rem 1.5rem 0',flexShrink:0}}>
          <div style={{display:'flex',borderBottom:'2px solid rgba(203,213,225,0.5)'}}>
            {[['export','Export Backup'],['import','Import Restore']].map(([id,label])=>(
              <button key={id} onClick={()=>setActiveTab(id)}
                style={{padding:'0.55rem 1.2rem',fontWeight:600,fontSize:'0.88rem',
                  color:activeTab===id?'#2563eb':'#64748b',
                  borderBottom:activeTab===id?'2px solid #2563eb':'2px solid transparent',
                  background:'none',outline:'none',border:'none',boxShadow:'none',
                  cursor:'pointer',marginBottom:'-2px',transition:'color 0.15s'}}>
                {label}
              </button>
            ))}
          </div>
        </div>

        {activeTab === "export" ? (
          <div className="modal-content-scrollable" style={{padding:'1.25rem 1.5rem'}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.75rem',marginBottom:'1.25rem'}}>
              {[
                {label:'Products',value:exportData.data.products.length,accent:'#60a5fa'},
                {label:'Sales',value:exportData.data.sales.length,accent:'#34d399'},
                {label:'Credits',value:exportData.data.credits.length,accent:'#f97316'},
              ].map((k,i)=>(
                <div key={i} style={{background:'#fff',borderRadius:'12px',padding:'0.9rem 1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 1px 6px rgba(15,23,42,0.04)',textAlign:'center'}}>
                  <div style={{fontSize:'0.7rem',color:'#94a3b8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.3rem'}}>{k.label}</div>
                  <div style={{fontSize:'1.4rem',fontWeight:800,color:k.accent}}>{k.value}</div>
                </div>
              ))}
            </div>
            <button onClick={handleExport}
              style={{width:'100%',padding:'12px',borderRadius:'10px',border:'none',background:'linear-gradient(135deg,#059669,#10b981)',color:'#fff',fontWeight:700,fontSize:'0.95rem',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',boxShadow:'0 4px 14px rgba(16,185,129,0.3)',transition:'opacity 0.15s'}}
              onMouseOver={e=>e.currentTarget.style.opacity='0.9'}
              onMouseOut={e=>e.currentTarget.style.opacity='1'}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 16l-6-6h4V4h4v6h4l-6 6z" fill="currentColor"/><path d="M4 20h16" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
              Download Complete Backup
            </button>
          </div>
        ) : (
          <div className="modal-content-scrollable" style={{padding:'1.25rem 1.5rem'}}>
            <div style={{padding:'0.9rem 1rem',borderRadius:'10px',border:'1px solid rgba(239,68,68,0.25)',background:'rgba(239,68,68,0.06)',marginBottom:'1rem'}}>
              <div style={{fontWeight:700,color:'#dc2626',marginBottom:'0.25rem',fontSize:'0.9rem'}}>Warning</div>
              <p style={{fontSize:'0.85rem',color:'#b91c1c',margin:0}}>Importing backup data will <strong>replace all current data</strong>.</p>
            </div>
            <div style={{marginBottom:'0.75rem'}}>
              <label style={{display:'block',fontSize:'0.78rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.3rem'}}>Paste JSON Backup Data</label>
              <textarea autoFocus value={importData} onChange={(e)=>setImportData(e.target.value)}
                placeholder="Paste your JSON backup data here..."
                spellCheck="false"
                style={{width:'100%',height:'200px',padding:'10px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.83rem',color:'#334155',background:'#fff',resize:'vertical',fontFamily:'ui-monospace,monospace',boxSizing:'border-box'}} />
              <div style={{marginTop:'0.6rem'}}>
                <label style={{display:'block',fontSize:'0.78rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.3rem'}}>Or choose a .json file</label>
                <input type="file" accept=".json" onChange={handleFileSelect}
                  style={{width:'100%',padding:'8px 10px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.85rem',background:'#fff',boxSizing:'border-box'}} />
              </div>
            </div>
            {importError && (
              <div style={{padding:'0.75rem 1rem',borderRadius:'9px',border:'1px solid rgba(239,68,68,0.3)',background:'rgba(239,68,68,0.08)',marginBottom:'0.6rem'}}>
                <p style={{color:'#dc2626',fontWeight:600,margin:0,fontSize:'0.88rem'}}>{importError}</p>
              </div>
            )}
            {importSuccess && (
              <div style={{padding:'0.75rem 1rem',borderRadius:'9px',border:'1px solid rgba(16,185,129,0.3)',background:'rgba(16,185,129,0.08)',marginBottom:'0.6rem'}}>
                <p style={{color:'#059669',fontWeight:600,margin:0,fontSize:'0.88rem'}}>{importSuccess}</p>
              </div>
            )}
            <button onClick={handleImport} disabled={!importData.trim()}

/* ---------- Add Stock Modal ---------- */
function AddStockModal({ products, currentUser, onCancel, onSave }) {
  const [barcode, setBarcode] = useState("");
  const [qty, setQty] = useState("");
  const [newBuyPrice, setNewBuyPrice] = useState("");
  const [newSellPrice, setNewSellPrice] = useState("");
  const [priceHistory, setPriceHistory] = useState([]);
  const barcodeRef = useRef(null);

  useEffect(() => {
    if (barcodeRef.current) barcodeRef.current.focus();
  }, []);
  
  const map = useMemo(() => new Map(products.map(p => [p.barcode, p])), [products]);
  const prod = map.get(barcode);

  const suggestions = useMemo(() => {
    const q = String(barcode || "").toLowerCase();
    if (!q) return [];
    return products
      .filter(p => String(p.barcode || "").includes(q) || (p.name || "").toLowerCase().includes(q))
      .slice(0, 8);
  }, [barcode, products]);

  const valid = String(barcode || "").trim() && !Number.isNaN(Number(qty)) && Number(qty) !== 0;

  // Load price history when product is selected
  useEffect(() => {
    if (prod) {
      const history = JSON.parse(localStorage.getItem(`price_history_${barcode}`) || '[]');
      setPriceHistory(history.slice(0, 5));
    } else {
      setPriceHistory([]);
    }
  }, [barcode, prod]);

  const handleSave = () => {
    // Track price change history
    if (prod && (newBuyPrice || newSellPrice)) {
      const historyEntry = {
        date: new Date().toISOString(),
        user: currentUser || "Manager",
        oldBuyPrice: prod.buy_price,
        newBuyPrice: newBuyPrice || prod.buy_price,
        oldSellPrice: prod.price,
        newSellPrice: newSellPrice || prod.price,
        quantityAdded: Number(qty) || 0
      };
      
      const history = JSON.parse(localStorage.getItem(`price_history_${barcode}`) || '[]');
      history.unshift(historyEntry);
      localStorage.setItem(`price_history_${barcode}`, JSON.stringify(history.slice(0, 50)));
    }

    onSave({
      barcode: String(barcode || "").trim(),
      qty: Number(qty),
      buy_price: newBuyPrice ? Number(newBuyPrice) : null,
      sell_price: newSellPrice ? Number(newSellPrice) : null,
      user: currentUser || "Manager",
    });
  };

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-2 z-50">
      <div className="glass-card rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col" style={{background:'rgba(248,250,252,0.55)'}}>

        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'12px',padding:'9px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="13" width="18" height="8" rx="1" stroke="white" strokeWidth="2"/><path d="M12 3v10M8 7l4-4 4 4" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
            <div>
              <h2 style={{color:'#fff',fontSize:'1.3rem',fontWeight:800,margin:0,letterSpacing:'-0.01em'}}>Add / Adjust Stock</h2>
              <p className="theme-header-subtext" style={{fontSize:'0.8rem',margin:0}}>Use negative quantity for corrections or returns</p>
            </div>
          </div>
          <button onClick={onCancel}
            style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'5px'}}
            onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
            onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
            Cancel
          </button>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'1.25rem 1.5rem'}}>
          {prod && (
            <div style={{background:'#fff',borderRadius:'12px',padding:'0.8rem 1rem',marginBottom:'1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 1px 6px rgba(15,23,42,0.04)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontWeight:700,color:'#0f172a',fontSize:'0.92rem'}}>{prod.name}</div>
                <div style={{fontSize:'0.78rem',color:'#64748b',marginTop:'2px'}}>Stock: {prod.available_stock} units</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontWeight:800,color:'#2563eb',fontSize:'0.95rem',fontFamily:'ui-monospace,monospace'}}>Buy: {Number(prod.buy_price||0).toLocaleString()}</div>
                <div style={{fontSize:'0.78rem',color:'#64748b'}}>Sell: {Number(prod.price||0).toLocaleString()}</div>
              </div>
            </div>

          <div style={{display:'flex',flexDirection:'column',gap:'0.85rem'}}>

              <input ref={barcodeRef} value={barcode} onChange={e=>setBarcode(e.target.value)}
                placeholder="Scan barcode or type product name…"
                style={{width:'100%',padding:'9px 12px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.9rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />
              {suggestions.length > 0 && (

                  {suggestions.map(s=>(

            <div>

              <input value={qty} onChange={e=>setQty(e.target.value)} type="number"

                style={{width:'100%',padding:'9px 12px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.9rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
              <div>
                <label style={{display:'block',fontSize:'0.78rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.3rem'}}>New Buy Price</label>
                <input value={newBuyPrice} onChange={e=>setNewBuyPrice(e.target.value)} type="number" min="0" step="0.01"
                  placeholder={prod?`Current: ${Number(prod.buy_price||0).toLocaleString()}`:'Leave blank to keep'}
                  style={{width:'100%',padding:'9px 12px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.88rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />
              </div>
              <div>
                <label style={{display:'block',fontSize:'0.78rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.3rem'}}>New Sell Price</label>
                <input value={newSellPrice} onChange={e=>setNewSellPrice(e.target.value)} type="number" min="0" step="0.01"
                  placeholder={prod?`Current: ${Number(prod.price||0).toLocaleString()}`:'Leave blank to keep'}
                  style={{width:'100%',padding:'9px 12px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.88rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />

            {priceHistory.length > 0 && (
              <div style={{background:'#fff',borderRadius:'12px',padding:'0.8rem 1rem',border:'1px solid rgba(203,213,225,0.5)'}}>
                <div style={{fontWeight:700,color:'#0f172a',fontSize:'0.85rem',marginBottom:'0.5rem'}}>Recent Price History</div>
                <div style={{display:'flex',flexDirection:'column',gap:'0.5rem',maxHeight:'140px',overflowY:'auto'}}>
                  {priceHistory.map((entry,idx)=>(
                    <div key={idx} style={{fontSize:'0.78rem',padding:'6px 8px',background:'#f8fafc',borderRadius:'6px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'2px'}}>
                        <span style={{color:'#64748b'}}>{new Date(entry.date).toLocaleDateString()}</span>
                        <span style={{fontWeight:600,color:'#334155'}}>{entry.user}</span>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px'}}>
                        <div><span style={{color:'#94a3b8'}}>Buy: </span><b style={{color:'#334155'}}>{entry.oldBuyPrice?.toLocaleString()}</b>{entry.newBuyPrice!==entry.oldBuyPrice&&<span style={{color:'#059669'}}> → {entry.newBuyPrice?.toLocaleString()}</span>}</div>
                        <div><span style={{color:'#94a3b8'}}>Sell: </span><b style={{color:'#334155'}}>{entry.oldSellPrice?.toLocaleString()}</b>{entry.newSellPrice!==entry.oldSellPrice&&<span style={{color:'#059669'}}> → {entry.newSellPrice?.toLocaleString()}</span>}</div>

            <button onClick={onCancel}

            <button disabled={!valid} onClick={handleSave}

                color:'#fff',fontWeight:700,cursor:valid?'pointer':'not-allowed',fontSize:'0.9rem',

              onMouseOver={e=>{if(valid)e.currentTarget.style.opacity='0.9';}}
              onMouseOut={e=>e.currentTarget.style.opacity='1'}>

        </div>
      </div>
    </div>
  );
}

/* ---------- Product Search Dropdown Component ---------- */
function ProductSearchDropdown({ products, onSelect, placeholder = "Search products...", onQueryChange }) {
  const [query, setQuery] = useState("");
  const [isOpen, setIsOpen] = useState(false);
  const dropdownRef = useRef(null);

  const filteredProducts = useMemo(() => {
    if (!query.trim()) return [];
    const q = query.toLowerCase();
    return products
      .filter(p => 
        p.name.toLowerCase().includes(q) || 
        p.barcode.toLowerCase().includes(q)
      )
      .slice(0, 8);
  }, [products, query]);

  useEffect(() => {
    const handleClickOutside = (event) => {
      if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
        setIsOpen(false);
      }
    };
    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, []);

  const handleSelect = (product) => {
    onSelect(product);
    setQuery("");
    if (onQueryChange) onQueryChange("");
    setIsOpen(false);
  };

  return (
    <div className="relative" ref={dropdownRef}>
      <input
        type="text"
        value={query}
        onChange={(e) => {
          setQuery(e.target.value);
          if (onQueryChange) onQueryChange(e.target.value);
          setIsOpen(true);
        }}
        onFocus={() => setIsOpen(true)}
        className="form-input"
        placeholder={placeholder}
      />
      {isOpen && filteredProducts.length > 0 && (
        <div className="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-lg shadow-lg max-h-64 overflow-y-auto">
          {filteredProducts.map((product) => (
            <div
              key={product.barcode}
              className="px-4 py-3 hover:bg-blue-50 cursor-pointer border-b border-slate-100 last:border-b-0"
              onClick={() => handleSelect(product)}
            >
              <div className="font-medium">{product.name}</div>
              <div className="text-sm text-slate-500 flex justify-between">
                <span>Barcode: <span className="font-mono">{product.barcode}</span></span>
                <span className="font-semibold">TSH {product.price.toLocaleString()}</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* =========================================================
   DASHBOARD MODAL
   ========================================================= */
function DashboardModal({ sales = [], products = [], credits = [], suppliers = [], expenses = [], settings, onClose, onOpenSales, onOpenCredits, onOpenInventory, onOpenSuppliers, onOpenExpenses }) {
  const currency = settings?.currency || 'TSH';
  const [activeTab, setActiveTab] = useState('today');
  const chartRevRef = useRef(null);
  const chartPayRef = useRef(null);
  const chartProdRef = useRef(null);
  const chartRevInst = useRef(null);
  const chartPayInst = useRef(null);
  const chartProdInst = useRef(null);

  const today = new Date();
  const todayStr = today.toDateString();
  const weekAgo = new Date(today); weekAgo.setDate(today.getDate() - 6);
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);

  const todaySales = sales.filter(s => new Date(s.timestamp).toDateString() === todayStr);
  const monthSales = sales.filter(s => new Date(s.timestamp) >= monthStart);
  const todayRevenue = todaySales.reduce((a, s) => a + (Number(s.total) || 0), 0);
  const todayProfit = todaySales.reduce((a, s) => a + (Number(s.profit) || 0), 0);
  const todayTxns = new Set(todaySales.map(s => s.receipt_number)).size;
  const monthRevenue = monthSales.reduce((a, s) => a + (Number(s.total) || 0), 0);
  const totalExpenses = expenses.reduce((a, e) => a + (Number(e.amount) || 0), 0);
  const todayExpenses = expenses.filter(e => new Date(e.date).toDateString() === todayStr).reduce((a, e) => a + (Number(e.amount) || 0), 0);

  const lowStockThreshold = settings?.lowStockThreshold || 5;
  const lowStockItems = products.filter(p => (Number(p.available_stock) || 0) <= lowStockThreshold);
  const expiringItems = products.filter(p => p.expiration_date && isExpiringSoon(p.expiration_date, 14));
  const expiredItems = products.filter(p => p.expiration_date && isExpired(p.expiration_date));

  const totalCreditOutstanding = credits.filter(c => c.status !== 'paid').reduce((a, c) => a + (Number(c.balance_amount) || 0), 0);
  const overdueCredits = credits.filter(c => c.status === 'overdue' || (c.due_date && new Date(c.due_date) < today && c.status !== 'paid'));
  const pendingCredits = credits.filter(c => c.status === 'pending' || c.status === 'partial');

  const totalSupplierOwed = suppliers.filter(s => s.status !== 'paid').reduce((a, s) => a + (Number(s.balance_amount) || 0), 0);

  const recentTxns = [...sales].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 12);

  // Yesterday comparison
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  const yesterdaySales = sales.filter(s => new Date(s.timestamp).toDateString() === yesterday.toDateString());
  const yesterdayRevenue = yesterdaySales.reduce((a, s) => a + (Number(s.total) || 0), 0);
  const revenueChange = yesterdayRevenue > 0 ? (((todayRevenue - yesterdayRevenue) / yesterdayRevenue) * 100).toFixed(1) : null;

  // Staff performance today
  const staffMap = {};
  todaySales.forEach(s => {
    const name = s.user_name || ('Teller ' + s.teller_number);
    if (!staffMap[name]) staffMap[name] = { revenue: 0, txns: new Set() };
    staffMap[name].revenue += Number(s.total) || 0;
    staffMap[name].txns.add(s.receipt_number);
  });
  const staffList = Object.entries(staffMap).map(([name, d]) => ({ name, revenue: d.revenue, txns: d.txns.size })).sort((a, b) => b.revenue - a.revenue);

  // Top products all-time
  const prodMap = {};
  sales.forEach(s => { prodMap[s.name] = (prodMap[s.name] || 0) + (Number(s.total) || 0); });
  const topProds = Object.entries(prodMap).sort((a, b) => b[1] - a[1]).slice(0, 6);

  const kpis = [
    { label: "Today's Revenue",    value: `${currency} ${todayRevenue.toLocaleString()}`,       accent: '#2563eb', bg: 'rgba(37,99,235,0.08)',   icon: 'M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6', change: revenueChange != null ? `${revenueChange > 0 ? '+' : ''}${revenueChange}% vs yesterday` : null, changePos: revenueChange >= 0 },
    { label: "Today's Transactions", value: todayTxns,                                           accent: '#8b5cf6', bg: 'rgba(139,92,246,0.08)',  icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2', change: null },
    { label: "Today's Profit",      value: `${currency} ${todayProfit.toLocaleString()}`,        accent: '#10b981', bg: 'rgba(16,185,129,0.08)',  icon: 'M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z', change: null },
    { label: "Today's Expenses",    value: `${currency} ${todayExpenses.toLocaleString()}`,      accent: '#f59e0b', bg: 'rgba(245,158,11,0.08)',  icon: 'M19 3H5c-1.1 0-2 .9-2 2v14l7-3 7 3V5c0-1.1-.9-2-2-2z', change: null },
    { label: 'Credit Outstanding',  value: `${currency} ${totalCreditOutstanding.toLocaleString()}`, accent: '#ef4444', bg: 'rgba(239,68,68,0.08)', icon: 'M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z', change: overdueCredits.length > 0 ? `${overdueCredits.length} overdue` : null, changePos: false },
    { label: 'Low Stock Items',     value: lowStockItems.length,                                  accent: lowStockItems.length > 0 ? '#f97316' : '#94a3b8', bg: lowStockItems.length > 0 ? 'rgba(249,115,22,0.08)' : 'rgba(148,163,184,0.08)', icon: 'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4', change: expiredItems.length > 0 ? `${expiredItems.length} expired` : null, changePos: false },
  ];

  // Draw charts
  useEffect(() => {
    const draw = () => {
      if (!window.Chart) return;
      Chart.defaults.font.family = 'system-ui, -apple-system, sans-serif';
      Chart.defaults.font.size = 11;
      Chart.defaults.color = '#64748b';

      // 7-day revenue chart
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today); d.setDate(today.getDate() - i);
        days.push(d);
      }
      const dayLabels = days.map(d => d.toLocaleDateString('en', { weekday: 'short', day: 'numeric' }));
      const dayRevData = days.map(d => sales.filter(s => new Date(s.timestamp).toDateString() === d.toDateString()).reduce((a, s) => a + (Number(s.total) || 0), 0));
      const dayExpData = days.map(d => expenses.filter(e => new Date(e.date).toDateString() === d.toDateString()).reduce((a, e) => a + (Number(e.amount) || 0), 0));

      if (chartRevRef.current) {
        if (chartRevInst.current) chartRevInst.current.destroy();
        const ctx = chartRevRef.current.getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 0, 200);
        grad.addColorStop(0, 'rgba(37,99,235,0.2)'); grad.addColorStop(1, 'rgba(37,99,235,0.01)');
        chartRevInst.current = new Chart(chartRevRef.current, {
          type: 'bar',
          data: {
            labels: dayLabels,
            datasets: [
              { label: 'Revenue', data: dayRevData, backgroundColor: dayRevData.map((_, i) => i === 6 ? 'rgba(37,99,235,0.85)' : 'rgba(37,99,235,0.35)'), borderRadius: 6, borderSkipped: false, order: 2 },
              { label: 'Expenses', data: dayExpData, type: 'line', borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.12)', pointBackgroundColor: '#f59e0b', pointRadius: 3, borderWidth: 2, tension: 0.4, fill: false, order: 1 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: true, position: 'bottom', labels: { padding: 12, font: { size: 11 }, boxWidth: 10, usePointStyle: true } }, tooltip: { callbacks: { label: c => ` ${currency} ${(c.parsed.y||0).toLocaleString()}` } } },
            scales: {
              x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } },
              y: { beginAtZero: true, grid: { color: 'rgba(148,163,184,0.12)' }, ticks: { color: '#94a3b8', font: { size: 10 }, callback: v => currency + ' ' + (v >= 1000 ? (v/1000).toFixed(0)+'k' : v) } }
            }
          }
        });
      }

      // Payment methods doughnut
      const pmMap = {};
      sales.forEach(s => { const m = (s.payment_method || 'cash'); pmMap[m] = (pmMap[m] || 0) + (Number(s.total) || 0); });
      const pmLabels = Object.keys(pmMap);
      const pmData = pmLabels.map(l => pmMap[l]);
      if (chartPayRef.current && pmData.length > 0) {
        if (chartPayInst.current) chartPayInst.current.destroy();
        chartPayInst.current = new Chart(chartPayRef.current, {
          type: 'doughnut',
          data: { labels: pmLabels.map(l => l.charAt(0).toUpperCase() + l.slice(1)), datasets: [{ data: pmData, backgroundColor: ['#2563eb','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4'], hoverOffset: 10, borderWidth: 2, borderColor: '#fff' }] },
          options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { display: true, position: 'bottom', labels: { padding: 10, font: { size: 10 }, boxWidth: 10 } }, tooltip: { callbacks: { label: c => ` ${currency} ${c.parsed.toLocaleString()}` } } } }
        });
      }

      // Top products bar
      if (chartProdRef.current && topProds.length > 0) {
        if (chartProdInst.current) chartProdInst.current.destroy();
        const colors = topProds.map((_, i) => `rgba(37,99,235,${1 - i * 0.12})`);
        chartProdInst.current = new Chart(chartProdRef.current, {
          type: 'bar',
          data: { labels: topProds.map(([n]) => n.length > 16 ? n.slice(0, 14) + '…' : n), datasets: [{ label: 'Revenue', data: topProds.map(([, v]) => v), backgroundColor: colors, borderRadius: 5, borderSkipped: false }] },
          options: {
            responsive: true, maintainAspectRatio: false, indexAxis: 'y',
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${currency} ${c.parsed.x.toLocaleString()}` } } },
            scales: { x: { beginAtZero: true, grid: { color: 'rgba(148,163,184,0.12)' }, ticks: { color: '#94a3b8', font: { size: 10 }, callback: v => (v >= 1000 ? (v/1000).toFixed(0)+'k' : v) } }, y: { grid: { display: false }, ticks: { color: '#334155', font: { size: 10, weight: '500' } } } }
          }
        });
      }
    };

    if (!window.Chart) {
      const s = document.createElement('script'); s.src = 'https://cdn.jsdelivr.net/npm/chart.js'; s.onload = draw; document.body.appendChild(s);
    } else { setTimeout(draw, 50); }

    return () => { [chartRevInst.current, chartPayInst.current, chartProdInst.current].forEach(c => c && c.destroy && c.destroy()); };
  }, [sales, expenses, activeTab]);

  const fmt = (n) => Number(n || 0).toLocaleString();

  const tabs = [
    { id: 'today', label: "Today's Overview" },
    { id: 'alerts', label: 'Alerts & Stock' },
    { id: 'business', label: 'Business Summary' },
  ];

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-2 z-50">
      <div className="glass-card page-modal rounded-2xl shadow-2xl w-full max-w-7xl max-h-[95vh] flex flex-col overflow-hidden" style={{background: 'rgba(248,250,252,0.6)'}}>

        {/* Header */}
        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background: 'rgba(255,255,255,0.15)', borderRadius: '12px', padding: '9px', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            </div>
            <div>
              <h2 style={{color: '#fff', fontSize: '1.3rem', fontWeight: 800, margin: 0}}>Store Dashboard</h2>
              <p className="theme-header-subtext" style={{fontSize: '0.78rem', margin: 0}}>{new Date().toLocaleDateString('en', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })} &nbsp;·&nbsp; {currency}</p>
            </div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'10px',padding:'7px 16px',color:'#fff',fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:'6px',fontSize:'0.88rem'}} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'} onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg> Close
          </button>
        </div>

        {/* KPI Strip */}
        <div style={{padding: '0.9rem 1.25rem 0', flexShrink: 0}}>
          <div style={{display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: '0.6rem'}}>
            {kpis.map((k, i) => (
              <div key={i} style={{background:'#fff',borderRadius:'14px',padding:'0.8rem 0.9rem',border:`1px solid rgba(203,213,225,0.55)`,boxShadow:'0 1px 8px rgba(15,23,42,0.05)'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'0.3rem'}}>
                  <span style={{fontSize:'0.68rem',color:'#94a3b8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',lineHeight:1.2}}>{k.label}</span>
                  <div style={{background:k.bg,borderRadius:'7px',padding:'4px',display:'flex',flexShrink:0}}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill={k.accent}><path d={k.icon}/></svg>
                  </div>
                </div>
                <div style={{fontSize:'1.1rem',fontWeight:800,color:k.accent,lineHeight:1.1,wordBreak:'break-word'}}>{k.value}</div>
                {k.change && <div style={{fontSize:'0.68rem',fontWeight:600,color:k.changePos?'#10b981':'#ef4444',marginTop:'0.15rem'}}>{k.changePos ? '▲' : '▼'} {k.change}</div>}
              </div>
            ))}
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:'flex',padding:'0 1.25rem',background:'#fff',borderBottom:'1px solid rgba(203,213,225,0.5)',flexShrink:0,marginTop:'0.75rem'}}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)} style={{padding:'0.6rem 1.2rem',border:'none',borderBottom:activeTab===t.id?'2.5px solid #2563eb':'2.5px solid transparent',background:'transparent',color:activeTab===t.id?'#2563eb':'#64748b',fontWeight:activeTab===t.id?700:500,fontSize:'0.86rem',cursor:'pointer',transition:'all 0.15s',marginBottom:'-1px'}}>
              {t.label}
            </button>
          ))}
        </div>

        {/* Scrollable Body */}
        <div className="flex-1 overflow-y-auto" style={{padding:'1rem 1.25rem 1.25rem',minHeight:0}}>

          {/* TODAY'S OVERVIEW TAB */}
          {activeTab === 'today' && (
            <div style={{display:'flex',flexDirection:'column',gap:'0.9rem'}}>

              {/* Charts row */}
              <div style={{display:'grid',gridTemplateColumns:'1.4fr 0.8fr 1fr',gap:'0.9rem'}}>
                <div style={{background:'#fff',borderRadius:'16px',padding:'1rem 1.1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 2px 12px rgba(15,23,42,0.05)'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'0.65rem'}}>
                    <h3 style={{fontWeight:700,color:'#0f172a',fontSize:'0.9rem',margin:0}}>Revenue & Expenses — Last 7 Days</h3>
                    <span style={{fontSize:'0.72rem',color:'#475569',background:'rgba(15,23,42,0.05)',borderRadius:'99px',padding:'2px 9px',border:'1px solid rgba(148,163,184,0.2)',fontWeight:600}}>{currency} {fmt(monthRevenue)} MTD</span>
                  </div>
                  <div style={{height:'200px'}}><canvas ref={chartRevRef} style={{width:'100%',maxHeight:'100%'}}/></div>
                </div>

                <div style={{background:'#fff',borderRadius:'16px',padding:'1rem 1.1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 2px 12px rgba(15,23,42,0.05)'}}>
                  <h3 style={{fontWeight:700,color:'#0f172a',fontSize:'0.9rem',margin:'0 0 0.65rem 0'}}>Payment Methods</h3>
                  <div style={{height:'200px',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {sales.length === 0
                      ? <p style={{color:'#94a3b8',fontSize:'0.8rem'}}>No sales data</p>
                      : <canvas ref={chartPayRef} style={{maxHeight:'100%'}}/>}
                  </div>
                </div>

                <div style={{background:'#fff',borderRadius:'16px',padding:'1rem 1.1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 2px 12px rgba(15,23,42,0.05)'}}>
                  <h3 style={{fontWeight:700,color:'#0f172a',fontSize:'0.9rem',margin:'0 0 0.65rem 0'}}>Top Products</h3>
                  <div style={{height:'200px'}}>
                    {topProds.length === 0
                      ? <p style={{color:'#94a3b8',fontSize:'0.8rem'}}>No sales data</p>
                      : <canvas ref={chartProdRef} style={{width:'100%',maxHeight:'100%'}}/>}
                  </div>
                </div>
              </div>

              {/* Recent transactions + Staff performance */}
              <div style={{display:'grid',gridTemplateColumns:'1.6fr 1fr',gap:'0.9rem'}}>
                {/* Recent transactions */}
                <div style={{background:'#fff',borderRadius:'16px',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 2px 12px rgba(15,23,42,0.05)',overflow:'hidden'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0.85rem 1rem',borderBottom:'1px solid rgba(203,213,225,0.4)'}}>
                    <h3 style={{fontWeight:700,color:'#0f172a',fontSize:'0.9rem',margin:0}}>Recent Transactions</h3>
                    <button onClick={onOpenSales} style={{fontSize:'0.75rem',color:'#2563eb',fontWeight:600,background:'rgba(37,99,235,0.07)',border:'1px solid rgba(37,99,235,0.2)',borderRadius:'8px',padding:'3px 10px',cursor:'pointer'}}>View All</button>
                  </div>
                  <div style={{overflow:'auto',maxHeight:'220px'}}>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.78rem'}}>
                      <thead><tr style={{background:'#f8fafc',position:'sticky',top:0}}>
                        {['Time','Receipt','Product','Qty','Total','Method'].map(h => <th key={h} style={{padding:'6px 10px',textAlign:'left',fontWeight:700,color:'#64748b',fontSize:'0.7rem',textTransform:'uppercase',letterSpacing:'0.04em',whiteSpace:'nowrap'}}>{h}</th>)}
                      </tr></thead>
                      <tbody>
                        {recentTxns.length === 0
                          ? <tr><td colSpan="6" style={{padding:'24px',textAlign:'center',color:'#94a3b8'}}>No transactions yet today</td></tr>
                          : recentTxns.map((s, i) => (
                            <tr key={i} style={{borderTop:'1px solid rgba(203,213,225,0.3)',background:i%2===0?'transparent':'rgba(248,250,252,0.5)'}}>
                              <td style={{padding:'6px 10px',color:'#64748b',whiteSpace:'nowrap'}}>{new Date(s.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</td>
                              <td style={{padding:'6px 10px',fontWeight:600,color:'#2563eb',whiteSpace:'nowrap'}}>{s.receipt_number}</td>
                              <td style={{padding:'6px 10px',color:'#0f172a',maxWidth:'140px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</td>
                              <td style={{padding:'6px 10px',textAlign:'center',color:'#475569'}}>{s.quantity}</td>
                              <td style={{padding:'6px 10px',fontWeight:700,color:'#0f172a',whiteSpace:'nowrap'}}>{currency} {fmt(s.total)}</td>
                              <td style={{padding:'6px 10px'}}>
                                <span style={{background: s.payment_method==='cash'?'rgba(16,185,129,0.1)':s.payment_method==='credit'?'rgba(239,68,68,0.1)':'rgba(37,99,235,0.1)', color:s.payment_method==='cash'?'#047857':s.payment_method==='credit'?'#dc2626':'#1d4ed8', borderRadius:'6px', padding:'2px 8px', fontSize:'0.68rem', fontWeight:700, textTransform:'capitalize'}}>
                                  {s.payment_method || 'cash'}
                                </span>
                              </td>
                            </tr>
                          ))}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* Staff performance */}
                <div style={{background:'#fff',borderRadius:'16px',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 2px 12px rgba(15,23,42,0.05)',overflow:'hidden'}}>
                  <div style={{padding:'0.85rem 1rem',borderBottom:'1px solid rgba(203,213,225,0.4)'}}>
                    <h3 style={{fontWeight:700,color:'#0f172a',fontSize:'0.9rem',margin:0}}>Staff Performance Today</h3>
                  </div>
                  <div style={{padding:'0.6rem 0.8rem',display:'flex',flexDirection:'column',gap:'0.5rem',maxHeight:'240px',overflowY:'auto'}}>
                    {staffList.length === 0
                      ? <p style={{color:'#94a3b8',fontSize:'0.82rem',textAlign:'center',padding:'24px 0'}}>No sales recorded today</p>
                      : staffList.map((s, i) => {
                          const pct = staffList[0].revenue > 0 ? (s.revenue / staffList[0].revenue) * 100 : 0;
                          const colors = ['#2563eb','#8b5cf6','#10b981','#f59e0b','#ef4444'];
                          const c = colors[i % colors.length];
                          return (
                            <div key={i} style={{padding:'0.55rem 0.7rem',background:'#f8fafc',borderRadius:'10px',border:'1px solid rgba(203,213,225,0.4)'}}>
                              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'0.3rem'}}>
                                <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
                                  <div style={{width:'26px',height:'26px',borderRadius:'50%',background:`linear-gradient(135deg,${c},${c}aa)`,color:'#fff',fontWeight:800,fontSize:'0.7rem',display:'flex',alignItems:'center',justifyContent:'center'}}>{s.name.charAt(0).toUpperCase()}</div>
                                  <span style={{fontWeight:600,color:'#0f172a',fontSize:'0.82rem'}}>{s.name}</span>
                                </div>
                                <div style={{textAlign:'right'}}>
                                  <div style={{fontWeight:800,color:c,fontSize:'0.85rem'}}>{currency} {fmt(s.revenue)}</div>
                                  <div style={{fontSize:'0.68rem',color:'#94a3b8'}}>{s.txns} txn{s.txns!==1?'s':''}</div>
                                </div>
                              </div>
                              <div style={{background:'rgba(203,213,225,0.3)',borderRadius:'99px',height:'4px',overflow:'hidden'}}>
                                <div style={{width:`${pct}%`,height:'100%',background:`linear-gradient(90deg,${c},${c}bb)`,borderRadius:'99px',transition:'width 0.6s ease'}}/>
                              </div>
                            </div>
                          );
                        })}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ALERTS & STOCK TAB */}
          {activeTab === 'alerts' && (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'0.9rem'}}>

              {/* Low stock */}
              <div style={{background:'#fff',borderRadius:'16px',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 2px 12px rgba(15,23,42,0.05)',overflow:'hidden'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0.85rem 1rem',borderBottom:'1px solid rgba(203,213,225,0.4)',background: lowStockItems.length>0?'rgba(249,115,22,0.04)':'transparent'}}>
                  <h3 style={{fontWeight:700,color: lowStockItems.length>0?'#c2410c':'#0f172a',fontSize:'0.9rem',margin:0}}>⚠️ Low Stock ({lowStockItems.length})</h3>
                  <button onClick={onOpenInventory} style={{fontSize:'0.72rem',color:'#f97316',fontWeight:600,background:'rgba(249,115,22,0.08)',border:'1px solid rgba(249,115,22,0.2)',borderRadius:'8px',padding:'3px 10px',cursor:'pointer'}}>Manage</button>
                </div>
                <div style={{maxHeight:'320px',overflowY:'auto'}}>
                  {lowStockItems.length === 0

                    const cats = Object.entries(catMap).sort((a, b) => b[1] - a[1]);
                    const monthTotal = monthExpenses.reduce((a, e) => a + (Number(e.amount) || 0), 0);
                    const catColors = ['#2563eb','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4','#e11d48'];

                        {cats.map(([cat, amt], i) => {

                      </div>
                    );

          )}

        </div>
