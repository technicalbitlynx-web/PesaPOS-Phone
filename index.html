  const btn  = (col='#3b82f6') => ({ padding:'10px 24px',borderRadius:'9px',border:'none',background:`linear-gradient(135deg,${col},${col}cc)`,color:'#fff',fontWeight:700,fontSize:'0.9rem',cursor:'pointer',width:'100%',opacity:busy?0.7:1 });

  const header = (
    <div style={{marginBottom:'1.75rem',textAlign:'center'}}>
      <img src="PesaIcon.png" alt="Pesa POS" style={{height:'52px',marginBottom:'0.65rem',filter:'drop-shadow(0 4px 16px rgba(0,0,0,0.5))'}} />
      <h1 style={{color:'#fff',fontSize:'1.55rem',fontWeight:800,margin:0,letterSpacing:'-0.02em'}}>Device Setup</h1>
      {cloudInfo?.plan_name && (
        <span style={{display:'inline-block',marginTop:'0.5rem',padding:'3px 14px',borderRadius:'99px',background:'rgba(255,255,255,0.1)',color:'rgba(167,243,208,0.9)',fontSize:'0.74rem',fontWeight:700,border:'1px solid rgba(255,255,255,0.15)'}}>
          {cloudInfo.plan_name} Plan · {cloudInfo.business_name || ''}
        </span>
      )}
    </div>
  );

  const errBox = error ? (
    <div style={{marginTop:'0.75rem',padding:'9px 14px',borderRadius:'9px',background:'rgba(239,68,68,0.15)',border:'1px solid rgba(239,68,68,0.4)',color:'#fca5a5',fontSize:'0.82rem',fontWeight:600}}>⚠ {error}</div>
  ) : null;

  if (step === 'manager') return (
    <div style={wrap}>
      {header}
      <div style={{width:'100%',maxWidth:'380px',background:'rgba(255,255,255,0.06)',borderRadius:'18px',border:'1px solid rgba(99,179,237,0.3)',padding:'1.5rem'}}>
        <div style={{fontSize:'1.8rem',textAlign:'center',marginBottom:'0.5rem'}}>🖥️</div>
        <h2 style={{color:'#fff',fontSize:'1.05rem',fontWeight:800,textAlign:'center',margin:'0 0 0.3rem'}}>Manager Device</h2>
        <p style={{color:'rgba(147,197,253,0.8)',fontSize:'0.78rem',textAlign:'center',margin:'0 0 1.25rem',lineHeight:'1.5'}}>Enter your manager credentials to register this device.</p>
        <label style={{color:'rgba(147,197,253,0.85)',fontSize:'0.8rem',fontWeight:600}}>Manager Username
          <input value={mgrUsername} onChange={e=>setMgrUsername(e.target.value)} autoComplete="username" style={inp} placeholder="e.g. admin" />
        </label>
        <label style={{color:'rgba(147,197,253,0.85)',fontSize:'0.8rem',fontWeight:600,display:'block',marginTop:'0.9rem'}}>Manager PIN
          <input type="password" inputMode="numeric" value={mgrPin} onChange={e=>setMgrPin(e.target.value)} style={inp} placeholder="4–6 digit PIN" onKeyDown={e=>e.key==='Enter'&&registerManager()} />
        </label>
        {errBox}
        <button onClick={registerManager} disabled={busy} style={{...btn('#1e3a8a'),marginTop:'1.1rem'}}>{busy?'Registering…':'Register as Manager'}</button>
        <button onClick={()=>{setStep('choose');setError('');}} style={{...btn('#334155'),marginTop:'0.5rem'}}>← Back</button>
      </div>
    </div>
  );

  if (step === 'pos') return (
    <div style={wrap}>
      {header}
      <div style={{width:'100%',maxWidth:'380px',background:'rgba(255,255,255,0.06)',borderRadius:'18px',border:'1px solid rgba(99,179,237,0.3)',padding:'1.5rem'}}>
        <div style={{fontSize:'1.8rem',textAlign:'center',marginBottom:'0.5rem'}}>🧾</div>
        <h2 style={{color:'#fff',fontSize:'1.05rem',fontWeight:800,textAlign:'center',margin:'0 0 0.3rem'}}>POS Cashier Device</h2>
        <p style={{color:'rgba(147,197,253,0.8)',fontSize:'0.78rem',textAlign:'center',margin:'0 0 1.25rem',lineHeight:'1.5'}}>Enter the access code your manager created for this device.</p>
        <label style={{color:'rgba(147,197,253,0.85)',fontSize:'0.8rem',fontWeight:600}}>Access Code
          <input type="password" inputMode="numeric" value={accessCode} onChange={e=>setAccessCode(e.target.value)} style={{...inp,fontSize:'1.3rem',letterSpacing:'0.2em',textAlign:'center'}} placeholder="• • • • • •" maxLength={8} onKeyDown={e=>e.key==='Enter'&&registerPOS()} />
        </label>
        <p style={{color:'rgba(100,116,139,0.65)',fontSize:'0.72rem',marginTop:'0.5rem',textAlign:'center'}}>Ask your manager to create one in Settings → Devices → POS Credentials.</p>
        {errBox}
        <button onClick={registerPOS} disabled={busy} style={{...btn('#047857'),marginTop:'1.1rem'}}>{busy?'Verifying…':'Register as Cashier'}</button>
        <button onClick={()=>{setStep('choose');setError('');}} style={{...btn('#334155'),marginTop:'0.5rem'}}>← Back</button>
      </div>
    </div>
  );

  // Step: choose
  const cardBase = { borderRadius:'16px',padding:'1.5rem 1.25rem',textAlign:'left',transition:'all 0.2s',border:'2px solid rgba(99,179,237,0.35)',background:'rgba(255,255,255,0.07)',cursor:'pointer' };
  return (
    <div style={wrap}>
      {header}
      <p style={{color:'rgba(147,197,253,0.85)',fontSize:'0.88rem',margin:'-0.75rem 0 1.25rem',textAlign:'center'}}>This device is not yet registered. How will it be used?</p>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',maxWidth:'560px',width:'100%'}}>
        <button onClick={()=>!mgrFull&&setStep('manager')} disabled={mgrFull}
          style={{...cardBase,opacity:mgrFull?0.45:1,cursor:mgrFull?'not-allowed':'pointer'}}
          onMouseEnter={e=>{if(!mgrFull)e.currentTarget.style.background='rgba(255,255,255,0.13)';}}
          onMouseLeave={e=>{if(!mgrFull)e.currentTarget.style.background='rgba(255,255,255,0.07)';}}>
          <div style={{fontSize:'2rem',marginBottom:'0.5rem'}}>🖥️</div>
          <div style={{color:'#fff',fontWeight:700,fontSize:'1rem',marginBottom:'0.35rem'}}>Manager Device</div>
          <div style={{color:'rgba(147,197,253,0.8)',fontSize:'0.78rem',lineHeight:'1.55',marginBottom:'0.8rem'}}>Full management access. Requires manager credentials.</div>
          <div style={{display:'inline-block',padding:'3px 10px',borderRadius:'99px',fontSize:'0.72rem',fontWeight:700,background:mgrFull?'rgba(239,68,68,0.2)':'rgba(16,185,129,0.2)',color:mgrFull?'#fca5a5':'#6ee7b7',border:`1px solid ${mgrFull?'rgba(239,68,68,0.4)':'rgba(16,185,129,0.4)'}`}}>
            {mgrMax === null ? 'Unlimited' : mgrFull ? 'Limit reached' : `${mgrAvail} slot${mgrAvail===1?'':'s'} available`}
          </div>
        </button>

        <button onClick={()=>setStep('pos')}
          style={cardBase}
          onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.13)'}
          onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.07)'}>
          <div style={{fontSize:'2rem',marginBottom:'0.5rem'}}>🧾</div>
          <div style={{color:'#fff',fontWeight:700,fontSize:'1rem',marginBottom:'0.35rem'}}>POS Cashier</div>
          <div style={{color:'rgba(147,197,253,0.8)',fontSize:'0.78rem',lineHeight:'1.55',marginBottom:'0.8rem'}}>Sales terminal. Uses an access code created by your manager.</div>
          <div style={{display:'inline-block',padding:'3px 10px',borderRadius:'99px',fontSize:'0.72rem',fontWeight:700,background:'rgba(16,185,129,0.2)',color:'#6ee7b7',border:'1px solid rgba(16,185,129,0.4)'}}>
            Unlimited
          </div>
        </button>
      </div>
      <p style={{marginTop:'1.5rem',color:'rgba(100,116,139,0.65)',fontSize:'0.72rem',maxWidth:'440px',textAlign:'center',lineHeight:'1.6'}}>
        Managers: register this device first, then create POS access codes from Settings → Devices.
      </p>
    </div>
  );
}

/* ---------- Login Modal ---------- */
function LoginModal({ users, onLogin, onCancel, setShowLoading, cloudStatus, cloudOperators, settings }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [showPass, setShowPass] = useState(false);
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [showSplash, setShowSplash] = useState(true);
  const usernameRef = useRef(null);

  const hasCloudOps = Array.isArray(cloudOperators) && cloudOperators.length > 0;
  const cloudActive = cloudStatus === 'active' && settings?.posmsUrl && settings?.posmsLicenseKey;

  useEffect(() => {
    if (usernameRef.current) usernameRef.current.focus();
  }, []);

  if (showSplash) {
    return <LogoSplashScreen onComplete={() => setShowSplash(false)} />;
  }

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError("");
    setBusy(true);

    let loggedUser = null;

    if (cloudActive && hasCloudOps) {
      // Try server-side PIN verification
      try {
        const base = settings.posmsUrl.replace(/\/api\/v1.*$/, '').replace(/\/$/, '');
        const r = await fetch(`${base}/api/v1/pos/operators/verify-pin`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ license_key: settings.posmsLicenseKey, username, pin: password }),
        });
        if (r.ok) {
          const j = await r.json();
          if (j.data?.valid) {
            const op = j.data.operator;
            loggedUser = { id: op.id, username: op.username, name: op.name, role: op.role, source: 'cloud' };
          }
        }
      } catch {}
      if (!loggedUser) {
        setError("Invalid username or PIN. Please try again.");
        setBusy(false);
        return;
      }
    } else {
      // Offline — check local users
      loggedUser = users.find((m) => m.username === username && m.password === password) || null;
    }

    if (loggedUser) {
      // Device role enforcement
      const deviceType = localStorage.getItem('posDeviceType');
      if (deviceType === 'manager' && loggedUser.role !== 'manager') {
        setError("This device is reserved for managers only. Please use a POS Device to sign in as a teller.");
        setBusy(false);
        return;
      }
      setShowLoading(true);
      setTimeout(() => {
        onLogin(loggedUser);
        setShowLoading(false);
        setBusy(false);
      }, 1600);
    } else {
      setError("Invalid username or password. Please try again.");
      setBusy(false);
    }
  };

  const deviceType = localStorage.getItem('posDeviceType');

  return (
    <div className="login-fullscreen-wrap">
      <div className="login-card-v2">
        {/* Dark branded header */}
        <div className="login-card-top">
          <img src="PesaIcon.png" alt="Pesa POS" className="login-card-logo-img" />
          <p className="login-card-brand">Pesa POS</p>
          <p className="login-card-version">Point of Sale · v2.1</p>
          {deviceType && (
            <span style={{display:'inline-block',marginTop:'6px',padding:'3px 12px',borderRadius:'99px',fontSize:'0.7rem',fontWeight:700,background:deviceType==='manager'?'rgba(99,179,237,0.2)':'rgba(16,185,129,0.2)',color:deviceType==='manager'?'#93c5fd':'#6ee7b7',border:`1px solid ${deviceType==='manager'?'rgba(99,179,237,0.4)':'rgba(16,185,129,0.4)'}`}}>
              {deviceType === 'manager' ? '🖥️ Manager Device' : '🏪 POS Device'}
            </span>
          )}
        </div>

        {/* Form body */}
        <div className="login-card-body">
          <h2 className="login-heading-v2">Welcome back</h2>
          <p className="login-subheading-v2">
            {deviceType === 'manager' ? 'Manager access only on this device' :
             hasCloudOps && cloudActive
              ? `${cloudOperators.length} operator${cloudOperators.length !== 1 ? 's' : ''} — sign in with your PIN`
              : 'Sign in to your workspace'}
          </p>

          {error && (
            <div className="login-error-v2">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14.93V17a1 1 0 0 1-2 0v-.07A1 1 0 0 1 12 15a1 1 0 0 1 1 1.93zM13 11a1 1 0 0 1-2 0V7a1 1 0 0 1 2 0v4z"/></svg>
              {error}
            </div>
          )}

          <form onSubmit={handleSubmit}>
            <div className="login-field-v2">
              <span className="login-field-icon-v2"><UserIcon /></span>
              <input
                ref={usernameRef}
                value={username}
                onChange={(e) => { setUsername(e.target.value); setError(""); }}
                placeholder="Username"
                autoComplete="username"
                autoCapitalize="off"
                required
              />
            </div>

            <div className="login-field-v2">
              <span className="login-field-icon-v2"><LockIcon /></span>
              <input
                type={showPass ? "text" : "password"}
                inputMode={hasCloudOps && cloudActive ? "numeric" : undefined}
                maxLength={hasCloudOps && cloudActive ? 6 : undefined}
                value={password}
                onChange={(e) => { setPassword(e.target.value); setError(""); }}
                placeholder={hasCloudOps && cloudActive ? "PIN (4–6 digits)" : "Password"}
                autoComplete="current-password"
                required
              />
              <button type="button" className="login-eye-v2" onClick={() => setShowPass(v => !v)} tabIndex={-1}>
                {showPass ? <EyeOffIcon /> : <EyeIcon />}
              </button>
            </div>

            <button type="submit" className="login-submit-v2" disabled={busy}>
              {busy ? <><span className="login-spinner"></span>Signing in…</> : "Sign In"}
            </button>
          </form>

          <p className="login-footer-v2">Secured · Role-based access control</p>
        </div>
      </div>
    </div>
  );
}

/* ---------- Price Edit Modal ---------- */
function PriceEditModal({ product, currentPrice, currentQuantity = 1, onClose, onSave }) {
  const [price, setPrice] = useState(currentPrice.toString());
  const [quantity, setQuantity] = useState(currentQuantity.toString());
  
  const handleSave = () => {
    const newPrice = parseFloat(price);
    const newQuantity = parseInt(quantity, 10);
    
    if (!isNaN(newPrice) && newPrice >= 0 && !isNaN(newQuantity) && newQuantity > 0) {
      if (newQuantity > Number(product?.available_stock || 0)) {
        alert(`Only ${product.available_stock} units available`);
        return;
      }
      
      onSave(newPrice, newQuantity);
      onClose();
    } else {
      alert("Please enter valid price and quantity");
    }
  };
  
  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
        <div className="theme-dark-surface px-5 py-4">
          <h2 style={{color:'#fff',fontSize:'1.1rem',fontWeight:800,margin:'0 0 2px'}}>Edit Price & Quantity</h2>
          <p className="theme-header-subtext" style={{fontSize:'0.8rem',margin:0}}>{product?.name}</p>
        </div>
        <div style={{padding:'1.25rem',background:'#f8fafc'}}>
          <div style={{background:'#fff',borderRadius:'12px',border:'1px solid rgba(203,213,225,0.6)',padding:'0.85rem 1rem',marginBottom:'1rem',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.4rem 1rem',fontSize:'0.85rem'}}>
            {[['Current Price',`TSH ${currentPrice.toLocaleString()}`,'#059669'],['Buy Price',`TSH ${(product?.buy_price||0).toLocaleString()}`,'#64748b'],['In Stock',`${product?.available_stock||0} units`,'#2563eb'],['Cart Qty',currentQuantity,'#475569']].map(([lbl,val,color])=>(
              <div key={lbl}><span style={{color:'#94a3b8',fontWeight:600}}>{lbl}: </span><span style={{fontWeight:700,color}}>{val}</span></div>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem',marginBottom:'1.25rem'}}>
            {[{label:'Quantity',key:'quantity',val:quantity,set:setQuantity,min:1,max:product?.available_stock||9999,step:'1',auto:true},{label:'Selling Price',key:'price',val:price,set:setPrice,min:0,step:'0.01'}].map(f=>(
              <div key={f.key}>
                <label style={{display:'block',fontSize:'0.75rem',fontWeight:700,color:'#475569',marginBottom:'5px',textTransform:'uppercase',letterSpacing:'0.04em'}}>{f.label}</label>
                <input type="number" value={f.val} onChange={e=>f.set(e.target.value)} placeholder="0" min={f.min} max={f.max} step={f.step} autoFocus={f.auto}
                  style={{width:'100%',padding:'9px 12px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'9px',fontSize:'1.05rem',fontWeight:700,color:'#1e293b',background:'#fff',textAlign:'center',boxSizing:'border-box'}} />
              </div>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.6rem'}}>
            <button onClick={onClose}
              style={{padding:'10px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'9px',background:'transparent',color:'#64748b',fontWeight:600,cursor:'pointer',fontSize:'0.9rem'}}>Cancel</button>
            <button onClick={handleSave}
              style={{padding:'10px',border:'none',borderRadius:'9px',background:'linear-gradient(135deg,#059669,#10b981)',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:'0.9rem'}}>Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Payment Type Modal ---------- */
function PaymentTypeModal({ total, onClose, onConfirm }) {
  const [paymentMethod, setPaymentMethod] = useState("cash");
  const [cashReceived, setCashReceived] = useState("");
  const [customerName, setCustomerName] = useState("");
  const [customerPhone, setCustomerPhone] = useState("");
  const [dueDate, setDueDate] = useState("");
  const cashRef = useRef(null);

  useEffect(() => {
    if (cashRef.current) cashRef.current.focus();
  }, []);

  const calculateChange = () => {
    if (paymentMethod !== "cash") return 0;
    const received = parseFloat(cashReceived) || 0;
    return Math.max(0, received - total);
  };

  const change = calculateChange();

  useEffect(() => {
    if (paymentMethod === "credit" && !dueDate) {
      const futureDate = new Date();
      futureDate.setDate(futureDate.getDate() + 30);
      setDueDate(futureDate.toISOString().split('T')[0]);
    }
  }, [paymentMethod, dueDate]);

  const payMethods = [{id:'cash',label:'Cash'},{id:'credit',label:'Credit'},{id:'mpesa',label:'M-Pesa'},{id:'airtel',label:'Airtel'},{id:'mixx',label:'MIXX'}];

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
        <div className="theme-dark-surface px-5 py-4 text-center">
          <h2 style={{color:'#fff',fontSize:'1.1rem',fontWeight:800,margin:'0 0 4px'}}>Payment Details</h2>
          <div style={{color:'rgba(255,255,255,0.9)',fontSize:'1.5rem',fontWeight:900}}>TSH {total.toLocaleString()}</div>
        </div>
        <div style={{padding:'1.25rem',background:'#f8fafc'}}>
        <div style={{marginBottom:'1rem'}}>
            <label style={{display:'block',fontSize:'0.75rem',fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:'8px'}}>Payment Method</label>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.5rem'}}>
              {payMethods.map(m=>(
                <button key={m.id} onClick={()=>setPaymentMethod(m.id)}
                  style={{padding:'9px 14px',border:`2px solid ${paymentMethod===m.id?'#2563eb':'rgba(203,213,225,0.7)'}`,borderRadius:'9px',background:paymentMethod===m.id?'rgba(37,99,235,0.1)':'#fff',color:paymentMethod===m.id?'#2563eb':'#475569',fontWeight:700,cursor:'pointer',fontSize:'0.88rem',transition:'all 0.15s'}}>
                  {m.label}
                </button>
              ))}
            </div>
          </div>

          {paymentMethod === "cash" && (
            <div style={{marginBottom:'1rem'}}>
              <label style={{display:'block',fontSize:'0.75rem',fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:'5px'}}>Cash Received (TSH)</label>
              <input ref={cashRef} type="number" value={cashReceived} onChange={e=>setCashReceived(e.target.value)} placeholder="Enter amount received" min={total} step="1"
                style={{width:'100%',padding:'10px 12px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'9px',fontSize:'1.05rem',fontWeight:700,color:'#1e293b',background:'#fff',boxSizing:'border-box',textAlign:'center'}} />
              {cashReceived && parseFloat(cashReceived) >= total && (
                <div style={{marginTop:'8px',padding:'8px 12px',background:'rgba(16,185,129,0.1)',border:'1px solid rgba(16,185,129,0.25)',borderRadius:'8px',color:'#059669',fontWeight:700,fontSize:'0.9rem',textAlign:'center'}}>
                  Change: TSH {change.toLocaleString()}
                </div>
              )}
            </div>
          )}

          {paymentMethod === "credit" && (
            <div style={{display:'flex',flexDirection:'column',gap:'0.65rem',marginBottom:'1rem'}}>
              {[{label:'Customer Name *',type:'text',val:customerName,set:setCustomerName,ph:'Enter customer name'},{label:'Customer Phone',type:'tel',val:customerPhone,set:setCustomerPhone,ph:'Phone number'},{label:'Due Date',type:'date',val:dueDate,set:setDueDate,ph:''}].map(f=>(
                <div key={f.label}>
                  <label style={{display:'block',fontSize:'0.75rem',fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:'4px'}}>{f.label}</label>
                  <input type={f.type} value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.ph}
                    style={{width:'100%',padding:'8px 12px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.9rem',color:'#1e293b',background:'#fff',boxSizing:'border-box'}} />
                </div>
              ))}
            </div>
          )}

          {(paymentMethod === "mpesa" || paymentMethod === "airtel" || paymentMethod === "mixx") && (
            <div style={{marginBottom:'1rem',padding:'0.85rem',background:'rgba(37,99,235,0.05)',border:'1px solid rgba(37,99,235,0.2)',borderRadius:'10px'}}>
              <div style={{fontSize:'0.85rem',fontWeight:700,color:'#1e40af',marginBottom:'0.65rem'}}>
                {paymentMethod === "mpesa" ? "M-Pesa" : paymentMethod === "airtel" ? "Airtel Money" : "MIXX by YAS"} Payment
              </div>
              <label style={{display:'block',fontSize:'0.75rem',fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:'5px'}}>Customer Phone *</label>
              <input type="tel" value={customerPhone} onChange={e=>setCustomerPhone(e.target.value)} placeholder="e.g. 255712345678"
                style={{width:'100%',padding:'8px 12px',border:'1px solid rgba(37,99,235,0.3)',borderRadius:'8px',fontSize:'0.9rem',color:'#1e293b',background:'#fff',boxSizing:'border-box',marginBottom:'0.65rem'}} />
              <div style={{background:'#fff',borderRadius:'7px',border:'1px solid rgba(37,99,235,0.15)',padding:'8px 12px',fontSize:'0.85rem',color:'#334155',textAlign:'center'}}>
                <span style={{fontWeight:700,color:'#2563eb',fontSize:'1.05rem'}}>TSH {total.toLocaleString()}</span>
                <div style={{fontSize:'0.75rem',color:'#64748b',marginTop:'2px'}}>Customer will receive a payment prompt</div>
              </div>
            </div>
          )}

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.6rem'}}>
            <button onClick={onClose}
              style={{padding:'10px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'9px',background:'transparent',color:'#64748b',fontWeight:600,cursor:'pointer',fontSize:'0.9rem'}}>Back</button>
            <button
              onClick={()=>onConfirm({method:paymentMethod,cashReceived:parseFloat(cashReceived)||0,change,customerName:customerName.trim(),customerPhone:customerPhone.trim(),dueDate})}
              disabled={paymentMethod==="cash"&&(!cashReceived||parseFloat(cashReceived)<total)||paymentMethod==="credit"&&!customerName.trim()||(paymentMethod==="mpesa"||paymentMethod==="airtel"||paymentMethod==="mixx")&&!customerPhone.trim()}
              style={{padding:'10px',border:'none',borderRadius:'9px',background:'linear-gradient(135deg,#059669,#10b981)',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:'0.9rem',opacity:(paymentMethod==="cash"&&(!cashReceived||parseFloat(cashReceived)<total)||paymentMethod==="credit"&&!customerName.trim()||(paymentMethod==="mpesa"||paymentMethod==="airtel"||paymentMethod==="mixx")&&!customerPhone.trim())?0.45:1}}>
              Confirm Payment
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Receipt Preview Component ---------- */
function ReceiptPreview({ html, onDone }) {
  // when shown, after animation duration call onDone
  useEffect(() => {
    const timer = setTimeout(() => {
      onDone();
    }, 2500); // 2.5s roll animation
    return () => clearTimeout(timer);
  }, [onDone]);

  return (
    <div className="preview-overlay">
      {/* the paper roll container will eventually show the receipt HTML */}
      <div
        className="paper-roll"
        dangerouslySetInnerHTML={{ __html: html }}
      ></div>
    </div>
  );
}

/* ---------- Receipt Modal ---------- */
function Receipt({ receiptNumber, teller, timestampDisp, items, cart, total, onClose, settings, paymentDetails, mode = 'receipt' }) {
  const receiptRef = useRef(null);
  const receiptFormat = settings?.receiptFormat || 'pdf';
  const receiptSize = settings?.receiptSize || 'standard';
  const receiptSizes = {
    small: { maxWidth: '280px', fontSize: '11px', headerSize: '18px', itemFont: '10px' },
    standard: { maxWidth: '360px', fontSize: '12px', headerSize: '20px', itemFont: '11px' },
    large: { maxWidth: '520px', fontSize: '13px', headerSize: '22px', itemFont: '12px' }
  };
  const sizeStyle = receiptSizes[receiptSize] || receiptSizes.standard;
  const receiptRootStyle = {
    fontFamily: "'Inter', 'Helvetica Neue', Arial, sans-serif",
    fontSize: sizeStyle.fontSize,
    lineHeight: '1.5',
    maxWidth: sizeStyle.maxWidth,
    margin: '0 auto',
    padding: '18px',
    color: '#1f2937',
    backgroundColor: '#ffffff'
  };

  const performPrint = () => {
    const printContent = receiptRef.current;
    const originalContents = document.body.innerHTML;
    
    const printWindow = window.open('', '_blank');
    printWindow.document.write(`
      <html>
        <head>
          <title>Receipt #${receiptNumber}</title>
          <style>
            body { font-family: 'Courier New', monospace; padding: 20px; max-width: 300px; margin: 0 auto; }
            .receipt-header { text-align: center; margin-bottom: 20px; }
            .receipt-logo { max-height: 80px; max-width: 200px; margin: 0 auto 10px; }
            .company-name { font-size: 18px; font-weight: bold; margin: 5px 0; }
            .tagline { font-size: 12px; color: #666; margin-bottom: 10px; }
            .receipt-divider { border-top: 1px dashed #000; margin: 10px 0; }
            .receipt-item { display: flex; justify-content: space-between; margin: 5px 0; }
            .receipt-total { font-weight: bold; font-size: 16px; margin-top: 10px; }
            .receipt-footer { text-align: center; margin-top: 20px; font-size: 12px; }
          </style>
        </head>
        <body>
          ${printContent.outerHTML}
        </body>
      </html>
    `);
    printWindow.document.close();
    printWindow.focus();
    printWindow.print();
    printWindow.close();
  };

  const handlePrint = () => {
    if (receiptRef.current) {
      performPrint();
    }
  };

  const handleSaveReceipt = () => {
    if (!receiptRef.current) return;
    const savePdf = () => {
      const printContent = receiptRef.current;
      const doSavePdf = () => {
        window.html2pdf().from(printContent)
          .set({ margin: 0.5, filename: `receipt_${receiptNumber}.pdf`, html2canvas: { scale: 2 } })
          .save();
      };
      if (!window.html2pdf) {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js';
        s.onload = doSavePdf;
        document.body.appendChild(s);
      } else {
        doSavePdf();
      }
    };
    const savePng = () => {
      const printContent = receiptRef.current;
      const saveImage = () => {
        window.html2canvas(printContent, { scale: 2 }).then((canvas) => {
          const link = document.createElement('a');
          link.href = canvas.toDataURL('image/png');
          link.download = `receipt_${receiptNumber}.png`;
          link.click();
        });
      };
      if (!window.html2canvas) {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.onload = saveImage;
        document.body.appendChild(s);
      } else {
        saveImage();
      }
    };

    if (receiptFormat === 'png') {
      savePng();
    } else {
      savePdf();
    }
  };

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
      <div className="glass-card rounded-xl shadow-2xl w-full max-w-md p-8">
        <div ref={receiptRef} style={receiptRootStyle}>
          <div className="text-center mb-4" style={{borderBottom: '1px dashed #ccc', paddingBottom: '12px'}}>
            {settings?.logoData && (
              <img 
                src={settings.logoData} 
                alt="Store Logo" 
                className="mx-auto mb-3 object-contain"
                style={{maxHeight: '100px', maxWidth: '200px', display: 'block', margin: '0 auto 12px auto'}}
              />
            )}
            <div style={{fontSize: sizeStyle.headerSize, fontWeight: 'bold', marginBottom: '4px'}}>{settings?.companyName || 'Pesa POS'}</div>
            <div style={{fontSize: sizeStyle.itemFont, marginBottom: '8px', color: '#4b5563'}}>{settings?.tagline || '"Above The Best"'}</div>
            <div style={{fontSize: sizeStyle.itemFont, color: '#6b7280', fontWeight: 600}}>{mode === 'invoice' ? 'SALES INVOICE' : 'SALES RECEIPT'}</div>
          </div>
          
          <div style={{marginBottom: '12px', fontSize: '11px'}}>
            <div style={{textAlign: 'center', marginBottom: '4px'}}>{mode === 'invoice' ? 'Invoice #' : 'Receipt #'}{receiptNumber}</div>
            <div style={{textAlign: 'center', marginBottom: '4px'}}>Teller: {teller}</div>
            <div style={{textAlign: 'center', marginBottom: '4px'}}>{timestampDisp}</div>
            <div style={{borderTop: '1px dashed #ccc', borderBottom: '1px dashed #ccc', padding: '4px 0', textAlign: 'center'}}>Cashier: {localStorage.getItem('pos_current_user') ? JSON.parse(localStorage.getItem('pos_current_user')).name : 'Manager'}</div>
            {mode === 'invoice' && paymentDetails && (
              <>
                <div style={{textAlign: 'center', marginTop: '4px'}}>Customer: {paymentDetails.customerName || ''}</div>
                {paymentDetails.customerPhone && <div style={{textAlign: 'center'}}>{paymentDetails.customerPhone}</div>}
                {paymentDetails.dueDate && (
                  <div style={{textAlign: 'center', marginTop: '2px', fontSize: '10px'}}>Due: {new Date(paymentDetails.dueDate).toLocaleDateString()}</div>
                )}
              </>
            )}
          </div>
          
          <table style={{width: '100%', borderCollapse: 'collapse', marginBottom: '12px', fontSize: sizeStyle.itemFont}}>
            <thead>
              <tr style={{borderBottom: '1px dashed #999', fontSize: sizeStyle.itemFont, fontWeight: 'bold'}}>
                <th style={{textAlign: 'left', padding: '6px 0'}}>Item</th>
                <th style={{textAlign: 'right', padding: '6px 0'}}>Qty</th>
                <th style={{textAlign: 'right', padding: '6px 0'}}>Price</th>
                <th style={{textAlign: 'right', padding: '6px 0'}}>Total</th>
              </tr>
            </thead>
            <tbody>
              {cart.map((c, i) => (
                <tr key={i} style={{borderBottom: '1px dashed #e5e7eb'}}>
                  <td style={{textAlign: 'left', padding: '6px 0', maxWidth: '120px', overflow: 'hidden', textOverflow: 'ellipsis'}}>{c.name}</td>
                  <td style={{textAlign: 'right', padding: '6px 0'}}>{c.qty}</td>
                  <td style={{textAlign: 'right', padding: '6px 0'}}>{settings?.currency || 'TSH'} {c.price.toLocaleString()}</td>
                  <td style={{textAlign: 'right', padding: '6px 0', fontWeight: 'bold'}}>{settings?.currency || 'TSH'} {(c.price * c.qty).toLocaleString()}</td>
                </tr>
              ))}
            </tbody>
          </table>
          
          <div style={{borderTop: '2px solid #000', borderBottom: '2px solid #000', padding: '8px 0', marginBottom: '12px'}}>
            <div style={{display: 'flex', justifyContent: 'space-between', fontWeight: 'bold', fontSize: '14px'}}>
              <span>GRAND TOTAL</span>
              <span>{settings?.currency || 'TSH'} {total.toLocaleString()}</span>
            </div>
          </div>
          
          <div style={{textAlign: 'center', fontSize: '10px', marginBottom: '8px', color: '#666'}}>
            {settings?.receiptFooter || 'Thank you for your business!'}
          </div>
          <div style={{textAlign: 'center', fontSize: '10px', color: '#666'}}>"We love to serve you"</div>
        </div>
        
        <div className="grid grid-cols-3 gap-4">
          <button onClick={onClose} className="btn btn-outline">
            Close
          </button>
          <button onClick={handlePrint} className="btn btn-primary">
            <PrinterIcon /> {mode === 'invoice' ? 'Print Invoice' : 'Print Receipt'}
          </button>
          <button onClick={handleSaveReceipt} className="btn btn-secondary">
            <PrinterIcon /> Save as {receiptFormat.toUpperCase()}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---------- Add Product Modal ---------- */
function AddProductModal({ initialBarcode, initialProduct, onCancel, onSave }) {
  const [barcode, setBarcode] = useState(initialProduct?.barcode || initialBarcode || "");
  const [name, setName] = useState(initialProduct?.name || "");
  const [price, setPrice] = useState(initialProduct?.price?.toString() || "");
  const [buyPrice, setBuyPrice] = useState(initialProduct?.buy_price?.toString() || "");
  const [opening, setOpening] = useState(initialProduct?.opening_stock?.toString() || "");
  const [reorderLevel, setReorderLevel] = useState(initialProduct?.reorder_level?.toString() || "");
  const [expirationDate, setExpirationDate] = useState(initialProduct?.expiration_date || "");
  const barcodeRef = useRef(null);

  useEffect(() => {
    if (barcodeRef.current) barcodeRef.current.focus();
  }, []);

  useEffect(() => {
    if (initialProduct) {
      setBarcode(initialProduct.barcode || "");
      setName(initialProduct.name || "");
      setPrice(initialProduct.price?.toString() || "");
      setBuyPrice(initialProduct.buy_price?.toString() || "");
      setOpening(initialProduct.opening_stock?.toString() || "");
      setReorderLevel(initialProduct.reorder_level?.toString() || "");
      setExpirationDate(initialProduct.expiration_date || "");

  }, [initialProduct]);
  
  const valid = barcode.trim() && name.trim() && !Number.isNaN(Number(price)) && Number(price) >= 0 && !Number.isNaN(Number(opening)) && Number(opening) >= 0 && !Number.isNaN(Number(buyPrice)) && Number(buyPrice) >= 0;

        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'12px',padding:'9px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="white" strokeWidth="2"/><path d="M12 8v8M8 12h8" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
            </div>
            <div>
              <h2 style={{color:'#fff',fontSize:'1.3rem',fontWeight:800,margin:0,letterSpacing:'-0.01em'}}>{initialProduct?'Edit Product':'Add New Product'}</h2>
              <p className="theme-header-subtext" style={{fontSize:'0.8rem',margin:0}}>Enter product details, pricing, and stock information</p>
            </div>
          </div>
          <button onClick={onCancel}
            style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'5px'}}
            onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
            onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
            Cancel
          </button>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'1.25rem 1.5rem'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.85rem'}}>
            <div>
              <label style={{display:'block',fontSize:'0.78rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.3rem'}}>Barcode *</label>
              <input ref={barcodeRef} value={barcode} onChange={(e)=>setBarcode(e.target.value)} disabled={!!initialProduct}

                style={{width:'100%',padding:'9px 12px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.9rem',color:'#334155',background:initialProduct?'#f8fafc':'#fff',boxSizing:'border-box'}} />
            </div>
            <div>
              <label style={{display:'block',fontSize:'0.78rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.3rem'}}>Product Name *</label>
              <input value={name} onChange={(e)=>setName(e.target.value)}
                placeholder="Enter product name"
                style={{width:'100%',padding:'9px 12px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.9rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />
            </div>
            <div>
              <label style={{display:'block',fontSize:'0.78rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.3rem'}}>Selling Price *</label>
              <input value={price} onChange={(e)=>setPrice(e.target.value)} type="number" min="0" step="0.01"
                placeholder="e.g., 2500"
                style={{width:'100%',padding:'9px 12px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.9rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />
            </div>
            <div>
              <label style={{display:'block',fontSize:'0.78rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.3rem'}}>Buying Price *</label>
              <input value={buyPrice} onChange={(e)=>setBuyPrice(e.target.value)} type="number" min="0" step="0.01"
                placeholder="e.g., 1800"
                style={{width:'100%',padding:'9px 12px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.9rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />

            <div>
              <label style={{display:'block',fontSize:'0.78rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.3rem'}}>Opening Stock *</label>

              <input value={reorderLevel} onChange={(e)=>setReorderLevel(e.target.value)} type="number" min="0"

                style={{width:'100%',padding:'9px 12px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.9rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />
            </div>
            <div style={{gridColumn:'span 2'}}>
              <label style={{display:'block',fontSize:'0.78rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.3rem'}}>Expiration Date (if applicable)</label>
              <input value={expirationDate} onChange={(e)=>setExpirationDate(e.target.value)} type="date"

            <button onClick={onCancel}
              style={{padding:'11px',borderRadius:'9px',border:'1px solid rgba(203,213,225,0.7)',background:'#fff',color:'#64748b',fontWeight:600,cursor:'pointer',fontSize:'0.9rem',transition:'background 0.15s'}}
              onMouseOver={e=>e.currentTarget.style.background='#f8fafc'}
              onMouseOut={e=>e.currentTarget.style.background='#fff'}>
              Cancel
            </button>
            <button disabled={!valid}
              onClick={()=>onSave({barcode:barcode.trim(),name:name.trim(),price:Number(price),buy_price:Number(buyPrice),opening_stock:Number(opening),items_sold:initialProduct?.items_sold??0,available_stock:initialProduct?initialProduct.available_stock:Number(opening),reorder_level:Number(reorderLevel)||0,expiration_date:expirationDate||"",batches:initialProduct?.batches||[]})}
              style={{padding:'11px',borderRadius:'9px',border:'none',
                background:valid?'linear-gradient(135deg,#059669,#10b981)':'#cbd5e1',
                color:'#fff',fontWeight:700,cursor:valid?'pointer':'not-allowed',fontSize:'0.9rem',
                boxShadow:valid?'0 4px 14px rgba(16,185,129,0.3)':'none',transition:'opacity 0.15s'}}
              onMouseOver={e=>{if(valid)e.currentTarget.style.opacity='0.9';}}
              onMouseOut={e=>e.currentTarget.style.opacity='1'}>
              {initialProduct?'Save Changes':'Save Product'}

        </div>
      </div>
    </div>
  );
}

/* ---------- Inventory Modal ---------- */
function InventoryModal({ products, onClose, onDeleteSelected, onDeleteAll, onOpenABC, onImportCSV, onEditProduct }) {
  const [query, setQuery] = useState("");
  const [checked, setChecked] = useState(new Set());
  const csvFileInputRef = useRef(null);

  const filtered = useMemo(() => {
    const q = query.toLowerCase();
    return products.filter(p =>
      (p.name || "").toLowerCase().includes(q) || String(p.barcode || "").includes(q)
    );
  }, [products, query]);

  function toggle(bc) {
    const next = new Set(checked);
    next.has(bc) ? next.delete(bc) : next.add(bc);
    setChecked(next);
  }

  const lowStockCount = products.filter(p => Number(p.reorder_level) > 0 && Number(p.available_stock) <= Number(p.reorder_level)).length;
  const outOfStockCount = products.filter(p => Number(p.available_stock) === 0).length;

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-2 z-50">
      <div className="glass-card rounded-2xl shadow-2xl w-full max-w-7xl max-h-[95vh] flex flex-col overflow-hidden" style={{background:'rgba(248,250,252,0.55)'}}>

        {/* Header */}
        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'12px',padding:'9px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="20" height="5" rx="1" stroke="white" strokeWidth="2"/><path d="M2 8v13h20V8" stroke="white" strokeWidth="2" strokeLinejoin="round"/><path d="M10 12h4M8 16h8" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
            </div>
            <div>
              <h2 style={{color:'#fff',fontSize:'1.3rem',fontWeight:800,margin:0,letterSpacing:'-0.01em'}}>Inventory</h2>
              <p className="theme-header-subtext" style={{fontSize:'0.8rem',margin:0}}>{products.length} products &nbsp;·&nbsp; {filtered.length} shown</p>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
            <input type="file" accept=".csv" className="hidden" ref={csvFileInputRef} onChange={(e)=>onImportCSV?.(e)} />
            {[
              {label:'ABC Analysis', onClick:onOpenABC},
              {label:'Import CSV', onClick:()=>csvFileInputRef.current?.click()},
              {label:'Export CSV', onClick:()=>{const csv=productsWithBatchesToCSV(products);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`products_${new Date().toISOString().split('T')[0]}.csv`;document.body.appendChild(a);a.click();document.body.removeChild(a);}},
            ].map(btn=>(
              <button key={btn.label} onClick={btn.onClick}
                style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',transition:'background 0.15s'}}
                onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
                onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}
              >{btn.label}</button>
            ))}
            <button onClick={onClose}
              style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'5px'}}
              onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
              onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}
            >
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
              Close
            </button>
          </div>
        </div>

        {/* KPI Strip */}
        <div style={{padding:'0.85rem 1.25rem 0',flexShrink:0}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'0.6rem'}}>
            {[
              {label:'Total Products',  value:products.length,              accent:'#60a5fa', bg:'rgba(96,165,250,0.1)'},
              {label:'Filtered View',   value:filtered.length,              accent:'#a78bfa', bg:'rgba(167,139,250,0.1)'},
              {label:'Low Stock',       value:lowStockCount,                accent:'#f97316', bg:'rgba(249,115,22,0.1)'},
              {label:'Out of Stock',    value:outOfStockCount,              accent:'#ef4444', bg:'rgba(239,68,68,0.1)'},
            ].map((k,i)=>(
              <div key={i} style={{background:'#fff',borderRadius:'12px',padding:'0.7rem 1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 1px 6px rgba(15,23,42,0.04)'}}>
                <div style={{fontSize:'0.68rem',color:'#94a3b8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.25rem'}}>{k.label}</div>
                <div style={{fontSize:'1rem',fontWeight:800,color:k.accent}}>{k.value}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Search + Actions */}
        <div style={{padding:'0.75rem 1.25rem',flexShrink:0,display:'flex',alignItems:'center',gap:'0.6rem'}}>
          <div style={{position:'relative',flex:1}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style={{position:'absolute',left:'10px',top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}><circle cx="11" cy="11" r="8" stroke="#94a3b8" strokeWidth="2"/><path d="M21 21l-4.35-4.35" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round"/></svg>
            <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search by name or barcode…"
              style={{width:'100%',padding:'7px 10px 7px 32px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.88rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />
          </div>
          <button onClick={()=>{if(checked.size===0)return alert('Select items first.');if(!confirm(`Delete ${checked.size} product(s)?`))return;onDeleteSelected(Array.from(checked));setChecked(new Set());}}
            style={{background:checked.size>0?'rgba(239,68,68,0.1)':'rgba(203,213,225,0.3)',border:`1px solid ${checked.size>0?'rgba(239,68,68,0.3)':'rgba(203,213,225,0.5)'}`,borderRadius:'8px',padding:'7px 14px',color:checked.size>0?'#dc2626':'#94a3b8',fontWeight:600,cursor:'pointer',fontSize:'0.85rem',whiteSpace:'nowrap'}}>
            Delete Selected {checked.size>0?`(${checked.size})`:''}
          </button>
          <button onClick={()=>{if(!confirm('Delete ALL products? Cannot be undone.'))return;onDeleteAll();}}
            style={{background:'rgba(239,68,68,0.07)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'8px',padding:'7px 14px',color:'#dc2626',fontWeight:600,cursor:'pointer',fontSize:'0.85rem',whiteSpace:'nowrap'}}>
            Delete All
          </button>
        </div>

        {/* Table */}
        <div className="flex-1 overflow-y-auto" style={{padding:'0 1.25rem 1.25rem',minHeight:0}}>
          <div style={{background:'#fff',borderRadius:'14px',border:'1px solid rgba(203,213,225,0.5)',overflow:'hidden',boxShadow:'0 1px 8px rgba(15,23,42,0.04)'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.875rem'}}>
              <thead>
                <tr style={{background:'linear-gradient(90deg,#f8fafc,#f1f5f9)'}}>
                  <th style={{padding:'0.75rem 1rem',width:'44px'}}>
                    <input type="checkbox" onChange={e=>{if(e.target.checked)setChecked(new Set(filtered.map(p=>p.barcode)));else setChecked(new Set());}} />
                  </th>
                  {['Barcode','Product Name','Price','In Stock','Reorder Lvl','Expiry','Actions'].map((h,i)=>(
                    <th key={h} style={{padding:'0.75rem 1rem',textAlign:i>=2&&i<=4?'right':i===6?'center':'left',fontWeight:700,color:'#475569',fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.04em',borderBottom:'1px solid rgba(203,213,225,0.6)',whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(p=>{
                  const stock = Number(p.available_stock);
                  const reorder = Number(p.reorder_level);
                  const isLow = reorder>0 && stock<=reorder;
                  const isOut = stock===0;
                  return (
                    <tr key={p.barcode} style={{borderTop:'1px solid rgba(203,213,225,0.3)',background:isOut?'rgba(239,68,68,0.02)':isLow?'rgba(249,115,22,0.02)':'transparent',transition:'background 0.12s'}}
                      onMouseOver={e=>e.currentTarget.style.background='rgba(37,99,235,0.03)'}
                      onMouseOut={e=>e.currentTarget.style.background=isOut?'rgba(239,68,68,0.02)':isLow?'rgba(249,115,22,0.02)':'transparent'}
                    >
                      <td style={{padding:'0.65rem 1rem',textAlign:'center'}}><input type="checkbox" checked={checked.has(p.barcode)} onChange={()=>toggle(p.barcode)} /></td>
                      <td style={{padding:'0.65rem 1rem',fontFamily:'ui-monospace,monospace',fontSize:'0.78rem',color:'#64748b'}}>{p.barcode}</td>
                      <td style={{padding:'0.65rem 1rem',fontWeight:600,color:'#1e293b'}}>{p.name}</td>
                      <td style={{padding:'0.65rem 1rem',textAlign:'right',fontWeight:700,color:'#059669'}}>{Number(p.price).toLocaleString()}</td>
                      <td style={{padding:'0.65rem 1rem',textAlign:'right'}}>
                        <span style={{fontWeight:700,color:isOut?'#dc2626':isLow?'#ea580c':'#1e293b'}}>{stock.toLocaleString()}</span>
                        {(isOut||isLow)&&<span style={{marginLeft:'6px',fontSize:'0.68rem',fontWeight:700,padding:'1px 5px',borderRadius:'4px',background:isOut?'rgba(239,68,68,0.12)':'rgba(249,115,22,0.12)',color:isOut?'#dc2626':'#ea580c'}}>{isOut?'OUT':'LOW'}</span>}
                      </td>
                      <td style={{padding:'0.65rem 1rem',textAlign:'right',color:'#64748b'}}>{reorder>0?reorder.toLocaleString():'—'}</td>
                      <td style={{padding:'0.65rem 1rem',color:'#475569',fontSize:'0.82rem'}}>{p.expiration_date?formatDate(p.expiration_date):'—'}</td>
                      <td style={{padding:'0.65rem 1rem',textAlign:'center'}}>
                        <div style={{display:'flex',justifyContent:'center',gap:'0.4rem'}}>
                          <button onClick={()=>onEditProduct?.(p)}
                            style={{background:'rgba(37,99,235,0.08)',border:'1px solid rgba(37,99,235,0.2)',borderRadius:'6px',padding:'4px 12px',color:'#2563eb',fontWeight:600,cursor:'pointer',fontSize:'0.8rem'}}>Edit</button>
                          <button onClick={()=>{if(!confirm(`Delete "${p.name}"?`))return;onDeleteSelected([p.barcode]);const n=new Set(checked);n.delete(p.barcode);setChecked(n);}}
                            style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'6px',padding:'4px 12px',color:'#dc2626',fontWeight:600,cursor:'pointer',fontSize:'0.8rem'}}>Delete</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
                {filtered.length===0&&<tr><td colSpan="8" style={{padding:'3rem',textAlign:'center',color:'#94a3b8'}}>No products match your search.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Stock History Modal ---------- */
function StockHistoryModal({ stockLog, onClose, onDownload }) {
  const [query, setQuery] = useState("");
  const [from, setFrom] = useState("");
  const [to, setTo] = useState("");

  const rows = useMemo(() => {
    return stockLog.filter(r => {
      const hit = String(r.barcode || "").includes(query) || String(r.name || "").toLowerCase().includes(String(query || "").toLowerCase());
      if (!hit) return false;
      const t = new Date(r.timestamp).getTime();
      const okFrom = from ? t >= new Date(from + "T00:00:00").getTime() : true;
      const okTo = to ? t < new Date(to + "T23:59:59").getTime() : true;
      return okFrom && okTo;
    });
  }, [stockLog, query, from, to]);

  const totalQtyAdded = rows.reduce((s,r)=>s+Number(r.qty),0);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-2 z-50">
      <div className="glass-card rounded-2xl shadow-2xl w-full max-w-6xl max-h-[95vh] flex flex-col overflow-hidden" style={{background:'rgba(248,250,252,0.55)'}}>
        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'12px',padding:'9px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="white" strokeWidth="2.2" strokeLinecap="round"/></svg>
            </div>
            <div>
              <h2 style={{color:'#fff',fontSize:'1.3rem',fontWeight:800,margin:0}}>Stock History</h2>
              <p className="theme-header-subtext" style={{fontSize:'0.8rem',margin:0}}>{rows.length} entries &nbsp;·&nbsp; {totalQtyAdded.toLocaleString()} units added</p>
            </div>
          </div>
          <div style={{display:'flex',gap:'0.5rem'}}>
            <button onClick={onDownload}
              style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem'}}
              onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
              onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}
            >Download CSV</button>
            <button onClick={onClose}
              style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'5px'}}
              onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
              onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}
            ><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg> Close</button>
          </div>
        </div>
        <div style={{padding:'0.75rem 1.25rem',flexShrink:0,display:'flex',flexWrap:'wrap',alignItems:'center',gap:'0.6rem'}}>
          <div style={{position:'relative',flex:1,minWidth:'200px'}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style={{position:'absolute',left:'10px',top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}><circle cx="11" cy="11" r="8" stroke="#94a3b8" strokeWidth="2"/><path d="M21 21l-4.35-4.35" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round"/></svg>
            <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search by name or barcode…"
              style={{width:'100%',padding:'7px 10px 7px 32px',border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',fontSize:'0.88rem',color:'#334155',background:'#fff',boxSizing:'border-box'}} />
          </div>
          {[{label:'From',val:from,set:setFrom},{label:'To',val:to,set:setTo}].map(f=>(
            <div key={f.label} style={{display:'flex',alignItems:'center',gap:'6px'}}>
              <span style={{fontSize:'0.8rem',fontWeight:600,color:'#64748b'}}>{f.label}:</span>
              <input type="date" value={f.val} onChange={e=>f.set(e.target.value)}
                style={{border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',padding:'6px 10px',fontSize:'0.85rem',color:'#334155',background:'#fff'}} />
            </div>
          ))}
        </div>
        <div className="flex-1 overflow-y-auto" style={{padding:'0 1.25rem 1.25rem',minHeight:0}}>
          <div style={{background:'#fff',borderRadius:'14px',border:'1px solid rgba(203,213,225,0.5)',overflow:'hidden',boxShadow:'0 1px 8px rgba(15,23,42,0.04)'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.875rem'}}>
              <thead><tr style={{background:'linear-gradient(90deg,#f8fafc,#f1f5f9)'}}>
                {['Date & Time','User','Barcode','Product','Qty Added'].map((h,i)=>(
                  <th key={h} style={{padding:'0.75rem 1rem',textAlign:i===4?'right':'left',fontWeight:700,color:'#475569',fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.04em',borderBottom:'1px solid rgba(203,213,225,0.6)',whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {rows.map((r,i)=>(
                  <tr key={i} style={{borderTop:'1px solid rgba(203,213,225,0.3)',transition:'background 0.12s'}}
                    onMouseOver={e=>e.currentTarget.style.background='rgba(37,99,235,0.03)'}
                    onMouseOut={e=>e.currentTarget.style.background='transparent'}
                  >
                    <td style={{padding:'0.65rem 1rem',color:'#475569',whiteSpace:'nowrap',fontSize:'0.82rem'}}>{new Date(r.timestamp).toLocaleString()}</td>
                    <td style={{padding:'0.65rem 1rem',fontWeight:600,color:'#1e293b'}}>{r.user||'—'}</td>
                    <td style={{padding:'0.65rem 1rem',fontFamily:'ui-monospace,monospace',fontSize:'0.78rem',color:'#64748b'}}>{r.barcode}</td>
                    <td style={{padding:'0.65rem 1rem',color:'#334155'}}>{r.name}</td>
                    <td style={{padding:'0.65rem 1rem',textAlign:'right',fontWeight:700,color:'#059669'}}>{Number(r.qty).toLocaleString()}</td>
                  </tr>
                ))}
                {rows.length===0&&<tr><td colSpan="5" style={{padding:'3rem',textAlign:'center',color:'#94a3b8'}}>No stock history records found.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Sales History Modal ---------- */
function SalesHistoryModal({ sales, products, credits, onClose, onDownload, onOpenAnalytics, onOpenCredits, onOpenABC, settings }) {
  const [reportType, setReportType] = useState("all");
  const [startDate, setStartDate] = useState("");
  const [endDate, setEndDate] = useState("");
  const [selectedDay, setSelectedDay] = useState(""); // for calendar/day filter
  const [userFilter, setUserFilter] = useState("all");
  const [expandedReceipts, setExpandedReceipts] = useState(new Set());
  const [viewingReceipt, setViewingReceipt] = useState(null);
  const tableRef = useRef(null);

  // derive list of users that appear in the sales data so the dropdown can be populated
  const usersInSales = useMemo(() => {
    const setU = new Set();
    sales.forEach(s => { if (s.user) setU.add(s.user); });
    return Array.from(setU);
  }, [sales]);

  const handleDownloadPDF = () => {
    if (tableRef.current) {
      const savePdf = () => {
        window.html2pdf().from(tableRef.current).set({
          margin: 1,
          filename: `sales_${userFilter !== "all" ? userFilter : "all"}_${new Date().toISOString().split('T')[0]}.pdf`
        }).save();
      };
      if (!window.html2pdf) {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js';
        s.onload = savePdf;
        document.body.appendChild(s);
      } else {
        savePdf();
      }
    }
  };

  const filteredSales = useMemo(() => {
    // if user picked a specific day via calendar input, override other filters
    if (selectedDay) {
      const from = new Date(selectedDay);
      const to = new Date(selectedDay + "T23:59:59");
      let arr = sales.filter(s => {
        const date = new Date(s.timestamp);
        return date >= from && date <= to;
      });
      if (userFilter !== "all") {
        arr = arr.filter(s => s.user === userFilter);
      }
      return arr;
    }

    const now = new Date();
    let from, to;

    switch (reportType) {
      case "daily":
        from = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        to = new Date(from.getTime() + 24 * 60 * 60 * 1000);
        break;
      case "weekly":
        from = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        to = now;
        break;
      case "monthly":
        from = new Date(now.getFullYear(), now.getMonth(), 1);
        to = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        break;
      case "yearly":
        from = new Date(now.getFullYear(), 0, 1);
        to = new Date(now.getFullYear() + 1, 0, 0);
        break;
      case "custom":
        from = startDate ? new Date(startDate) : new Date(0);
        to = endDate ? new Date(endDate + "T23:59:59") : new Date();
        break;
      default:
        return sales;
    }

    return sales.filter(s => {
      const date = new Date(s.timestamp);
      if (date < from || date > to) return false;
      if (userFilter !== "all" && s.user !== userFilter) return false;
      return true;
    });
  }, [sales, reportType, startDate, endDate, selectedDay, userFilter]);

  // Group sales by receipt number
  const groupedSales = useMemo(() => {
    const groups = new Map();
    filteredSales.forEach(sale => {
      const key = sale.receipt_number;
      if (!groups.has(key)) {
        groups.set(key, {
          receipt_number: key,
          timestamp: sale.timestamp,
          payment_method: sale.payment_method,
          user: sale.user,
          teller_number: sale.teller_number,
          items: [],
          total: 0,
          itemCount: 0
        });
      }
      const group = groups.get(key);
      group.items.push(sale);
      group.total += sale.total;
      group.itemCount += sale.quantity;
    });
    return Array.from(groups.values()).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  }, [filteredSales]);

  const toggleReceiptExpansion = (receiptNumber) => {
    const newExpanded = new Set(expandedReceipts);
    if (newExpanded.has(receiptNumber)) {
      newExpanded.delete(receiptNumber);
    } else {
      newExpanded.add(receiptNumber);
    }
    setExpandedReceipts(newExpanded);
  };

  const totalRevenue = useMemo(() => filteredSales.reduce((sum, sale) => sum + sale.total, 0), [filteredSales]);

  // when filtering by user, compute breakdown of products they sold
  const productsSold = useMemo(() => {
    const map = new Map();
    filteredSales.forEach(s => {
      const key = s.barcode || s.name;
      const existing = map.get(key) || { name: s.name, barcode: s.barcode, qty: 0, total: 0 };
      existing.qty += Number(s.quantity || s.qty || 0);
      existing.total += Number(s.total || 0);
      map.set(key, existing);
    });
    return Array.from(map.values());
  }, [filteredSales]);

  const downloadFilteredCSV = () => {
    const csv = salesToCSV(filteredSales);
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `sales_${new Date().toISOString().split('T')[0]}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    if (onDownload) onDownload();
  };

  const currency = settings?.currency || 'TSH';
  const cashTotal = filteredSales.filter(s => s.payment_method === 'cash').reduce((sum, s) => sum + s.total, 0);
  const creditTotal = filteredSales.filter(s => s.payment_method === 'credit').reduce((sum, s) => sum + s.total, 0);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-2 z-50">
      <div className="glass-card page-modal rounded-2xl shadow-2xl w-full max-w-7xl max-h-[95vh] flex flex-col overflow-hidden" style={{background: 'rgba(248,250,252,0.55)'}}>

        {/* Header */}
        <div className="theme-dark-surface flex items-center justify-between px-6 py-4 rounded-t-2xl flex-shrink-0">
          <div className="flex items-center gap-3">
            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'12px',padding:'9px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
            <div>
              <h2 style={{color:'#fff',fontSize:'1.3rem',fontWeight:800,margin:0,letterSpacing:'-0.01em'}}>Sales History</h2>
              <p className="theme-header-subtext" style={{fontSize:'0.8rem',margin:0}}>{groupedSales.length} receipts &nbsp;·&nbsp; {currency}</p>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
            {[
              {label:'ABC', onClick:onOpenABC},
              {label:'Analytics', onClick:onOpenAnalytics},
              {label:'Credits', onClick:onOpenCredits},
              {label:'CSV', onClick:downloadFilteredCSV},
              {label:'PDF', onClick:handleDownloadPDF},
            ].map(btn => (
              <button key={btn.label} onClick={btn.onClick}
                style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',transition:'background 0.15s'}}
                onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
                onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}
              >{btn.label}</button>
            ))}
            <button onClick={onClose}
              style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'8px',padding:'6px 14px',color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'5px'}}
              onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'}
              onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}
            >
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
              Close
            </button>
          </div>
        </div>

        {/* KPI Strip */}
        <div style={{padding:'0.85rem 1.25rem 0',flexShrink:0}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'0.6rem'}}>
            {[
              {label:'Total Revenue',   value:`${currency} ${totalRevenue.toLocaleString()}`,            accent:'#10b981', bg:'rgba(16,185,129,0.1)'},
              {label:'Cash Revenue',    value:`${currency} ${cashTotal.toLocaleString()}`,               accent:'#34d399', bg:'rgba(52,211,153,0.1)'},
              {label:'Credit Revenue',  value:`${currency} ${creditTotal.toLocaleString()}`,             accent:'#f97316', bg:'rgba(249,115,22,0.1)'},
              {label:'Receipts',        value:groupedSales.length.toLocaleString(),                      accent:'#60a5fa', bg:'rgba(96,165,250,0.1)'},
            ].map((k,i) => (
              <div key={i} style={{background:'#fff',borderRadius:'12px',padding:'0.7rem 1rem',border:'1px solid rgba(203,213,225,0.5)',boxShadow:'0 1px 6px rgba(15,23,42,0.04)'}}>
                <div style={{fontSize:'0.68rem',color:'#94a3b8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'0.25rem'}}>{k.label}</div>
                <div style={{fontSize:'1rem',fontWeight:800,color:k.accent}}>{k.value}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Filters */}
        <div style={{padding:'0.75rem 1.25rem',flexShrink:0,display:'flex',flexWrap:'wrap',alignItems:'center',gap:'0.6rem'}}>
          <input type="date" value={selectedDay} onChange={(e) => { const d=e.target.value; setSelectedDay(d); if(d){setReportType('custom');setStartDate(d);setEndDate(d);}}}
            style={{border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',padding:'6px 10px',fontSize:'0.85rem',color:'#334155',background:'#fff',cursor:'pointer'}} title="Pick a day" />
          <select value={reportType} onChange={(e)=>{setReportType(e.target.value);if(e.target.value!=='custom')setSelectedDay('');}}
            style={{border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',padding:'6px 10px',fontSize:'0.85rem',color:'#334155',background:'#fff',cursor:'pointer'}}>
            <option value="all">All Time</option>
            <option value="daily">Today</option>
            <option value="weekly">Last 7 Days</option>
            <option value="monthly">This Month</option>
            <option value="yearly">This Year</option>
            <option value="custom">Custom Range</option>
          </select>
          <select value={userFilter} onChange={(e)=>setUserFilter(e.target.value)}
            style={{border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',padding:'6px 10px',fontSize:'0.85rem',color:'#334155',background:'#fff',cursor:'pointer'}}>
            <option value="all">All Users</option>
            {usersInSales.map(u => <option key={u} value={u}>{u}</option>)}
          </select>
          {reportType === "custom" && (<>
            <input type="date" value={startDate} onChange={(e)=>setStartDate(e.target.value)}
              style={{border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',padding:'6px 10px',fontSize:'0.85rem',color:'#334155',background:'#fff'}} />
            <input type="date" value={endDate} onChange={(e)=>setEndDate(e.target.value)}
              style={{border:'1px solid rgba(203,213,225,0.7)',borderRadius:'8px',padding:'6px 10px',fontSize:'0.85rem',color:'#334155',background:'#fff'}} />
          </>)}
        </div>

        {/* Content */}
        <div className="flex-1 overflow-y-auto" style={{padding:'0 1.25rem 1.25rem',minHeight:0}}>
          {userFilter !== "all" && productsSold.length > 0 && (
            <div style={{marginBottom:'1rem',background:'#fff',borderRadius:'14px',border:'1px solid rgba(203,213,225,0.5)',overflow:'hidden',boxShadow:'0 1px 8px rgba(15,23,42,0.04)'}}>
              <div style={{padding:'0.75rem 1rem',borderBottom:'1px solid rgba(203,213,225,0.4)',background:'linear-gradient(90deg,#f8fafc,#f1f5f9)'}}>
                <span style={{fontWeight:700,fontSize:'0.88rem',color:'#0f172a'}}>Products sold by {userFilter}</span>
              </div>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.85rem'}}>
                <thead><tr style={{background:'#f8fafc'}}>
                  <th style={{padding:'0.6rem 1rem',textAlign:'left',fontWeight:700,color:'#64748b',fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.04em'}}>Product</th>
                  <th style={{padding:'0.6rem 1rem',textAlign:'right',fontWeight:700,color:'#64748b',fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.04em'}}>Qty</th>
                  <th style={{padding:'0.6rem 1rem',textAlign:'right',fontWeight:700,color:'#64748b',fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.04em'}}>Revenue</th>
                </tr></thead>
                <tbody>
                  {productsSold.map((p,idx) => (
                    <tr key={idx} style={{borderTop:'1px solid rgba(203,213,225,0.3)'}}>
                      <td style={{padding:'0.6rem 1rem',fontWeight:500,color:'#1e293b'}}>{p.name}</td>
                      <td style={{padding:'0.6rem 1rem',textAlign:'right',color:'#475569'}}>{p.qty}</td>
                      <td style={{padding:'0.6rem 1rem',textAlign:'right',fontWeight:700,color:'#059669'}}>{currency} {p.total.toLocaleString()}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          <div style={{background:'#fff',borderRadius:'14px',border:'1px solid rgba(203,213,225,0.5)',overflow:'hidden',boxShadow:'0 1px 8px rgba(15,23,42,0.04)'}}>
            <table ref={tableRef} style={{width:'100%',borderCollapse:'collapse',fontSize:'0.875rem'}}>
              <thead>
                <tr style={{background:'linear-gradient(90deg,#f8fafc,#f1f5f9)'}}>
                  {['Receipt #','Date & Time','Items','Qty','Total','Payment','Actions'].map((h,i) => (
                    <th key={h} style={{padding:'0.75rem 1rem',textAlign:i>=3&&i<=4?'right':i===6?'center':'left',fontWeight:700,color:'#475569',fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.04em',borderBottom:'1px solid rgba(203,213,225,0.6)',whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {groupedSales.map((receipt) => (
                  <React.Fragment key={receipt.receipt_number}>
                    <tr style={{borderTop:'1px solid rgba(203,213,225,0.3)',transition:'background 0.12s'}}
                      onMouseOver={e=>e.currentTarget.style.background='rgba(37,99,235,0.03)'}
                      onMouseOut={e=>e.currentTarget.style.background='transparent'}
                    >
                      <td style={{padding:'0.7rem 1rem',fontFamily:'ui-monospace,monospace',fontSize:'0.8rem',color:'#475569',fontWeight:600}}>{receipt.receipt_number}</td>
                      <td style={{padding:'0.7rem 1rem',color:'#334155',whiteSpace:'nowrap'}}>{new Date(receipt.timestamp).toLocaleString()}</td>
                      <td style={{padding:'0.7rem 1rem'}}>
                        <button onClick={()=>toggleReceiptExpansion(receipt.receipt_number)}
                          style={{display:'inline-flex',alignItems:'center',gap:'5px',background:'rgba(37,99,235,0.06)',border:'1px solid rgba(37,99,235,0.18)',borderRadius:'6px',padding:'3px 8px',color:'#2563eb',fontSize:'0.8rem',fontWeight:600,cursor:'pointer'}}>
                          {expandedReceipts.has(receipt.receipt_number)?'▼':'▶'} {receipt.items.length} item{receipt.items.length!==1?'s':''}
                        </button>
                      </td>
                      <td style={{padding:'0.7rem 1rem',textAlign:'right',color:'#475569',fontWeight:500}}>{receipt.itemCount}</td>
                      <td style={{padding:'0.7rem 1rem',textAlign:'right',fontWeight:700,color:'#059669'}}>{currency} {receipt.total.toLocaleString()}</td>
                      <td style={{padding:'0.7rem 1rem'}}>
                        <span style={{display:'inline-block',padding:'3px 10px',borderRadius:'99px',fontSize:'0.73rem',fontWeight:700,
                          background: receipt.payment_method==='cash'?'rgba(16,185,129,0.12)':receipt.payment_method==='credit'?'rgba(249,115,22,0.12)':'rgba(139,92,246,0.12)',
                          color: receipt.payment_method==='cash'?'#059669':receipt.payment_method==='credit'?'#ea580c':'#7c3aed',
                          border:`1px solid ${receipt.payment_method==='cash'?'rgba(16,185,129,0.3)':receipt.payment_method==='credit'?'rgba(249,115,22,0.3)':'rgba(139,92,246,0.3)'}`
                        }}>
                          {(receipt.payment_method||'cash').toUpperCase()}
                        </span>
                      </td>
                      <td style={{padding:'0.7rem 1rem',textAlign:'center'}}>
                        <button onClick={()=>setViewingReceipt(receipt)}
                          style={{background:'rgba(37,99,235,0.08)',border:'1px solid rgba(37,99,235,0.2)',borderRadius:'7px',padding:'5px 12px',color:'#2563eb',fontWeight:600,cursor:'pointer',fontSize:'0.8rem',transition:'all 0.15s'}}
                          onMouseOver={e=>{e.currentTarget.style.background='rgba(37,99,235,0.15)'}}
                          onMouseOut={e=>{e.currentTarget.style.background='rgba(37,99,235,0.08)'}}>
                          View Receipt
