                };
                
                renderPosContent();
            }

            // ==================== PRODUCTS PAGE ====================
            const PM_PAGE_SIZE = 30;
            let pmPage = 1;
            function renderProductsMobile(resetPage = true) {
                if (resetPage) pmPage = 1;
                if (!isManager()) {
                    showToast('Manager only', 'error');
                    renderPosMobile();
                    return;
                }

                const supplierOptions = [{ value: '', label: 'No supplier' }, ...suppliers.map(supplier => ({ value: supplier.id, label: supplier.name }))];

                const totalProducts = products.length;
                const totalStockValue = products.reduce((sum, p) => sum + (Number(p.sellPrice || 0) * Number(p.stock || 0)), 0);
                const lowStockCount = products.filter(p => Number(p.stock || 0) <= Number(p.minStock || 0) && Number(p.stock || 0) > 0).length;
                const outOfStockCount = products.filter(p => Number(p.stock || 0) <= 0).length;

                let html = `
                    <div style="padding: 0.2rem 0;">
                        <div class="pm-header">
                            <h3><i class="fas fa-cubes icon-one"></i> ${__('productTitle')}</h3>
                            <div class="pm-header-actions">
                                <button class="btn-small analytics-ghost-btn" id="stockTakeBtn" style="min-height:auto; padding:0.6rem 0.9rem;"><i class="fas fa-clipboard-list"></i> Stock Take</button>
                                <button class="btn-small analytics-ghost-btn" id="addSupplierBtn" style="min-height:auto; padding:0.6rem 0.9rem;"><i class="fas fa-truck"></i> Supplier</button>
                                <button class="btn-small" id="addProdBtn" style="min-height:auto; padding:0.6rem 0.9rem;"><i class="fas fa-plus"></i> ${__('addProduct')}</button>
                            </div>
                        </div>

                        <div class="pm-stats">
                            <div class="pm-stat-card">
                                <div class="pm-stat-value">${totalProducts}</div>
                                <div class="pm-stat-label">Products</div>
                            </div>
                            <div class="pm-stat-card profit">
                                <div class="pm-stat-value">${formatMoney(totalStockValue)}</div>
                                <div class="pm-stat-label">Stock Value</div>
                            </div>
                            <div class="pm-stat-card warning">
                                <div class="pm-stat-value">${lowStockCount + outOfStockCount}</div>
                                <div class="pm-stat-label">Low / Out</div>
                            </div>
                        </div>

                        <div class="pm-search">
                            <i class="fas fa-search" style="color:#94a3b8;"></i>
                            <input type="text" id="pmSearchInput" placeholder="Search products...">
                        </div>

                        <div id="pmProductList">
                `;
                
                if (products.length === 0) {
                    html += `<div style="text-align:center;padding:3rem 1rem;color:#94a3b8;"><i class="fas fa-box-open" style="font-size:3rem;margin-bottom:0.8rem;display:block;opacity:0.4;"></i><p style="font-size:0.95rem;font-weight:600;margin-bottom:0.4rem;">Your catalog is empty</p><p style="font-size:0.82rem;margin-bottom:1.2rem;">Add your first product to start managing inventory.</p><button class="btn-small" id="addFirstProdBtn" style="padding:0.7rem 1.4rem;"><i class="fas fa-plus"></i> Add First Product</button></div>`;
                }

                const pagedProducts = products.slice(0, pmPage * PM_PAGE_SIZE);
                const hasMore = products.length > pagedProducts.length;
                pagedProducts.forEach(p => {
                    const imgHtml = p.image ?
                        `<img src="${p.image}">` :
                        '<i class="fas fa-box" style="font-size:1.4rem; color:#06c6d4;"></i>';
                    
                    const profit = Number(p.sellPrice || 0) - Number(p.buyPrice || 0);
                    const profitClass = profit < 0 ? 'negative' : '';
                    const stock = Number(p.stock || 0);
                    const minStock = Number(p.minStock || 0);
                    const stockClass = stock <= 0 ? 'out' : stock <= minStock ? 'low' : '';
                    const stockLabel = stock <= 0 ? 'Out of stock' : `${stock} in stock`;
                    
                    html += `
                        <div class="pm-card" data-name="${(p.name || '').toLowerCase()}" data-cat="${(p.category || '').toLowerCase()}">
                            <div class="pm-card-top">
                                <div class="pm-card-img">${imgHtml}</div>
                                <div class="pm-card-body">
                                    <div class="pm-card-name">${p.name} ${p.favorite ? '<i class="fas fa-star"></i>' : ''}</div>
                                    <div class="pm-card-meta">${p.category || 'General'}${p.barcode ? ` · ${p.barcode}` : ''}${p.supplierName ? ` · ${p.supplierName}` : ''}</div>
                                    <div class="pm-card-pricing">
                                        <span class="pm-card-sell">${formatMoney(p.sellPrice)}</span>
                                        <span class="pm-card-buy">Cost ${formatMoney(p.buyPrice)}</span>
                                        <span class="pm-card-profit ${profitClass}">${profit >= 0 ? '+' : ''}${formatMoney(profit)}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="pm-card-bottom">
                                <div style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap;">
                                    <span class="pm-stock-pill ${stockClass}"><i class="fas ${stock <= 0 ? 'fa-exclamation-circle' : stock <= minStock ? 'fa-exclamation-triangle' : 'fa-cubes'}"></i> ${stockLabel}</span>
                                    ${minStock > 0 ? `<span style="font-size:0.65rem; color:#94a3b8;">Min: ${minStock}</span>` : ''}
                                    ${p.variants?.length ? `<span style="font-size:0.65rem; color:#94a3b8;">${p.variants.length} variant${p.variants.length > 1 ? 's' : ''}</span>` : ''}
                                </div>
                                <div class="pm-card-actions">
                                    <button class="analytics-ghost-btn btn-small stock-intake-btn" data-id="${p.id}" style="padding:0.5rem 0.7rem; min-height:auto; font-size:0.7rem;"><i class="fas fa-plus"></i> Stock</button>
                                    <button class="analytics-ghost-btn btn-small stock-adjust-btn" data-id="${p.id}" style="padding:0.5rem 0.7rem; min-height:auto; font-size:0.7rem;"><i class="fas fa-sliders"></i> Adjust</button>
                                    <button class="analytics-ghost-btn btn-small create-po-btn" data-id="${p.id}" style="padding:0.5rem 0.7rem; min-height:auto; font-size:0.7rem;"><i class="fas fa-file-invoice"></i> PO</button>
                                    <button class="analytics-ghost-btn btn-small product-edit-btn" data-id="${p.id}" style="padding:0.5rem 0.7rem; min-height:auto; font-size:0.7rem;"><i class="fas fa-pen"></i> Edit</button>
                                    <button class="analytics-ghost-btn btn-small product-qr-btn" data-id="${p.id}" style="padding:0.5rem 0.7rem; min-height:auto; font-size:0.7rem;"><i class="fas fa-qrcode"></i></button>
                                    <button class="btn-small product-delete-btn" data-id="${p.id}" style="padding:0.5rem 0.7rem; min-height:auto; font-size:0.7rem; background:var(--color-danger-bg); color:var(--color-danger); border:1px solid rgba(239,68,68,0.3); box-shadow:none;"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                if (hasMore) {
                    html += `<div style="text-align:center;padding:1rem 0;"><button class="btn-small analytics-ghost-btn" id="pmLoadMoreBtn" style="padding:0.7rem 1.8rem;"><i class="fas fa-chevron-down icon-one"></i> Load more (${products.length - pagedProducts.length} remaining)</button></div>`;
                }

                html += `
                        </div>
                    </div>
                `;

                document.getElementById('mobileContent').innerHTML = html;

                // Product search filter
                const pmSearch = document.getElementById('pmSearchInput');
                if (pmSearch) {
                    pmSearch.addEventListener('input', () => {
                        const q = pmSearch.value.toLowerCase();
                        document.querySelectorAll('.pm-card').forEach(card => {
                            const match = card.dataset.name.includes(q) || card.dataset.cat.includes(q);
                            card.style.display = match ? '' : 'none';
                        });
                    });
                }

                // Pagination: load more button
                document.getElementById('pmLoadMoreBtn')?.addEventListener('click', () => {
                    pmPage++;
                    renderProductsMobile(false);
                    document.getElementById('mobileContent')?.scrollTo(0, 99999);
                });

                document.getElementById('stockTakeBtn')?.addEventListener('click', () => {
                    showStockTakeModal();
                });

                document.getElementById('addSupplierBtn')?.addEventListener('click', () => {
                    showEnhancedModal({
                        title: 'New supplier',
                        fields: [
                            { name: 'name', placeholder: 'Supplier name' },
                            { name: 'contact', placeholder: 'Contact person' },
                            { name: 'phone', placeholder: 'Phone number' },
                            { name: 'notes', placeholder: 'Notes' }
                        ],
                        onConfirm: data => {
                            suppliers.unshift({
                                id: `s${Date.now()}`,
                                name: data.name || 'Supplier',
                                contact: data.contact || '',
                                phone: data.phone || '',
                                notes: data.notes || '',
                                createdAt: new Date().toISOString()
                            });
                            saveSuppliers();
                            recordAudit('supplier-created', `Supplier ${data.name || 'Supplier'} created`);
                            renderProductsMobile();
                        }
                    });
                });
                
                document.getElementById('addFirstProdBtn')?.addEventListener('click', () => document.getElementById('addProdBtn')?.click());

                document.getElementById('addProdBtn').addEventListener('click', () => {
                    showEnhancedModal({
                        title: __('newProduct'),
                        withImage: true,
                        imageLabel: __('productImage'),
                        fields: [
                            { name: 'name', placeholder: __('productName') },
                            { name: 'buyPrice', placeholder: __('buyPrice'), type: 'number' },
                            { name: 'sellPrice', placeholder: __('sellPrice'), type: 'number' },
                            { name: 'stock', placeholder: __('quantity'), type: 'number', value: 0 },
                            { name: 'minStock', placeholder: 'Minimum stock', type: 'number', value: 5 },
                            { name: 'barcode', placeholder: 'Barcode' },
                            { name: 'variants', placeholder: 'Variants (comma separated)' },
                            { name: 'category', placeholder: __('category'), value: 'General' },
                            { name: 'supplierId', type: 'select', options: supplierOptions, value: '' },
                            { name: 'favorite', type: 'select', options: [{ value: '0', label: 'Normal' }, { value: '1', label: 'Favorite' }], value: '0' }
                        ],
                        onConfirm: (d) => {
                            const supplier = suppliers.find(item => item.id === d.supplierId);
                            products.push({
                                id: 'p' + Date.now(),
                                name: d.name,
                                category: d.category,
                                buyPrice: parseFloat(d.buyPrice) || 0,
                                sellPrice: parseFloat(d.sellPrice) || 0,
                                stock: parseInt(d.stock) || 0,
                                minStock: parseInt(d.minStock) || 5,
                                barcode: d.barcode || '',
                                supplierId: d.supplierId || '',
                                supplierName: supplier?.name || '',
                                variants: String(d.variants || '').split(',').map(item => item.trim()).filter(Boolean),
                                favorite: d.favorite === '1',
                                image: d.image || null,
                                stockHistory: []
                            });
                            saveProducts();
                            recordAudit('product-created', `Product ${d.name} created`);
                            renderProductsMobile();
                            showToast('Product added');
                        }
                    });
                });

                document.querySelectorAll('.stock-intake-btn').forEach(button => {
                    button.addEventListener('click', () => {
                        const product = products.find(item => String(item.id) === String(button.dataset.id));
                        if (!product) return;
                        showEnhancedModal({
                            title: `Stock intake · ${product.name}`,
                            fields: [
                                { name: 'qty', type: 'number', placeholder: 'Quantity received', value: 1 },
                                { name: 'costPerUnit', type: 'number', placeholder: 'Cost per unit', value: product.buyPrice || 0 },
                                { name: 'note', placeholder: 'Intake note', value: 'Manual stock intake' }
                            ],
                            onConfirm: data => {
                                addStockIntake(product.id, data.qty, data.costPerUnit, data.note || 'Manual stock intake');
                                renderProductsMobile();
                                showToast('Stock updated');
                            }
                        });
                    });
                });

                document.querySelectorAll('.stock-adjust-btn').forEach(button => {
                    button.addEventListener('click', () => {
                        const product = products.find(p => String(p.id) === String(button.dataset.id));
                        if (!product) return;
                        showEnhancedModal({
                            title: `Adjust Stock · ${product.name}`,
                            fields: [
                                { name: 'delta', type: 'number', placeholder: 'Change (e.g. -3 for loss, +5 for found)', value: 0 },
                                { name: 'reason', type: 'select', options: [
                                    { value: 'theft', label: 'Theft / Loss' },
                                    { value: 'breakage', label: 'Breakage / Damage' },
                                    { value: 'recount', label: 'Recount / Correction' },
                                    { value: 'donation', label: 'Donation / Giveaway' },
                                    { value: 'returned_to_supplier', label: 'Returned to Supplier' },
                                    { value: 'found', label: 'Found / Surplus' },
                                    { value: 'other', label: 'Other' }
                                ], value: 'recount' },
                                { name: 'note', placeholder: 'Optional note', value: '' }
                            ],
                            onConfirm: data => {
                                const delta = Number(data.delta);
                                if (delta === 0) { showToast('Enter a non-zero quantity change', 'error'); return; }
                                const reasonLabel = data.reason + (data.note ? `: ${data.note}` : '');
                                adjustStock(product.id, delta, reasonLabel);
                                renderProductsMobile();
                                showToast(`Stock adjusted: ${delta >= 0 ? '+' : ''}${delta} units`);
                            }
                        });
                    });
                });

                document.querySelectorAll('.create-po-btn').forEach(button => {
                    button.addEventListener('click', () => {
                        const product = products.find(item => String(item.id) === String(button.dataset.id));
                        if (!product) return;
                        createPurchaseOrderFromProduct(product);
                        showToast('Purchase order created');
                    });
                });
                
                document.querySelectorAll('.product-qr-btn').forEach(button => {
                    button.addEventListener('click', () => {
                        const p = products.find(pr => pr.id === button.dataset.id);
                        if (p) showBarcodeModal(p);
                    });
                });

                document.querySelectorAll('.product-delete-btn').forEach(button => {
                    button.addEventListener('click', () => {
                        const pid = button.dataset.id;
                        const p = products.find(pr => pr.id === pid);
                        if (!p) return;
                        confirmDelete(`Delete product "${p.name}"?`, () => {
                            products = products.filter(pr => pr.id !== pid);
                            saveProducts();
                            recordAudit('product-deleted', `Product ${p.name} deleted`);
                            renderProductsMobile();
                            showToast('Product deleted');
                        });
                    });
                });

                document.querySelectorAll('.product-edit-btn').forEach(button => {
                    button.addEventListener('click', () => {
                        let pid = button.dataset.id;
                        let p = products.find(p => p.id === pid);
                        if (!p) return;
                        
                        showEnhancedModal({
                            title: __('editProduct'),
                            withImage: true,
                            imageLabel: __('productImage'),
                            fields: [
                                { name: 'name', value: p.name },
                                { name: 'buyPrice', type: 'number', value: p.buyPrice },
                                { name: 'sellPrice', type: 'number', value: p.sellPrice },
                                { name: 'stock', type: 'number', value: p.stock },
                                { name: 'minStock', type: 'number', value: p.minStock || 5 },
                                { name: 'barcode', value: p.barcode || '' },
                                { name: 'variants', value: (p.variants || []).join(', ') },
                                { name: 'category', value: p.category },
                                { name: 'supplierId', type: 'select', options: supplierOptions, value: p.supplierId || '' },
                                { name: 'favorite', type: 'select', options: [{ value: '0', label: 'Normal' }, { value: '1', label: 'Favorite' }], value: p.favorite ? '1' : '0' }
                            ],
                            onConfirm: (d) => {
                                const supplier = suppliers.find(item => item.id === d.supplierId);
                                p.name = d.name;
                                p.buyPrice = parseFloat(d.buyPrice) || 0;
                                p.sellPrice = parseFloat(d.sellPrice) || 0;
                                p.stock = parseInt(d.stock) || 0;
                                p.minStock = parseInt(d.minStock) || 5;
                                p.barcode = d.barcode || '';
                                p.variants = String(d.variants || '').split(',').map(item => item.trim()).filter(Boolean);
                                p.category = d.category;
                                p.supplierId = d.supplierId || '';
                                p.supplierName = supplier?.name || '';
                                p.favorite = d.favorite === '1';
                                if (d.image) p.image = d.image;
                                saveProducts();
                                recordAudit('product-updated', `Product ${p.name} updated`);
                                renderProductsMobile();
                                showToast('Product updated');
                            }
                        });
                    });
                });
            }

            // ==================== ANALYSIS PAGE ====================
            function renderAnalysisMobile() {
                let totalRevenue = sales.reduce((acc, s) => acc + (s.finalTotal || 0), 0);
                let totalCost = 0;
                let productSales = {};
                
                sales.forEach(s => {
                    if (s.items) {
                        s.items.forEach(itm => {
                            let prod = products.find(p => p.id === itm.productId) || { buyPrice: 0 };
                            totalCost += (prod.buyPrice || 0) * itm.qty;
                            
                            if (!productSales[itm.productId]) {
                                productSales[itm.productId] = { qty: 0, name: itm.name };
                            }
                            productSales[itm.productId].qty += itm.qty;
                        });
                    }
                });
                
                let totalExpenses = expenses.reduce((acc, e) => acc + (e.amount || 0), 0);
                let netProfit = totalRevenue - totalCost - totalExpenses;
                let profitMargin = totalRevenue > 0 ? ((netProfit / totalRevenue) * 100).toFixed(1) : 0;
                
                let topProduct = { name: 'None', qty: 0 };
                Object.values(productSales).forEach(p => {
                    if (p.qty > topProduct.qty) {
                        topProduct = p;
                    }
                });
                
                let transactionCount = sales.length;
                let avgOrderValue = transactionCount > 0 ? (totalRevenue / transactionCount).toFixed(0) : 0;
                let averageExpenseValue = expenses.length > 0 ? Math.round(totalExpenses / expenses.length) : 0;
                let profitMarginDisplay = `${Number(profitMargin) > 0 ? '+' : ''}${profitMargin}%`;
                let topProductName = topProduct.qty > 0 ? topProduct.name : 'No sales yet';
                let topProductNote = topProduct.qty > 0 ? `${topProduct.qty} sold` : '0 sold';

                // Build most / least / never sold lists
                const soldEntries = Object.entries(productSales)
                    .map(([id, d]) => ({ id, name: d.name, qty: d.qty }))
                    .sort((a, b) => b.qty - a.qty);
                const maxQtySold = soldEntries.length > 0 ? soldEntries[0].qty : 1;
                const mostSold = soldEntries.slice(0, 5);
                const leastSold = soldEntries.length > 1
                    ? [...soldEntries].reverse().slice(0, 3).filter(e => e.qty < soldEntries[0].qty)
                    : [];
                const soldIds = new Set(Object.keys(productSales).map(String));
                const neverSold = products.filter(p => !soldIds.has(String(p.id)));

                const buildRankRows = (list, cls) => list.map((p, i) => `
                    <div class="product-rank-item">
                        <div class="product-rank-pos ${cls}">${i + 1}</div>
                        <div class="product-rank-info">
                            <div class="product-rank-name">${p.name}</div>
                            <div class="product-rank-bar-wrap"><div class="product-rank-bar ${cls}" style="width:${Math.round((p.qty/maxQtySold)*100)}%"></div></div>
                        </div>
                        <div class="product-rank-qty" style="${cls==='cold'?'color:#94a3b8;':''}">${p.qty} sold</div>
                    </div>`).join('');
                
                let last7Days = [];
                let dailyRevenue = [];
                for (let i = 6; i >= 0; i--) {
                    let date = new Date();
                    date.setDate(date.getDate() - i);
                    let dateStr = date.toLocaleDateString('en', { weekday: 'short' });
                    last7Days.push(dateStr);
                    
                    let dayTotal = sales
                        .filter(s => new Date(s.date).toDateString() === date.toDateString())
                        .reduce((sum, s) => sum + s.finalTotal, 0);
                    dailyRevenue.push(dayTotal);
                }

                let html = `
                    <div class="analytics-page">
                        <section class="analytics-card analytics-hero">
                            <div class="analytics-hero-top">
                                <div class="analytics-hero-copy">
                                    <span class="analytics-eyebrow">${__('analysis')}</span>
                                    <h2>${__('analysis')}</h2>
                                    <p>${__('revenue')} · ${__('profit')} · ${__('expenses')}</p>
                                </div>
                                <button class="btn-small analytics-hero-btn" id="pdfAnalyticsBtn"><i class="fas fa-file-pdf"></i> ${__('pdfAnalytics')}</button>
                                <button class="btn-small analytics-hero-btn" id="csvProductsBtn" style="margin-top:0.4rem;"><i class="fas fa-file-csv"></i> Products CSV</button>
                                <button class="btn-small analytics-hero-btn" id="csvExpensesBtn" style="margin-top:0.4rem;"><i class="fas fa-file-csv"></i> Expenses CSV</button>
                            </div>
                            <div class="analytics-hero-grid">
                                <div class="analytics-hero-metric">
                                    <span class="analytics-hero-label">${__('revenue')}</span>
                                    <strong>${formatMoney(totalRevenue)}</strong>
                                </div>
                                <div class="analytics-hero-metric">
                                    <span class="analytics-hero-label">${__('profit')}</span>
                                    <strong>${netProfit < 0 ? '-' : ''}${formatMoney(Math.abs(netProfit))}</strong>
                                </div>
                            </div>
                            <div class="analytics-hero-strip">
                                <span class="analytics-hero-chip"><i class="fas fa-receipt"></i> ${transactionCount} ${__('transactions')}</span>
                                <span class="analytics-hero-chip"><i class="fas fa-percent"></i> ${profitMarginDisplay}</span>
                            </div>
                        </section>

                        <section class="analytics-card">
                            <div class="analytics-section-head">
                                <div>
                                    <h4><i class="fas fa-layer-group icon-one"></i> ${__('analysis')}</h4>
                                    <p>${__('averageOrder')} · ${__('topProduct')} · ${__('transactions')}</p>
                                </div>
                            </div>
                            <div class="analytics-kpi-grid">
                                <article class="analytics-kpi-card analytics-kpi-green">
                                    <i class="fas fa-chart-line analytics-kpi-icon"></i>

                });

                document.querySelectorAll('.po-invoice-btn').forEach(button => {
                    button.addEventListener('click', () => {
                        const order = purchaseOrders.find(o => o.id === button.dataset.id);
                        if (!order) return;
                        try {
                            downloadPDF(buildPurchaseOrderPDF(order), `PO-${order.id}.pdf`);
                            showToast('Invoice downloaded');
                        } catch (e) {
                            showToast('PDF generation failed: ' + e.message, 'error');
                        }
                    });
                });

                document.querySelectorAll('.po-whatsapp-btn').forEach(button => {
                    button.addEventListener('click', async () => {
                        const order = purchaseOrders.find(o => o.id === button.dataset.id);
                        if (!order) return;
                        await sendPOToWhatsApp(order);
                    });
                });

                document.getElementById('endOfDayReportBtn')?.addEventListener('click', () => {
                    generateEndOfDayReportPDF();
                });

                document.querySelectorAll('.cust-history-btn').forEach(btn => {
                    btn.addEventListener('click', () => showCustomerHistoryModal(btn.dataset.customerId));
                });

                document.getElementById('markNotificationsReadBtn')?.addEventListener('click', () => {
                    markNotificationsRead();
                    renderAlertsMobile();
                });

                document.getElementById('clearNotificationsBtn')?.addEventListener('click', () => {
                    if (!confirm('Clear all notifications?')) return;
                    notifications = [];
                    saveNotifications();
                    showToast('Notifications cleared');
                    renderAlertsMobile();
                });

                document.getElementById('clearAlertsBtn')?.addEventListener('click', () => {
                    markNotificationsRead();
                    showToast('Alerts cleared');
                    renderAlertsMobile();
                });

                document.querySelectorAll('.shift-pdf-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const sh = shifts.find(s => s.id === btn.dataset.id);
                        if (sh) generateShiftReportPDF(sh);
                    });
                });

                document.getElementById('openShiftBtn')?.addEventListener('click', () => {
                    showEnhancedModal({
                        title: 'Open shift',
                        fields: [
                            { name: 'openingCash', type: 'number', placeholder: 'Opening cash', value: 0 }
                        ],
                        onConfirm: data => {
                            startShift(data.openingCash);
                            renderAlertsMobile();
                            showToast('Shift opened');
                        }
                    });
                });

                document.getElementById('closeShiftBtn')?.addEventListener('click', () => {
                    showEnhancedModal({
                        title: 'Close shift',
                        fields: [
                            { name: 'actualCash', type: 'number', placeholder: 'Actual cash counted', value: activeShift ? activeShift.openingCash : 0 }
                        ],
                        onConfirm: data => {
                            const closed = closeShift(data.actualCash);
                            if (!closed) return;
                            renderAlertsMobile();
                            showToast(`Shift closed · variance ${formatMoney(closed.cashVariance)}`);
                            // Offer shift report PDF
                            setTimeout(() => generateShiftReportPDF(closed), 400);
                        }
                    });
                });
            }

            // ==================== USERS PAGE ====================
            function renderUsersMobile() {
                if (!isManager()) return;

                const cashierStats = users.map(user => {
                    const userSales = sales.filter(sale => !sale.isReturn && String(sale.userId) === String(user.id));
                    return {
                        id: user.id,
                        salesCount: userSales.length,
                        salesTotal: userSales.reduce((sum, sale) => sum + Number(sale.finalTotal || 0), 0)
                    };
                });
                
                let html = `
                    <div style="background:white; border-radius:40px; padding:1.4rem;">
                        <h3 style="margin-bottom:1rem;"><i class="fas fa-users icon-one"></i> ${__('userTitle')}</h3>
                `;
                
                users.forEach(u => {
                    const stat = cashierStats.find(item => item.id === u.id) || { salesCount: 0, salesTotal: 0 };
                    let avatarHtml = u.profileImage ? 
                        `<img src="${u.profileImage}" style="width:100%; height:100%; object-fit:cover;">` : 
                        '<i class="fas fa-user" style="font-size:1.2rem;"></i>';
                    
                    html += `
                        <div class="user-row">
                            <div class="user-avatar">${avatarHtml}</div>
                            <div class="user-info" style="flex:1;">
                                <div><strong>${u.name}</strong></div>
                                <div style="font-size:0.8rem; color:#64748b;">@${u.username} · ${u.role}</div>
                                ${u.phone ? `<div style="font-size:0.75rem; color:#06c6d4;"><i class="fas fa-phone icon-one"></i> ${u.phone}</div>` : ''}
                                <div style="font-size:0.75rem; color:#64748b;"><i class="fas fa-chart-line icon-one"></i> ${stat.salesCount} sales · ${formatMoney(stat.salesTotal)}</div>
                            </div>
                            <div class="user-actions" style="display:flex; gap:0.45rem; align-items:center;">
                                <button class="user-action-btn user-edit-btn" data-userid="${u.id}" title="Edit ${u.name}" aria-label="Edit ${u.name}"><i class="fas fa-edit icon-one"></i> Edit</button>
                                ${u.id !== currentUser.id ? 
                                    `<button class="user-action-btn danger user-delete-btn" data-userid="${u.id}" title="Delete ${u.name}" aria-label="Delete ${u.name}"><i class="fas fa-trash-alt icon-danger"></i> Delete</button>` : 
                                    ''}
                            </div>
                        </div>
                    `;
                });
                
                html += `
                        <button class="btn-small" id="addUserBtn" style="width:100%; margin-top:1rem;">
                            <i class="fas fa-user-plus"></i> ${__('addUser')}
                        </button>
                    </div>
                `;
                
                document.getElementById('mobileContent').innerHTML = html;
                
                document.getElementById('addUserBtn').addEventListener('click', () => {
                    showEnhancedModal({
                        title: __('newUser'),
                        withImage: true,
                        imageLabel: __('profileImage'),
                        fields: [
                            { name: 'fullName', placeholder: __('fullName') },
                            { name: 'username', placeholder: __('username') },
                            { name: 'password', placeholder: __('password'), type: 'password' },
                            { name: 'role', type: 'select', options: [{ value: 'teller', label: __('teller') }, { value: 'manager', label: __('manager') }] },
                            { name: 'phone', placeholder: __('phoneNumber') }
                        ],
                        onConfirm: (data) => {
                            if (!data.username || !data.password) {
                                showToast('Required fields missing', 'error');
                                return;
                            }
                            
                            const newUser = {
                                id: 'u' + Date.now(),
                                username: data.username,
                                password: data.password,
                                role: data.role,
                                name: data.fullName || data.username,
                                phone: data.phone || '',
                                profileImage: data.image || null,
                                createdAt: new Date().toISOString()
                            };
                            
                            users.push(newUser);
                            saveUsers();
                            renderUsersMobile();
                            showToast('User added');
                        }
                    });
                });
                
                document.querySelectorAll('.user-edit-btn').forEach(icon => {
                    icon.addEventListener('click', () => {
                        let uid = icon.dataset.userid;
                        let user = users.find(u => u.id === uid);
                        if (!user) return;
                        
                        showEnhancedModal({
                            title: __('editUser'),
                            withImage: true,
                            imageLabel: __('profileImage'),
                            fields: [
                                { name: 'fullName', value: user.name },
                                { name: 'username', value: user.username },
                                { name: 'password', placeholder: __('password'), type: 'password', value: user.password },
                                { name: 'role', type: 'select', options: [{ value: 'teller', label: __('teller') }, { value: 'manager', label: __('manager') }], value: user.role },
                                { name: 'phone', value: user.phone || '' }
                            ],
                            showDelete: true,
                            onDelete: () => {
                                if (user.id === currentUser.id) {
                                    showToast('Cannot delete yourself', 'error');
                                    return;
                                }
                                users = users.filter(u => u.id !== uid);
                                saveUsers();
                                renderUsersMobile();
                                showToast('User deleted');
                            },
                            onConfirm: (data) => {
                                user.name = data.fullName || user.name;
                                user.username = data.username;
                                if (data.password) user.password = data.password;
                                user.role = data.role;
                                user.phone = data.phone || '';
                                if (data.image) user.profileImage = data.image;
                                saveUsers();
                                // Sync currentUser if the edited user is the logged-in user
                                if (user.id === currentUser.id) {
                                    currentUser = { ...currentUser, ...user };
                                    localStorage.setItem(AUTH_KEY, JSON.stringify(currentUser));
                                    renderPhoneApp();
                                }
                                renderUsersMobile();
                                showToast('User updated');
                            }
                        });
                    });
                });
                
                document.querySelectorAll('.user-delete-btn').forEach(icon => {
                    icon.addEventListener('click', () => {
                        let uid = icon.dataset.userid;
                        let user = users.find(u => u.id === uid);
                        if (!user) return;
                        
                        if (user.id === currentUser.id) {
                            showToast('Cannot delete yourself', 'error');
                            return;
                        }
                        
                        confirmDelete(`Delete user "${user.name}"?`, () => {
                            users = users.filter(u => u.id !== uid);
                            saveUsers();
                            renderUsersMobile();
                            showToast('User deleted');
                        });
                    });
                });
            }

            // ==================== FULLSCREEN TOGGLE (NEW) ====================
            async function requestAppFullscreen() {
                if (document.fullscreenElement || !shouldAutoFullscreen || !document.documentElement.requestFullscreen) return;
                try {
                    await document.documentElement.requestFullscreen();
                } catch {
                    // Browsers can reject fullscreen until a user gesture is available.
                }
            }

            function bindAutoFullscreen() {
                if (autoFullscreenListenersBound) return;
                autoFullscreenListenersBound = true;
                const tryEnterFullscreen = () => {
                    if (shouldAutoFullscreen && !document.fullscreenElement) {
                        requestAppFullscreen();
                    }
                };
                document.addEventListener('pointerdown', tryEnterFullscreen, true);
                document.addEventListener('touchstart', tryEnterFullscreen, true);
                document.addEventListener('keydown', tryEnterFullscreen, true);
            }

            function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    shouldAutoFullscreen = true;
                    saveFullscreenPreference();
                    requestAppFullscreen();
                } else if (document.exitFullscreen) {
                    shouldAutoFullscreen = false;
                    saveFullscreenPreference();
                    document.exitFullscreen();
                }
            }

            // ==================== RENDER PHONE APP (header improved) ====================
            function renderPhoneApp() {
                const container = document.getElementById('phoneApp');
                
                const logoHtml = shopBrand.logo?.startsWith('data:image') ? 
                    `<img src="${shopBrand.logo}" style="width:100%; height:100%; object-fit:cover;">` : 
                    (shopBrand.logo?.startsWith('http') ? 
                        `<img src="${shopBrand.logo}" style="width:100%; height:100%; object-fit:cover;">` : 
                        `<span style="font-size:2rem;">${shopBrand.logo || '💎'}</span>`);
                
                const userAvatarHtml = currentUser.profileImage ? 
                    `<img src="${currentUser.profileImage}" style="width:100%; height:100%; object-fit:cover;">` : 
                    '<i class="fas fa-user-circle" style="font-size:1.6rem;"></i>';
                
                container.innerHTML = `
                    <div class="wallpaper-container"><img class="wallpaper-image" src="${wallpaperImage}" style="opacity:${wallpaperOpacity}"></div>
                    
                    <div class="app-header">
                        <div class="header-top-row">
                            <div class="header-brand-section" id="shopLogoBtn" title="${shopBrand.name}">
                                <span class="shop-logo-preview">${logoHtml}</span>
                                <span class="shop-name-display">${shopBrand.name}</span>
                            </div>
                            <div class="header-actions">
                                <div class="three-dot-menu-wrap" style="position:relative;">
                                    <button class="icon-btn" id="manualLockBtn" aria-label="Lock screen" title="Lock screen" style="margin-right:0.3rem;">
                                        <i class="fas fa-lock"></i>
                                    </button>
                                    <button class="icon-btn" id="threeDotMenuBtn" aria-label="More options">
                                        <i class="fas fa-ellipsis-v"></i> Options
                                    </button>
                                    <div id="threeDotDropdown" style="display:none;position:absolute;top:calc(100% + 10px);right:0;background:var(--surface-2);border:1px solid var(--border-medium);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,0.4),0 8px 20px rgba(0,0,0,0.2);min-width:220px;max-width:calc(100vw - 2rem);z-index:9999;overflow:hidden;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);">
                                        <button class="three-dot-item" id="tdProfileBtn"><span style="width:28px;height:28px;border-radius:8px;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;background:#06c6d4;flex-shrink:0;">${userAvatarHtml}</span> ${currentUser.name}</button>
                                        <div style="height:1px;background:rgba(6,198,212,0.15);margin:0.2rem 0;"></div>
                                        <button class="three-dot-item" id="tdLangToggle"><i class="fas fa-globe icon-one"></i> Language (${currentLang === 'sw' ? 'Kiswahili' : 'English'})</button>
                                        <button class="three-dot-item" id="tdThemeBtn"><i class="fas ${document.documentElement.getAttribute('data-theme') === 'light' ? 'fa-moon' : 'fa-sun'} icon-one"></i> <span id="themeLabel">${document.documentElement.getAttribute('data-theme') === 'light' ? 'Dark Mode' : 'Light Mode'}</span></button>
                                        <button class="three-dot-item" id="tdSettingsBtn"><i class="fas fa-cog icon-one"></i> Settings</button>
                                        <button class="three-dot-item" id="tdManualBtn"><i class="fas fa-book icon-one"></i> Manual & Instructions</button>
                                        <div style="height:1px;background:rgba(6,198,212,0.15);margin:0.2rem 0;"></div>
                                        <button class="three-dot-item" id="tdLogoutBtn" style="color:#dc2626;"><i class="fas fa-sign-out-alt"></i> Logout</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="main-content" id="mobileContent"></div>
                    
                    <div class="bottom-nav" id="bottomNav">
                        <div class="nav-item-mobile" data-page="pos"><i class="fas fa-cash-register"></i><span>${__('pos')}</span></div>
                        ${isManager() ? `<div class="nav-item-mobile" data-page="products"><i class="fas fa-cubes"></i><span>${__('products')}</span></div>` : ''}
                        ${isManager() ? `<div class="nav-item-mobile" data-page="analysis"><i class="fas fa-chart-pie"></i><span>${__('analysis')}</span></div>` : ''}
                        <div class="nav-item-mobile" data-page="sales"><i class="fas fa-history"></i><span>${__('sales')}</span></div>
                        <div class="nav-item-mobile" data-page="alerts" style="position:relative;"><i class="fas fa-bell"></i><span>${__('alerts')}</span>${(()=>{ const n = getLowStockProducts().length + getCustomerBalances().length + getUnreadNotificationCount(); return n > 0 ? `<span class="nav-alert-badge">${n > 99 ? '99+' : n}</span>` : ''; })()}</div>
                        ${isManager() ? `<div class="nav-item-mobile" data-page="users"><i class="fas fa-users"></i><span>${__('users')}</span></div>` : ''}
                    </div>
                `;
                
                document.getElementById('tdProfileBtn').addEventListener('click', () => {
                    closeDropdown();
                    showUserProfileModal();
                });

                // 3-dot menu
                const threeDotBtn = document.getElementById('threeDotMenuBtn');
                const threeDotDropdown = document.getElementById('threeDotDropdown');
                const closeDropdown = () => { threeDotDropdown.style.display = 'none'; };
                threeDotBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isOpen = threeDotDropdown.style.display === 'block';
                    threeDotDropdown.style.display = isOpen ? 'none' : 'block';
                    if (!isOpen) updateFsLabel();
                });
                document.addEventListener('click', closeDropdown);

                document.getElementById('tdLangToggle').addEventListener('click', () => {
                    closeDropdown();
                    currentLang = currentLang === 'sw' ? 'en' : 'sw';
                    localStorage.setItem('profitpoint_lang', currentLang);
                    renderPhoneApp();
                });
                document.getElementById('tdThemeBtn').addEventListener('click', () => {
                    const html = document.documentElement;
                    const isLight = html.getAttribute('data-theme') === 'light';
                    const newTheme = isLight ? 'dark' : 'light';
                    html.setAttribute('data-theme', newTheme);
                    localStorage.setItem('profitpoint_theme', newTheme);
                    const lbl = document.getElementById('themeLabel');
                    const ico = document.getElementById('tdThemeBtn')?.querySelector('i');
                    if (lbl) lbl.textContent = newTheme === 'light' ? 'Dark Mode' : 'Light Mode';
                    if (ico) ico.className = `fas ${newTheme === 'light' ? 'fa-moon' : 'fa-sun'} icon-one`;
                    showToast(newTheme === 'light' ? 'Light mode on' : 'Dark mode on');
                });
                document.getElementById('tdSettingsBtn').addEventListener('click', () => {
                    closeDropdown();
                    showSettingsModal();
                });
                document.getElementById('tdManualBtn').addEventListener('click', () => {
                    closeDropdown();
                    showManualModal();
                });
                document.getElementById('tdLogoutBtn').addEventListener('click', () => {
                    closeDropdown();
                    logout();
                });
                document.getElementById('manualLockBtn')?.addEventListener('click', () => {
                    showPinLock();
                });
                
                document.querySelectorAll('.nav-item-mobile').forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.preventDefault();
                        document.querySelectorAll('.nav-item-mobile').forEach(n => n.classList.remove('active'));
                        item.classList.add('active');
                        currentPage = item.dataset.page;
                        renderMobilePage(currentPage);
                    });
                });
                
                document.querySelector(`.nav-item-mobile[data-page="${currentPage}"]`)?.classList.add('active');

                // Shrink app to visible viewport when virtual keyboard opens
                if (window.visualViewport) {
                    const onVpResize = () => {
                        const app = document.getElementById('phoneApp');
                        if (app) app.style.height = window.visualViewport.height + 'px';
                    };
                    window.visualViewport.addEventListener('resize', onVpResize);
                    window.visualViewport.addEventListener('scroll', onVpResize);
                }

                renderMobilePage(currentPage);
                applyButtonLabels(container);
            }

            // ==================== RENDER MOBILE PAGE ====================
            function renderMobilePage(page) {
                // Tellers only get POS, Sales, and Alerts
                if (!isManager() && ['products', 'analysis', 'users'].includes(page)) {
                    showToast('Manager access required', 'error');
                    renderPosMobile();
                    return;
                }
                if (page === 'pos') renderPosMobile();
                else if (page === 'products') renderProductsMobile();
                else if (page === 'analysis') renderAnalysisMobile();
                else if (page === 'sales') renderSalesMobile();
                else if (page === 'alerts') renderAlertsMobile();
                else if (page === 'users' && isManager()) renderUsersMobile();
            }

            // ==================== GLOBAL VOICE MIC DELEGATION ====================
            document.addEventListener('click', (e) => {
                const btn = e.target.closest('.voice-mic-btn');
                if (!btn) return;
                const targetId = btn.dataset.target;
                if (targetId) startVoiceInput(targetId, btn);
            });

            // ==================== START APP ====================
            function completeStartup() {
                ensureButtonLabelObserver();
                applyButtonLabels(document);
                registerPwaHooks();
                if (!getLicense()) {
                    saveLicense({ type: 'trial', start: Date.now(), duration: TRIAL_DURATION });
                }
                
                if (isLicenseExpired() && getLicense()?.type === 'trial') {
                    showProductKeyModal(true);
                    startLicenseMonitoring();
                } else if (!currentUser) {
                    showAuthScreen();
                    startLicenseMonitoring();
                } else {
                    renderPhoneApp();
                    startLicenseMonitoring();
                    startIdleMonitoring();
                    // First-run welcome
                    if (!localStorage.getItem('profitpoint_welcomed') && products.length === 0) {
                        setTimeout(() => showWelcomeOverlay(), 600);
                    }
                }
            }

            function showWelcomeOverlay() {
                const overlay = document.createElement('div');
                overlay.className = 'welcome-overlay';
                overlay.innerHTML = `
                    <div class="welcome-card">
                        <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#06c6d4,#0891b2);display:flex;align-items:center;justify-content:center;margin:0 auto 0.8rem;font-size:1.5rem;color:#fff;"><i class="fas fa-gem"></i></div>
                        <h2>Welcome to Pesa POS!</h2>
                        <p>Your mobile point of sale is ready. Get set up in three quick steps:</p>
                        <div class="welcome-steps">
                            <div class="welcome-step"><span class="welcome-step-num">1</span><span>Go to <strong>Settings</strong> (⋮ menu) and enter your shop name &amp; logo</span></div>
                            <div class="welcome-step"><span class="welcome-step-num">2</span><span>Open <strong>Products</strong> and add your inventory</span></div>
                            <div class="welcome-step"><span class="welcome-step-num">3</span><span>Return to <strong>POS</strong> and start selling!</span></div>
                        </div>
                        <button class="btn-start" id="welcomeStartBtn"><i class="fas fa-rocket"></i> Let's Go</button>
                    </div>
                `;
                document.body.appendChild(overlay);
                overlay.querySelector('#welcomeStartBtn').addEventListener('click', () => {
                    localStorage.setItem('profitpoint_welcomed', '1');
                    overlay.remove();
                });
            }

            setTimeout(async () => {
                await initHybridStorage();
                if (!splash) {
                    completeStartup();
                    return;
                }
                splash.classList.add('is-exiting');
                setTimeout(() => {
                    splash.style.display = 'none';
                    completeStartup();
                }, SPLASH_EXIT_DURATION);
            }, SPLASH_ACTIVE_DURATION);
        })();
    </script>
</body>
</html>
